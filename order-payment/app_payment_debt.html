<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>支付订单 - 移动支付</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: #F7F8FA;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 8px solid #333;
        }

        .content-scroll {
            height: calc(812px - 160px);
            overflow-y: auto;
            padding-bottom: 60px;
        }

        .content-scroll::-webkit-scrollbar {
            display: none;
        }

        .brand-text {
            color: #F1A3B8;
        }

        .brand-bg {
            background-color: #F1A3B8;
        }

        .brand-border {
            border-color: #F1A3B8;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <!-- 状态栏 -->
        <div class="flex justify-between items-center px-8 pt-4 pb-2 text-xs font-semibold">
            <span>09:41</span>
            <div class="flex gap-1 items-center">
                <iconify-icon icon="mdi:signal-cellular-3"></iconify-icon>
                <iconify-icon icon="mdi:wifi"></iconify-icon>
                <iconify-icon icon="mdi:battery"></iconify-icon>
            </div>
        </div>
        <!-- 导航栏 -->
        <div class="flex items-center px-4 py-3 bg-white">
            <a class="p-1" href="#">
                <iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon>
            </a>
            <h1 class="flex-1 text-center text-lg font-bold pr-8">支付订单</h1>
        </div>
        <div class="content-scroll">
            <!-- 支付金额展示 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex flex-col items-center justify-center text-center">
                    <span class="text-gray-500 text-sm mb-2">支付金额</span>
                    <span class="text-3xl font-black text-gray-800 mb-2" id="finalTotalDisplay">¥ 128.00</span>
                    <span class="text-xs text-gray-400">本单应付</span>
                </div>
            </div>
            <!-- 金额明细卡片 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>商品金额</span>
                    <span class="text-gray-800 font-medium">¥ 158.00</span>
                </div>
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>折后金额</span>
                    <span class="text-gray-800 font-medium">¥ 128.00</span>
                </div>
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>抵扣金额</span>
                    <span class="text-[#F1A3B8] font-medium">- ¥ 45.00</span>
                </div>
                <!-- 抵扣明细 -->
                <div class="bg-gray-50 rounded-xl mt-2 px-4 py-3">
                    <p class="text-xs text-gray-400 mb-2">抵扣明细</p>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-600">金额卡-产品卡（白金卡）</span>
                            <span class="text-[#F1A3B8]">- ¥ 20.00</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-600">金额卡-产品卡（黄金卡）</span>
                            <span class="text-[#F1A3B8]">- ¥ 15.00</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-600">有限卡-客户定制权益</span>
                            <span class="text-[#F1A3B8]">- ¥ 10.00</span>
                        </div>
                    </div>
                </div>
                <div class="border-t border-dashed border-gray-100 my-4"></div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-800 font-bold">本单应付</span>
                    <span class="text-xl font-bold brand-text">¥ 128.00</span>
                </div>
            </div>
            <!-- 支付方式列表 -->
            <div class="mt-6 px-4">
                <h2 class="text-sm font-bold text-gray-500 mb-3 px-1">支付方式</h2>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
                    <!-- 微信 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c4.801 0 8.692-3.287 8.692-7.343 0-4.054-3.891-7.342-8.692-7.342zm-3.11 5.313a.96.96 0 1 1 0-1.92.96.96 0 0 1 0 1.92zm5.813 0a.96.96 0 1 1 0-1.92.96.96 0 0 1 0 1.92zm3.26 2.86c-1.797-.052-3.444.717-4.686 1.986-.598.597-.944 1.361-.944 2.174 0 1.583 1.286 2.87 2.87 2.87.814 0 1.577-.346 2.175-.944 1.269-1.242 1.938-2.889 1.986-4.686.013-.167.027-.336.027-.504 0-4.245-3.455-7.699-7.7-7.699l.245 1.837c.218-.027.436-.065.654-.065zm-1.626 3.28c-.709 0-1.286-.577-1.286-1.286 0-.709.577-1.286 1.286-1.286.709 0 1.286.577 1.286 1.286 0 .709-.577 1.286-1.286 1.286zm4.88 0c-.709 0-1.286-.577-1.286-1.286 0-.709.577-1.286 1.286-1.286.71 0 1.286.577 1.286 1.286 0 .709-.576 1.286-1.286 1.286z"/>
                                </svg>
                            </div>
                            <span class="font-medium text-gray-800">微信支付</span>
                        </div>
                        <input checked="" class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio"
                            value="wechat" />
                    </label>
                    <!-- 支付宝 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                                <iconify-icon class="text-white w-5 h-5" icon="simple-icons:alipay"></iconify-icon>
                            </div>
                            <span class="font-medium text-gray-800">支付宝</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="alipay" />
                    </label>
                    <!-- 现金 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl text-green-500" icon="mdi:cash-multiple"></iconify-icon>
                            <span class="font-medium text-gray-800">现金支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="cash" />
                    </label>
                    <!-- 银联 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-xl" icon="logos:unionpay"></iconify-icon>
                            <span class="font-medium text-gray-800">银联卡支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="union" />
                    </label>
                    <!-- 美团/点评 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl text-yellow-400" icon="simple-icons:meituan"></iconify-icon>
                            <span class="font-medium text-gray-800">美团/大众点评</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="meituan" />
                    </label>
                    <!-- 抖音 -->
                    <label class="flex items-center justify-between p-4 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-xl" icon="logos:tiktok-icon"></iconify-icon>
                            <span class="font-medium text-gray-800">抖音支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="tiktok" />
                    </label>
                </div>
            </div>
            <!-- 实付金额输入框 -->
            <div class="mx-4 mt-6">
                <div class="bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between">
                        <label class="text-gray-700 font-medium">
                            <span class="text-red-500 mr-1">*</span>实付金额
                        </label>
                        <div class="flex items-center">
                            <input
                                class="text-xl font-bold text-gray-800 w-32 text-center bg-transparent border-b border-gray-200 focus:border-[#F1A3B8] focus:outline-none transition-colors"
                                id="actual-paid" type="number" step="0.01" value="128.00"
                                placeholder="请输入金额" />
                            <span class="ml-2 text-gray-500 font-medium">元</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 底部操作栏 -->
        <div
            class="absolute bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] border-t border-gray-100 rounded-t-[32px]">
            <button
                class="w-full py-4 brand-bg text-white rounded-2xl font-bold text-lg shadow-lg shadow-pink-200 active:scale-[0.98] transition-transform"
                onclick="handlePay()">
                确认支付
            </button>
        </div>
    </div>
    <script>
        function handlePay() {
            // 跳转到成功页
            window.location.href = 'success.html';
        }
    </script>
</body>

</html>
