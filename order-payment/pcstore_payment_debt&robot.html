<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>支付确认 - 2026年04月16日</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        @layer utilities {
            .brand-color {
                color: #F1A3B8;
            }

            .brand-bg {
                background-color: #F1A3B8;
            }

            .brand-border {
                border-color: #F1A3B8;
            }

            .brand-ring {
                --tw-ring-color: #F1A3B8;
            }
        }

        body {
            background-color: #ffffff;
        }

        .page-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="text-gray-800">
    <div class="page-container relative">
        <!-- 顶部导航 -->
        <header class="flex items-center justify-between px-4 py-4 border-b border-gray-100">
            <button class="p-2 hover:bg-gray-50 rounded-full transition-colors w-10 flex items-center justify-center">
                <span class="text-xl text-gray-400 font-bold">&times;</span>
            </button>
            <h1 class="text-lg font-bold">支付确认</h1>
            <div class="w-10"></div>
        </header>
        <!-- 主要内容区域 -->
        <main class="flex-grow px-4 py-6 space-y-6 pb-48 overflow-y-auto" style="padding-bottom: 14rem;">
            <!-- 基础支付明细 -->
            <section class="bg-gray-50 rounded-2xl p-5 space-y-3">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-500">商品金额</span>
                    <span class="font-medium text-gray-700" id="display-product-amount">¥560.00</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-500">折后金额</span>
                    <span class="font-medium text-gray-700" id="display-discounted-amount">¥512.00</span>
                </div>
                <div class="flex justify-between items-center text-sm border-t border-gray-100 pt-3">
                    <span class="text-gray-500 font-medium">抵扣金额</span>
                    <span class="font-medium text-gray-700" id="display-total-deduction">-¥45.00</span>
                </div>
                <!-- 抵扣明细列表区域 -->
                <div class="mt-1 pb-1" id="deduction-details-container">
                    <!-- 动态渲染抵扣明细列表 -->
                </div>
                <div class="flex justify-between items-center border-t border-gray-100 pt-3">
                    <span class="text-sm font-bold text-gray-900">应付金额</span>
                    <span class="text-lg font-black brand-color" id="display-base-payable">¥467.00</span>
                </div>
            </section>
<!-- 历史欠款 -->
            <section class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-amber-400 rounded-full"></div>
                        <span class="text-sm font-bold text-gray-700">历史欠款总额</span>
                    </div>
                    <span class="text-amber-600 font-bold text-lg">¥128.50</span>
                </div>
                <div class="flex flex-col gap-3">
                    <label class="flex items-center justify-between cursor-pointer select-none" for="combine-payment">
                        <span class="text-sm text-gray-600">归还历史欠款</span>
                        <div class="relative flex items-center">
                            <input 
                                class="sr-only peer" 
                                id="combine-payment" 
                                onchange="toggleArrearsSection()"
                                type="checkbox" 
                                role="switch"
                                aria-checked="false"
                                aria-label="归还历史欠款"
                            />
                            <div
                                class="w-11 h-6 bg-gray-200 peer-checked:bg-pink-300 rounded-full transition-colors duration-300 ease-in-out">
                                <div
                                    class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-md transform transition-transform duration-300 ease-in-out peer-checked:translate-x-5">
                                </div>
                            </div>
                        </div>
                    </label>
                    <div class="hidden animate-in fade-in slide-in-from-top-2 duration-300" id="repay-input-container">
                        <div
                            class="flex items-center justify-between bg-white border border-amber-200 rounded-xl px-4 py-3 shadow-sm">
                            <span class="text-sm text-gray-700 font-medium">本次归还欠款</span>
                            <div class="flex items-center gap-1.5 bg-amber-50 rounded-lg px-3 py-1.5">
                                <span class="text-xs text-amber-600 font-semibold">¥</span>
                                <input
                                    class="bg-transparent text-sm font-bold text-amber-700 w-20 outline-none"
                                    id="repay-amount" oninput="updateCalculations()" step="0.01" type="number"
                                    value="128.50" />
                            </div>
                        </div>
                    </div>
                </div>
            </section>
<!-- 支付方式 (多选/横向) -->
            <section class="space-y-3">
                <div class="flex items-center gap-2 px-1">
                    <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">选择支付方式 (支持多选)</h2>
                </div>
                <div class="grid grid-cols-4 gap-2" id="payment-methods-grid">
                    <!-- 现金 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('cash', this)">
                        <span class="text-xs font-medium">现金支付</span>
                    </div>
                    <!-- 微信 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('wechat', this)">
                        <span class="text-xs font-medium">微信支付</span>
                    </div>
                    <!-- 支付宝 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('alipay', this)">
                        <span class="text-xs font-medium">支付宝</span>
                    </div>
                    <!-- 银行卡POS -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('pos', this)">
                        <span class="text-xs font-medium">银行卡POS</span>
                    </div>
                    <!-- 银行卡转账 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('transaction', this)">
                        <span class="text-xs font-medium">银行卡转账</span>
                    </div>
                    <!-- 线上支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-pink-400 bg-pink-100 rounded-xl cursor-pointer shadow-sm selected"
                        onclick="togglePayment('merchant', this)">
                        <span class="text-xs font-bold text-pink-600">线上支付</span>
                    </div>
                    <!-- 美团/点评 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('third_party', this)">
                        <span class="text-xs font-medium">美团/点评</span>
                    </div>
                    <!-- 抖音支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('douyin', this)">
                        <span class="text-xs font-medium">抖音支付</span>
                    </div>
                    <!-- 余额 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('balance', this)">
                        <span class="text-xs font-medium">钱包</span>
                    </div>
                    <!-- 部门结算 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('store_settlement', this)">
                        <span class="text-xs font-medium">部门结算</span>
                    </div>
                    <!-- 云店支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-pink-300 transition-all bg-white shadow-sm"
                        onclick="togglePayment('cloud', this)">
                        <span class="text-xs font-medium">云店支付</span>
                    </div>
                </div>

            </section>
<!-- 支付金额分配 (新添加) -->
            <section class="space-y-3" id="allocation-section">
                <div class="flex items-center gap-2 px-1">
                    <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">支付金额分配</h2>
                </div>
                <div class="space-y-2" id="method-inputs-container">
                    <!-- 动态生成的金额输入框将放置在这里 -->
                </div>
                <p class="text-[10px] text-red-500 px-1 hidden" id="allocation-error">实付总额不能超过应付总额！</p>
            </section>
<!-- 剩余待支付 -->
            <section class="border border-gray-100 rounded-2xl p-4 flex justify-between items-center"
                id="new-arrears-section">
                <div>
                    <p class="text-sm font-bold text-gray-700">剩余待支付</p>
                    <p class="text-[10px] text-gray-400">应付金额 <span class="text-xs text-gray-400" id="arrears-label"> + 归还 </span> - 支付金额</p>
                </div>
                <span class="text-red-500 font-black" id="new-arrears-amount">¥0.00</span>
            </section>
        </main>
        <!-- 底部操作栏 -->
        <footer
            class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-8 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-20">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-xs text-gray-400 mb-1">总应付金额 <span class="text-xs text-gray-400" id="arrears-label">(应付+归还)</span></p>
                    <p class="text-sm font-bold text-gray-700" id="total-payable-display">¥467.00</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400 mb-1">实付金额</p>
                    <div class="flex items-baseline justify-end gap-1">
                        <span class="brand-color text-sm font-bold">¥</span>
                        <input
                            style="color: #F1A3B8;"
                            class="brand-color text-2xl font-black w-24 text-right bg-transparent border-b border-transparent"
                            id="actual-paid" step="0.01" type="number" value="467.00" readonly />
                    </div>
                </div>
            </div>
            <div class="flex gap-3">
                <button
                    class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-medium text-base hover:bg-gray-200 active:scale-[0.98] transition-all">
                    取消
                </button>
                <button
                    class="flex-1 brand-bg py-3 rounded-xl text-white font-bold text-base shadow-lg shadow-pink-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                    onclick="processPayment(this)" style="background-color: #F1A3B8;">
                    <span>确认支付 ¥</span>
                    <span id="btn-pay-amount">467.00</span>
                </button>
            </div>
        </footer>
    </div>
    <script>
        const CONFIG = {
            productAmount: 560.00,
            discountedAmount: 512.00,
            deductions: [
                { name: '金额卡-产品卡（白金卡）', amount: 20.00 },
                { name: '金额卡-产品卡（黄金卡）', amount: 15.00 },
                { name: '有限卡-客户定制权益', amount: 10.00 }
            ],
            historyArrearsMax: 128.50,
            currentDate: '2026年04月16日'
        };

        // 计算衍生属性
        CONFIG.totalDeduction = CONFIG.deductions.reduce((sum, d) => sum + d.amount, 0);
        CONFIG.baseOrderAmount = CONFIG.discountedAmount - CONFIG.totalDeduction;

        let selectedMethods = new Set(['merchant']);
        const methodNames = {
            'cash': '现金支付',
            'wechat': '微信支付',
            'alipay': '支付宝',
            'pos': '银行卡POS',
            'transaction': '银行卡转账',
            'merchant': '线上支付',
            'third_party': '美团/点评',
            'douyin': '抖音支付',
            'balance': '钱包',
            'store_settlement': '部门结算',
            'cloud': '云店支付'
        };

        function renderDeductionDetails() {
            const container = document.getElementById('deduction-details-container');
            if (!container) return;

            let html = `
            <div class="bg-white/50 rounded-lg overflow-hidden border border-gray-100">
                <div class="grid grid-cols-2 bg-gray-100/50 px-3 py-1.5 text-sm text-gray-400 font-medium">
                    <span>抵扣明细</span>
                </div>
                <div class="divide-y divide-gray-50">
        `;

            CONFIG.deductions.forEach(d => {
                html += `
                <div class="grid grid-cols-2 px-3 py-1.5 text-sm">
                    <span class="text-gray-500">${d.name}</span>
                    <span class="brand-color font-bold text-right"> - ¥${d.amount.toFixed(2)}</span>
                </div>
            `;
            });

            html += `
                </div>
            </div>
        `;

            container.innerHTML = html;

            // 同步 UI 上的基础金额
            document.getElementById('display-product-amount').innerText = `¥${CONFIG.productAmount.toFixed(2)}`;
            document.getElementById('display-discounted-amount').innerText = `¥${CONFIG.discountedAmount.toFixed(2)}`;
            document.getElementById('display-total-deduction').innerText = `-¥${CONFIG.totalDeduction.toFixed(2)}`;
            document.getElementById('display-base-payable').innerText = `¥${CONFIG.baseOrderAmount.toFixed(2)}`;

            // 同步主实付金额输入框初始值
            const actualPaidInput = document.getElementById('actual-paid');
            if (actualPaidInput) {
                actualPaidInput.value = CONFIG.baseOrderAmount.toFixed(2);
            }
        }

        function toggleArrearsSection() {
            const checkbox = document.getElementById('combine-payment');
            const container = document.getElementById('repay-input-container');
            const arrearsLabel = document.getElementById('arrears-label');

            if (checkbox.checked) {
                // 勾选归还欠款时，仅显示归还欠款输入区域，不修改实付金额
                container.classList.remove('hidden');
                arrearsLabel.classList.remove('hidden');
            } else {
                // 取消勾选归还欠款时，仅隐藏归还欠款输入区域，不修改实付金额
                container.classList.add('hidden');
                arrearsLabel.classList.add('hidden');
            }
            // 实付金额和本次新产生欠款由订单应付金额和支付方式输入决定，与是否勾选归还欠款无关
            updateCalculations(true); // true表示不重置分配输入
        }

        function togglePayment(type, element) {
            if (selectedMethods.has(type)) {
                if (selectedMethods.size > 1) {
                    selectedMethods.delete(type);
                    element.classList.remove('selected', 'border-pink-300', 'bg-pink-100');
                    element.classList.add('border-gray-200', 'bg-white');
                    const span = element.querySelector('span');
                    if (span) {
                        span.classList.remove('text-pink-600', 'font-bold');
                        span.classList.add('text-gray-600', 'font-medium');
                    }
                }
            } else {
                if (selectedMethods.size >= 2) {
                    alert('最多只能选择2个支付方式');
                    return;
                }
                selectedMethods.add(type);
                element.classList.add('selected', 'border-pink-400', 'bg-pink-100');
                element.classList.remove('border-gray-200', 'bg-white');
                const span = element.querySelector('span');
                if (span) {
                    span.classList.add('text-pink-600', 'font-bold');
                    span.classList.remove('text-gray-600', 'font-medium');
                }
            }

            rebuildAllocationInputs();        
            updateCalculations();
        }

        function rebuildAllocationInputs() {
        const container = document.getElementById('method-inputs-container');
        const currentTotal = parseFloat(document.getElementById('actual-paid').value) || 0;
        
        // 记录现有的值，以便重建后恢复
        const existingValues = {};
        container.querySelectorAll('input').forEach(inp => {
            existingValues[inp.dataset.method] = inp.value;
        });

        container.innerHTML = '';
        
        const selectedArray = Array.from(selectedMethods);
        
        selectedArray.forEach((method, index) => {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-white border border-gray-100 rounded-xl p-3 shadow-sm";
            
            // 如果只有一个支付方式，默认填入总额，否则尝试恢复旧值或显示空
            let val = existingValues[method];
            if (selectedArray.length === 1) {
                val = currentTotal.toFixed(2);
            } else if (!val) {
                // 多选情况下，非第一个支付方式默认显示为空
                val = index === 0 ? currentTotal.toFixed(2) : '';
            }
            // 线上支付默认不低于60元（仅当有值时验证）
            if (method === 'merchant' && val && val !== '') {
                const amount = parseFloat(val) || 0;
                if (amount < 60) {
                    val = "60.00";
                }
            }

            let html = `
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-gray-600">${methodNames[method]}</span>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-1 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 focus-within:border-pink-200 transition-all">
                        <span class="text-xs text-gray-400">¥</span>
                        <input type="text" value="${val}" data-method="${method}"
                            oninput="validateAmountInput(this)" onblur="handleMethodAmountBlur(this)"
                            class="bg-transparent text-sm font-bold text-gray-800 w-24 outline-none text-right">
                    </div>
            `;

            // 添加线上支付的提示文案
            if (method === 'merchant') {
                html += `
                    <p class="text-[10px] text-gray-500 mt-1">
                        含机器人项目 <span class="brand-color font-bold text-sm">¥60</span> 元，实付金额不允许低于60元
                    </p>
                `;
            }

            html += `
                </div>
            `;

            div.innerHTML = html;
            container.appendChild(div);
        });
    }

        function validateAmountInput(input) {
            // 移除非数字字符，保留小数点
            let value = input.value.replace(/[^0-9.]/g, '');
            
            // 限制只能有一个小数点
            const dotCount = (value.match(/\./g) || []).length;
            if (dotCount > 1) {
                value = value.slice(0, value.lastIndexOf('.'));
            }
            
            // 限制小数点后最多2位
            const dotIndex = value.indexOf('.');
            if (dotIndex !== -1 && value.length - dotIndex > 3) {
                value = value.slice(0, dotIndex + 3);
            }
            
            // 移除开头的0（除非是单独的0或0.xx格式）
            if (value.startsWith('0') && value.length > 1 && !value.startsWith('0.')) {
                value = value.replace(/^0+/, '');
            }
            
            // 更新输入框值
            input.value = value;
            
            // 更新计算
            handleMethodAmountInput(input);
        }

        function handleMethodAmountInput(input) {
        const totalPayable = CONFIG.baseOrderAmount + (document.getElementById('combine-payment').checked ? (parseFloat(document.getElementById('repay-amount').value) || 0) : 0);
        
        let sum = 0;
        const inputs = document.querySelectorAll('#method-inputs-container input');
        inputs.forEach(inp => {
            sum += parseFloat(inp.value) || 0;
        });

        // 限制总额不可大于应付总额
        if (sum > totalPayable) {
            document.getElementById('allocation-error').classList.remove('hidden');
            document.getElementById('allocation-error').innerText = '实付总额不能超过应付总额！';
            // 如果超出，扣除当前输入多出的部分以维持平衡（简单处理：强制纠正当前输入）
            const otherSum = sum - (parseFloat(input.value) || 0);
            const allowed = Math.max(0, totalPayable - otherSum);
            input.value = allowed.toFixed(2);
            sum = otherSum + parseFloat(input.value) || 0;
        }

        // 更新主实付金额
        const actualPaidInput = document.getElementById('actual-paid');
        actualPaidInput.value = sum.toFixed(2);
        
        updateCalculations(true); // true表示不重置分配输入
    }

        function handleMethodAmountBlur(input) {
            if (input.dataset.method === 'merchant') {
                const amount = parseFloat(input.value) || 0;
                if (amount < 60 && amount > 0) {
                    input.value = '60.00';
                    // Recalculate total after updating the value
                    const totalPayable = CONFIG.baseOrderAmount + (document.getElementById('combine-payment').checked ? (parseFloat(document.getElementById('repay-amount').value) || 0) : 0);
                    let sum = 0;
                    const inputs = document.querySelectorAll('#method-inputs-container input');
                    inputs.forEach(inp => {
                        sum += parseFloat(inp.value) || 0;
                    });
                    
                    // Check if total exceeds payable amount
                    if (sum > totalPayable) {
                        document.getElementById('allocation-error').classList.remove('hidden');
                        document.getElementById('allocation-error').innerText = '实付总额不能超过应付总额！';
                        const otherSum = sum - 60;
                        const allowed = Math.max(0, totalPayable - otherSum);
                        input.value = Math.max(60, allowed).toFixed(2);
                    } else {
                        document.getElementById('allocation-error').classList.add('hidden');
                    }
                    
                    // Update main payment amount - recalculate total from all inputs
                    const actualPaidInput = document.getElementById('actual-paid');
                    let totalSum = 0;
                    const allInputs = document.querySelectorAll('#method-inputs-container input');
                    allInputs.forEach(inp => {
                        totalSum += parseFloat(inp.value) || 0;
                    });
                    actualPaidInput.value = totalSum.toFixed(2);
                    
                    updateCalculations(true);
                }
            }
        }


        function updateCalculations(skipAllocationSync = false) {
            const isCombined = document.getElementById('combine-payment').checked;
            const repayInput = document.getElementById('repay-amount');

            // 限制归还欠款输入
            let repayAmount = parseFloat(repayInput.value) || 0;
            if (repayAmount > CONFIG.historyArrearsMax) {
                repayAmount = CONFIG.historyArrearsMax;
                repayInput.value = repayAmount.toFixed(2);
            }
            // 动态计算总支付金额：应付金额 + （勾选时的归还欠款金额）
            const totalPayable = CONFIG.baseOrderAmount + (isCombined ? repayAmount : 0);
            document.getElementById('total-payable-display').innerText = `¥${totalPayable.toFixed(2)}`;

            const actualPaidInput = document.getElementById('actual-paid');
            let actualPaid = parseFloat(actualPaidInput.value) || 0;

            // 限制主实付金额不可大于总支付金额（应付金额+归还欠款金额）
            if (actualPaid > totalPayable) {
                actualPaid = totalPayable;
                actualPaidInput.value = actualPaid.toFixed(2);
            }

            // 如果不是由分配输入触发的（比如页面加载或切换欠款），且只有一个支付方式，同步分配金额
            if (!skipAllocationSync && selectedMethods.size === 1) {
                const methodInput = document.querySelector('#method-inputs-container input');
                if (methodInput) {
                    methodInput.value = actualPaid.toFixed(2);
                }
            } else if (!skipAllocationSync && selectedMethods.size > 1) {
                // 多选情况下如果总额变化（如切换欠款），简单地将差值补到第一个支付方式（或者重置）
                // 这里我们选择重新平分或简单清零由用户分配
            }

            // 剩余待支付 = 应付金额 + 归还金额 - 实付金额
            const newArrears = Math.max(0, totalPayable - actualPaid);
            document.getElementById('new-arrears-amount').innerText = `¥${newArrears.toFixed(2)}`;
            document.getElementById('btn-pay-amount').innerText = actualPaid.toFixed(2);
        }

        function processPayment(btn) {
            if (selectedMethods.size === 0) {
                alert('请至少选择一种支付方式');
                return;
            }

            const actualPaid = parseFloat(document.getElementById('actual-paid').value) || 0;
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span>支付请求中...</span>';

            setTimeout(() => {
                const methods = Array.from(selectedMethods).map(m => `${methodNames[m]}:¥${(parseFloat(document.querySelector(`input[data-method="${m}"]`).value) || 0).toFixed(2)}`).join('\n');
                alert(`支付成功！\n实付总额：¥${actualPaid.toFixed(2)}\n明细：\n${methods}\n日期：${CONFIG.currentDate}`);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        }

        window.onload = () => {
            renderDeductionDetails();
            rebuildAllocationInputs();
            updateCalculations();
            document.getElementById('arrears-label').classList.add('hidden');
        };
    </script>
</body>

</html>
