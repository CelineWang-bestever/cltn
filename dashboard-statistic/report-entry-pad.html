<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报表中心 - 克丽缇娜</title>
    <link rel="stylesheet" href="../chlitina-brand.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#E87C9A;
            --primary-light:#F1A3B8;
            --primary-dark:#B75A70;
            --primary-soft:#FCEEF3;
            --bg:#F7F8FA;
            --card:#FFFFFF;
            --border:#E5E7EB;
            --border-soft:#F1F3F5;
            --text:#111827;
            --text-secondary:#6B7280;
            --text-light:#9CA3AF;
            --shadow:0 6px 18px rgba(17,24,39,0.06);
        }
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
            background:var(--bg);
            color:var(--text);
            height:100vh;
            overflow:hidden;
        }
        a{text-decoration:none;color:inherit}
        button{font:inherit}
        .page{
            height:100vh;
            display:flex;
            flex-direction:column;
            background:var(--bg);
        }
        .topbar{
            height:56px;
            background:#fff;
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 18px 0 14px;
            flex-shrink:0;
        }
        .topbar-left,.topbar-right{display:flex;align-items:center}
        .topbar-left{gap:10px}
        .brand{
            display:flex;align-items:center;gap:6px;font-size:18px;font-weight:700;letter-spacing:.4px;color:#4B5563;
        }
        .brand-word{color:var(--primary)}
        .store-chip{
            display:inline-flex;align-items:center;gap:6px;
            padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:#fff;
            font-size:13px;color:#4B5563;
        }
        .topbar-right{gap:14px;color:var(--text-light)}
        .icon-btn{
            width:30px;height:30px;border:none;border-radius:999px;background:#fff;color:var(--text-secondary);
            display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
        }
        .icon-btn:hover{background:var(--primary-soft);color:var(--primary)}
        .top-meta{font-size:13px;color:var(--text-secondary);font-weight:600}
        .top-sub-meta{font-size:12px;color:var(--text-light)}
        .top-user{
            display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid var(--border);
        }
        .avatar{
            width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,var(--primary-light),var(--primary));
            display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;
        }
        .user-text{display:flex;flex-direction:column;gap:1px}
        .user-name{font-size:13px;font-weight:600;color:#374151;line-height:1}
        .user-role{font-size:11px;color:var(--text-light);line-height:1}
        .layout{
            flex:1;min-height:0;display:flex;overflow:hidden;
        }
        .sidebar{
            width:96px;background:#fff;border-right:1px solid var(--border-soft);
            display:flex;flex-direction:column;align-items:center;padding:14px 0 10px;flex-shrink:0;
        }
        .nav{
            width:100%;display:flex;flex-direction:column;gap:6px;flex:1;padding:0 12px;
        }
        .nav-item{
            width:100%;border-radius:18px;padding:10px 0 9px;color:#9CA3AF;
            display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s ease;
        }
        .nav-item:hover{color:var(--primary);background:var(--primary-soft)}
        .nav-item.active{
            color:#fff;background:linear-gradient(180deg,var(--primary-light),var(--primary));
            box-shadow:0 10px 20px rgba(232,124,154,0.26);
        }
        .nav-label{font-size:12px;line-height:1.1}
        .nav-label.small{font-size:11px;text-align:center;line-height:1.2}
        .divider{
            width:44px;height:1px;background:var(--border-soft);margin:4px auto 2px;
        }
        .version{font-size:10px;color:#C7CDD5;padding-top:8px}
        .content{
            flex:1;min-width:0;overflow:auto;padding:22px 28px 28px;
        }
        .section{
            background:var(--card);border:1px solid var(--border-soft);border-radius:18px;
            padding:18px 18px 16px;box-shadow:var(--shadow);
        }
        .section + .section{margin-top:18px}
        .section-title{
            font-size:14px;font-weight:700;color:#1F2937;margin-bottom:16px;
        }
        .report-grid{
            display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:18px 6px;
        }
        .report-card{
            width:100%;min-height:92px;border:none;background:transparent;padding:0 10px 0 8px;
            display:flex;flex-direction:column;align-items:flex-start;gap:10px;border-radius:14px;
            text-align:left;cursor:pointer;transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
        }
        .report-card:hover{
            background:#FFF8FA;transform:translateY(-1px);box-shadow:0 8px 18px rgba(232,124,154,0.10);
        }
        .report-card.static{
            cursor:default;
        }
        .report-card.static:hover{
            background:#FFF8FA;transform:none;box-shadow:none;
        }
        .report-icon{
            width:42px;height:42px;border-radius:14px;background:linear-gradient(180deg,var(--primary-light),var(--primary));
            color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(232,124,154,0.18);
        }
        .report-name{
            font-size:13px;font-weight:600;color:#4B5563;line-height:1.35;
        }
        .report-card:hover .report-name{color:#374151}
        .placeholder-note{
            margin-top:8px;font-size:12px;color:var(--text-light);
        }
        .content-inner{max-width:1180px}
        svg{display:block}
    </style>
</head>
