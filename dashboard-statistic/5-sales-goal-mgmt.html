<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店目标管理</title>
    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0B7B72;
            --primary-50: #ECFDF5;
            --primary-100: #D1FAE5;
            --primary-200: #A7F3D0;
            --primary-300: #6EE7B7;
            --primary-400: #34D399;
            --primary-500: #0D9488;
            --primary-600: #0B7B72;
            --primary-700: #09625B;
            
            --neutral-50: #F9FAFB;
            --neutral-100: #F3F4F6;
            --neutral-200: #E5E7EB;
            --neutral-300: #D1D5DB;
            --neutral-400: #9CA3AF;
            --neutral-500: #6B7280;
            --neutral-600: #4B5563;
            --neutral-700: #374151;
            --neutral-800: #1F2937;
            --neutral-900: #111827;
            
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: var(--primary-50);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --transition-fast: all 0.15s ease;
            --transition-normal: all 0.25s ease;
            --transition-slow: all 0.35s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--neutral-800);
            min-height: 100vh;
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--neutral-200);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-900);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 2px;
        }

        .page-main {
            flex: 1;
            padding: 24px;
            max-width: 100%;
            margin: 0 auto;
            width: 100%;
        }

        .header-tabs {
            display: flex;
            gap: 8px;
            padding: 0px 0px 8px 0px;
            border-bottom: 1px solid var(--neutral-200);
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .add-goal-type-btn {
            margin-left: auto;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
            border: 1px dashed var(--neutral-300);
            background: transparent;
            color: var(--neutral-600);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-goal-type-btn:hover {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-600);
        }

        .tab-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tab-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tab-wrapper:hover .tab-actions {
            opacity: 1;
        }

        .tab-edit-btn,
        .tab-delete-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neutral-400);
            transition: var(--transition-fast);
        }

        .tab-edit-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .tab-delete-btn:hover {
            background: #FEF2F2;
            color: #EF4444;
        }

        .tab-item {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
            background: transparent;
            border: 1px solid transparent;
            color: var(--neutral-500);
        }

        .tab-item:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .tab-item.active {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-600) 100%);
            color: white;
            border-color: var(--primary-500);
        }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
        }

        .year-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--neutral-600);
        }

        .year-btn:hover:not(:disabled) {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-600);
        }

        .year-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .year-display {
            font-size: 18px;
            font-weight: 600;
            color: var(--neutral-800);
            min-width: 80px;
            text-align: center;
        }

        .main-content {
            display: grid;
            width: 100%;
        }

        /* ============ 门店目标TAB页独立布局样式 ============ */
        .store-goal-layout {
            display: grid;
            grid-template-columns: minmax(280px, 340px) 1fr;
            gap: 24px;
            width: 100%;
            min-height: 300px;
        }

        .store-goal-sidebar {
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .store-overview-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .store-overview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .store-circle-progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .store-circle-progress-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 16px;
        }

        .store-circle-progress-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-200) 0deg,
                var(--primary-200) 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .store-circle-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-500) 0deg,
                var(--primary-600) var(--progress-deg, 280deg),
                transparent var(--progress-deg, 280deg),
                transparent 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
            transition: transform 0.3s ease;
        }

        .store-circle-progress-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .store-circle-percentage {
            font-size: 28px;
            font-weight: 700;
            color: var(--neutral-800);
            display: block;
        }

        .store-circle-label {
            font-size: 12px;
            color: var(--neutral-500);
            margin-top: 4px;
        }

        .store-overview-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .store-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .store-stat-label {
            font-size: 14px;
            color: var(--neutral-500);
        }

        .store-stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-stat-value.highlight {
            color: var(--primary-600);
        }

        /* ============ 趋势图样式 ============ */
        .store-trend-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--neutral-100);
        }

        .store-trend-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: 16px;
        }

        .store-trend-chart {
            position: relative;
            height: 180px;
            padding: 0 8px;
        }

        .store-trend-y-axis {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 24px;
            width: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 11px;
            color: var(--neutral-400);
            text-align: right;
            padding-right: 8px;
        }

        .store-trend-content {
            margin-left: 48px;
            height: calc(100% - 24px);
            position: relative;
        }

        .store-trend-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .store-trend-grid-line {
            height: 1px;
            background: var(--neutral-100);
        }

        .store-trend-lines {
            position: relative;
            height: 100%;
        }

        .store-trend-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .store-trend-path {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke-dashoffset 0.3s ease;
        }

        .store-trend-path.current {
            stroke: var(--primary-500);
        }

        .store-trend-path.last-year {
            stroke: var(--neutral-400);
            stroke-dasharray: 4, 4;
        }

        .store-trend-points {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .store-trend-point {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .store-trend-point:hover {
            transform: scale(1.5);
        }

        .store-trend-point.current {
            background: var(--primary-500);
            border: 2px solid white;
            box-shadow: 0 2px 4px rgba(13, 148, 136, 0.4);
        }

        .store-trend-point.last-year {
            background: var(--neutral-400);
            border: 2px solid white;
            box-shadow: 0 2px 4px rgba(156, 163, 175, 0.4);
        }

        .store-trend-x-axis {
            display: flex;
            justify-content: space-between;
            padding-top: 8px;
            font-size: 11px;
            color: var(--neutral-400);
        }

        .store-trend-legend {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            justify-content: center;
        }

        .store-trend-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--neutral-500);
        }

        .store-trend-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .store-trend-legend-dot.current {
            background: var(--primary-500);
        }

        .store-trend-legend-dot.last-year {
            background: var(--neutral-400);
        }

        .store-goal-main {
            min-width: 0;
            min-height: 400px;
        }

        .store-month-grid-container {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            min-height: 300px;
        }

        .store-month-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .store-month-grid-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-batch-actions {
            display: flex;
            gap: 12px;
        }

        .store-btn-batch {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            color: var(--neutral-600);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .store-btn-batch:hover:not(:disabled) {
            background: var(--danger-50);
            border-color: var(--danger-300);
            color: var(--danger-600);
        }

        .store-btn-batch:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .store-month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .store-month-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-fast);
            position: relative;
            border: 2px solid transparent;
        }

        .store-month-card:hover {
            background: var(--primary-50);
            transform: translateY(-2px);
        }

        .store-month-card.selected {
            border-color: var(--primary-400);
            background: var(--primary-50);
        }

        .store-month-card.unset {
            opacity: 0.6;
        }

        .store-month-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .store-month-select-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border: 2px solid var(--neutral-300);
            border-radius: 50%;
            transition: var(--transition-fast);
        }

        .store-month-card.selected .store-month-select-indicator {
            background: var(--primary-500);
            border-color: var(--primary-500);
        }

        .store-month-card.selected .store-month-select-indicator::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .store-month-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 12px;
        }

        .store-month-info {
            text-align: left;
        }

        .store-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .store-info-label {
            color: var(--neutral-500);
        }

        .store-info-value {
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-info-value.goal {
            color: var(--neutral-600);
        }

        .store-info-value.completed {
            color: var(--primary-600);
        }

        .store-month-progress-bar {
            height: 6px;
            background: var(--neutral-200);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .store-month-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ============ 门店目标TAB页响应式样式 ============ */
        @media (max-width: 1024px) {
            .store-goal-layout {
                grid-template-columns: 1fr;
            }

            .store-goal-sidebar {
                position: static;
            }

            .store-overview-card {
                position: static;
            }

            .store-month-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .store-goal-layout {
                gap: 16px;
            }

            .store-overview-card {
                padding: 20px;
            }

            .store-circle-progress-wrapper {
                width: 120px;
                height: 120px;
            }

            .store-circle-percentage {
                font-size: 24px;
            }

            .store-month-grid-container {
                padding: 20px;
            }

            .store-month-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .store-month-card {
                padding: 14px;
            }

            .store-month-grid-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .store-overview-card {
                padding: 16px;
            }

            .store-circle-progress-wrapper {
                width: 100px;
                height: 100px;
            }

            .store-circle-percentage {
                font-size: 20px;
            }

            .store-month-grid-container {
                padding: 16px;
            }

            .store-month-grid {
                grid-template-columns: 1fr;
            }

            .store-stat-item {
                padding: 10px;
            }
        }

        /* ============ 原有样式（保留供员工业绩目标使用） ============ */
        .year-overview-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 110px;
        }

        .overview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .circle-progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .circle-progress-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 16px;
        }

        .circle-progress-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-200) 0deg,
                var(--primary-200) 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .circle-progress-fill {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary) 0deg,
                var(--primary-600) var(--progress-deg, 180deg),
                transparent var(--progress-deg, 180deg),
                transparent 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
            position: absolute;
            top: 0;
            left: 0;
            transition: var(--transition-slow);
        }

        .circle-progress-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .circle-percentage {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-600);
        }

        .circle-label {
            font-size: 12px;
            color: var(--neutral-500);
            margin-top: 4px;
        }

        .overview-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .stat-label {
            font-size: 14px;
            color: var(--neutral-500);
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .stat-value.highlight {
            color: var(--primary-600);
        }

        .month-grid-container {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .month-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .month-grid-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .batch-actions {
            display: flex;
            gap: 8px;
        }

        .btn-batch {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            color: var(--neutral-600);
        }

        .btn-batch:hover:not(:disabled) {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-600);
        }

        .btn-batch:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .month-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition-normal);
            border: 2px solid transparent;
            position: relative;
        }

        .month-card:hover {
            background: var(--primary-50);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .month-card.selected {
            border-color: var(--primary);
            background: var(--primary-50);
        }

        .month-card.unset {
            opacity: 0.6;
        }

        .month-card.unset:hover {
            opacity: 0.8;
        }

        .month-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .month-select-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            border: 2px solid var(--neutral-300);

            left: 2px;
            width: 8px;
            height: 8px;
            background: white;

            transition: var(--transition-fast);

    <script>
        const API_BASE = 'http://124.222.211.194:5001/api';

        const CURRENT_YEAR = new Date().getFullYear();
        const MIN_YEAR = CURRENT_YEAR - 5;
        const MAX_YEAR = CURRENT_YEAR;

        // 默认目标类型数据（用于API不可用时）
        const defaultGoalTypes = [
            { id: 1, type_name: '门店现金目标', unit: '元' },
            { id: 2, type_name: '门店卡耗目标', unit: '元' },
            { id: 3, type_name: '客流目标', unit: '人' },
            { id: 4, type_name: '员工业绩目标', unit: '元' }
        ];
        
        let goalTypes = [];
        let currentGoalTypeId = null;
        let currentGoalTypeIndex = 0;
        let currentYear = CURRENT_YEAR;
        let selectedMonths = [];
        let editingMonth = null;
        let monthlyGoals = {};
        let isLoading = false;
        let useMockData = true;

        // ============ API 请求封装（含异常处理） ============
        async function apiRequest(url, options = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            try {
                const res = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeout);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.code !== 0) throw new Error(data.message || '服务器错误');
                return data.data;
            } catch (err) {
                clearTimeout(timeout);
                if (err.name === 'AbortError') throw new Error('请求超时，请检查网络连接');
                if (err.message === 'Failed to fetch') throw new Error('网络连接失败，请检查服务器状态');
                throw err;
            }
        }

        // ============ 数据加载 ============
        async function loadGoalTypes() {
            console.log('loadGoalTypes called');
            useMockData = true;
            goalTypes = JSON.parse(JSON.stringify(defaultGoalTypes));
            currentGoalTypeId = goalTypes[0].id;
            currentGoalTypeIndex = 0;
            console.log('Goal types set:', goalTypes, 'currentGoalTypeId:', currentGoalTypeId);
            renderTabs();
            showToast('使用本地数据模式', 'success');
        }

        async function fetchGoals() {
            if (!currentGoalTypeId) return;
            
            // 本地数据模式下生成模拟数据
            if (useMockData) {
                const currentType = goalTypes[currentGoalTypeIndex] || {};
                monthlyGoals = {};
                
                // 默认目标类型（id <= 4）生成模拟数据，新增目标类型（id > 4）显示空数据
                if (currentType.id && currentType.id <= 4) {
                    const unit = currentType.unit || '元';
                    for (let month = 1; month <= 12; month++) {
                        const baseGoal = unit === '元' ? (80000 + Math.floor(Math.random() * 40000)) :
                                         unit === '人' ? (30 + Math.floor(Math.random() * 20)) :
                                         (100 + Math.floor(Math.random() * 80));
                        const completionRate = 60 + Math.floor(Math.random() * 50);
                        monthlyGoals[month] = {
                            goal: baseGoal,
                            completed: Math.round(baseGoal * completionRate / 100),
                            completionRate: completionRate
                        };
                    }
                }
                
                renderMonthGrid();
                updateYearOverview();
                return;
            }
            
            try {
                setLoading(true);
                monthlyGoals = await apiRequest(
                    `${API_BASE}/goals?type_id=${currentGoalTypeId}&year=${currentYear}`
                );
                setLoading(false);
                renderMonthGrid();
                updateYearOverview();
            } catch (err) {
                setLoading(false);
                showToast('加载目标数据失败: ' + err.message, 'error');
                monthlyGoals = {};
                renderMonthGrid();
                updateYearOverview();
            }
        }

        // ============ 渲染函数 ============
        function renderTabs() {
            const container = document.getElementById('goalTypeTabs');
            const tabsHtml = goalTypes.map((t, i) => {
                const isStaff = t.type_name === '员工业绩目标';
                return `
                    <div class="tab-wrapper">
                        <button class="tab-item${i === currentGoalTypeIndex ? ' active' : ''}" data-goal-type="${t.id}" data-type-index="${i}">${t.type_name}</button>
                        ${!isStaff ? `
                            <div class="tab-actions">
                                <button class="tab-edit-btn" data-type-index="${i}" title="编辑">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                    </svg>
                                </button>
                                <button class="tab-delete-btn" data-type-index="${i}" title="删除">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                    </svg>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = tabsHtml + `
                <button class="add-goal-type-btn" id="addGoalTypeBtn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    新增目标类型
                </button>
            `;
            
            container.querySelectorAll('.tab-item').forEach(tab => {
                tab.addEventListener('click', () => changeGoalType(parseInt(tab.dataset.typeIndex)));
            });
            container.querySelectorAll('.tab-edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.typeIndex);
                    openGoalTypeModal(index);
                });
            });
            container.querySelectorAll('.tab-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.typeIndex);
                    deleteGoalType(index);
                });
            });

        // 生成去年模拟数据
        function generateLastYearData() {
            const lastYearData = {};
            const currentType = goalTypes[currentGoalTypeIndex] || {};
            const unit = currentType.unit || '元';
            for (let month = 1; month <= 12; month++) {
                const baseGoal = unit === '元' ? (70000 + Math.floor(Math.random() * 35000)) :
                                 unit === '人' ? (25 + Math.floor(Math.random() * 18)) :
                                 (80 + Math.floor(Math.random() * 70));
                const completionRate = 55 + Math.floor(Math.random() * 50);
                lastYearData[month] = {
                    goal: baseGoal,
                    completed: Math.round(baseGoal * completionRate / 100),
                    completionRate: completionRate
                };
            }
            return lastYearData;
        }

        // 渲染趋势图
        function renderTrendChart() {
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const lastYearData = generateLastYearData();
            
            const currentType = goalTypes[currentGoalTypeIndex] || {};
            const unit = currentType.unit || '元';
            
            let maxValue = 0;
            const currentYearValues = [];
            const lastYearValues = [];
            
            for (let month = 1; month <= 12; month++) {
                const current = monthlyGoals[month]?.completed || 0;
                const last = lastYearData[month]?.completed || 0;
                currentYearValues.push(current);
                lastYearValues.push(last);
                maxValue = Math.max(maxValue, current, last);
            }
            
            if (maxValue === 0) maxValue = 100000;
            const padding = maxValue * 0.2;
            maxValue += padding;
            
            renderYAxis(maxValue, unit);
            renderXAxis(months);
            renderTrendLines(currentYearValues, lastYearValues, maxValue);
        }

        function renderYAxis(maxValue, unit) {
            const yAxis = document.getElementById('trendYAxis');
            if (!yAxis) return;
            
            const prefix = unit === '元' ? '¥' : '';
            const suffix = unit === '元' ? '' : unit;
            
            const values = [maxValue, maxValue * 0.75, maxValue * 0.5, maxValue * 0.25, 0];
            yAxis.innerHTML = values.map(v => {
                let displayValue = '';
                if (unit === '元') {
                    if (v >= 10000) {
                        displayValue = `${(v / 10000).toFixed(0)}万`;
                    } else {
                        displayValue = Math.round(v).toString();
                    }
                } else {
                    displayValue = Math.round(v).toString();
                }
                return `<span>${prefix}${displayValue}${suffix}</span>`;
            }).join('');
        }

        function renderXAxis(months) {
            const xAxis = document.getElementById('trendXAxis');
            if (!xAxis) return;
            xAxis.innerHTML = months.map(m => `<span>${m}</span>`).join('');
        }

        function renderTrendLines(currentValues, lastValues, maxValue) {
            const currentPath = document.getElementById('currentYearTrend');
            const lastPath = document.getElementById('lastYearTrend');
            
            if (currentPath) {
                currentPath.setAttribute('d', generatePath(currentValues, maxValue));
            }
            if (lastPath) {
                lastPath.setAttribute('d', generatePath(lastValues, maxValue));
            }
        }

        function generatePath(values, maxValue) {
            if (!values || values.length === 0) return '';
            
            const points = values.map((value, index) => {
                const x = (index / (values.length - 1)) * 100;
                const y = 100 - (value / maxValue) * 100;
                return `${x},${y}`;
            });
            
            return `M${points.join(' L')}`;
        }

        function renderTrendPoints(currentValues, lastValues, maxValue) {
            const container = document.getElementById('trendPoints');
            if (!container) return;
            
            let pointsHtml = '';
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            currentValues.forEach((value, index) => {
                const x = (index / (currentValues.length - 1)) * 100;
                const y = 100 - (value / maxValue) * 100;
                pointsHtml += `
                    <div class="store-trend-point current" 
                         style="left:${x}%;top:${y}%;transform:translate(-50%,-50%)"
                         title="${months[index]}: ${formatNum(value)}"></div>
                `;
            });
            
            lastValues.forEach((value, index) => {
                const x = (index / (lastValues.length - 1)) * 100;
                const y = 100 - (value / maxValue) * 100;
                pointsHtml += `
                    <div class="store-trend-point last-year" 
                         style="left:${x}%;top:${y}%;transform:translate(-50%,-50%)"
                         title="${months[index]}: ${formatNum(value)}"></div>
                `;
            });
            
            container.innerHTML = pointsHtml;
        }

        function setLoading(state) {
            isLoading = state;
        }

        // ============ 格式化 ============
        function formatNum(value) {
            if (typeof value !== 'number' || isNaN(value)) return '0.00';
            return value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function submitGoal() {
            if (editingMonth === null) return;
            const input = document.getElementById('goalAmountInput');
            const value = parseFloat(input.value);
            if (isNaN(value) || value <= 0) {
                showToast('请输入有效的目标金额', 'error');
                return;
            }
            try {
                await apiRequest(`${API_BASE}/goals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type_id: currentGoalTypeId,
                        year: currentYear,
                        month: editingMonth,
                        goal: Math.round(value * 100) / 100
                    })
                });

                await fetchGoals();
                showToast('目标设置成功', 'success');

        async function saveGoalType() {
            try {
                const nameInput = document.getElementById('goalTypeNameInput');
                const unitInput = document.getElementById('goalTypeUnitInput');
                const idInput = document.getElementById('goalTypeIdInput');

                if (!nameInput || !unitInput || !idInput) {
                    showToast('找不到表单元素', 'error');
                    return;
                }

                const name = nameInput.value.trim();
                const unit = unitInput.value;
                const id = idInput.value;

                if (!name) {
                    showToast('请输入目标类型名称', 'error');
                    return;
                }

                if (goalTypes.some(t => t.type_name === name && t.id !== parseInt(id))) {
                    showToast('目标类型名称已存在', 'error');
                    return;
                }

                if (useMockData) {
                    if (id) {
                        const index = goalTypes.findIndex(t => t.id === parseInt(id));
                        if (index >= 0) {
                            goalTypes[index].type_name = name;
                            goalTypes[index].unit = unit;
                        }
                        showToast('目标类型更新成功', 'success');
                    } else {
                        const maxId = Math.max(...goalTypes.map(t => t.id));
                        const newType = { id: maxId + 1, type_name: name, unit };
                        goalTypes.push(newType);
                        showToast('目标类型添加成功', 'success');
                    }
                    closeGoalTypeModal();
                    renderTabs();
                } else {
                    if (id) {
                        await apiRequest(`${API_BASE}/goal-types/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ type_name: name, unit })
                        });
                        const index = goalTypes.findIndex(t => t.id === parseInt(id));
                        if (index >= 0) {
                            goalTypes[index].type_name = name;
                            goalTypes[index].unit = unit;
                        }
                        showToast('目标类型更新成功', 'success');
                    } else {
                        const newType = await apiRequest(`${API_BASE}/goal-types`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ type_name: name, unit })
                        });
                        goalTypes.push(newType);
                        showToast('目标类型添加成功', 'success');
                    }
                    closeGoalTypeModal();
                    renderTabs();
                }
            } catch (err) {
                console.error('saveGoalType error:', err);
                showToast('保存失败: ' + err.message, 'error');
            }
        }

        async function deleteGoalType(index) {
            const type = goalTypes[index];
            if (!type || type.type_name === '员工业绩目标') {
                showToast('系统默认类型不能删除', 'error');
                return;
            }

            if (!confirm(`确定要删除目标类型 "${type.type_name}" 吗？`)) {
                return;
            }

            try {
                if (useMockData) {
                    goalTypes.splice(index, 1);
                    if (currentGoalTypeIndex >= goalTypes.length) {
                        currentGoalTypeIndex = Math.max(0, goalTypes.length - 1);
                    }
                    currentGoalTypeId = goalTypes[currentGoalTypeIndex]?.id;
                    renderTabs();
                    showToast('目标类型删除成功', 'success');
                } else {
                    await apiRequest(`${API_BASE}/goal-types/${type.id}`, {
                        method: 'DELETE'
                    });
                    goalTypes.splice(index, 1);
                    if (currentGoalTypeIndex >= goalTypes.length) {
                        currentGoalTypeIndex = Math.max(0, goalTypes.length - 1);
                    }
                    currentGoalTypeId = goalTypes[currentGoalTypeIndex]?.id;
                    renderTabs();
                    if (currentGoalTypeId) {
                        await fetchGoals();
                    }
                    showToast('目标类型删除成功', 'success');
                }

                showToast('删除失败: ' + err.message, 'error');

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteStaffGoalType(parseInt(btn.dataset.goalTypeId));
                });
            });
        }

        function renderStaffGoals() {
            renderStaffList();
            renderStaffGoalCards();
            updateStaffMonthLabel();
        }

        function openStaffGoalModal(staffId, goalTypeId) {
            editingStaffId = staffId;
            const staff = staffList.find(s => s.id === staffId);
            const gt = staffGoalTypes.find(t => t.id === goalTypeId);
            const goalData = staffGoals[staffId]?.[currentStaffMonth]?.[goalTypeId];

            document.getElementById('staffModalStaffName').textContent = staff?.name || '未知员工';
            document.getElementById('staffModalMonthInfo').textContent = `${staffYear}年${currentStaffMonth}月`;

            const fieldsContainer = document.getElementById('staffGoalFields');
            fieldsContainer.innerHTML = `
                <div class="goal-field">
                    <label>${gt?.name || '目标'}（${gt?.unit || '元'}）</label>
                    <input type="text" id="staffGoalValueInput" placeholder="请输入${gt?.name || '目标'}" inputmode="decimal" value="${goalData?.goal || ''}">
                    <div class="field-unit">单位：${gt?.unit || '元'}</div>
                </div>
            `;
            fieldsContainer.dataset.goalTypeId = goalTypeId;

            document.getElementById('staffGoalModal').classList.add('show');
            document.getElementById('staffGoalValueInput').focus();
        }

        function closeStaffGoalModal() {
            document.getElementById('staffGoalModal').classList.remove('show');
            editingStaffId = null;
        }

        function saveStaffGoals() {
            if (editingStaffId === null) return;

            const fieldsContainer = document.getElementById('staffGoalFields');
            const goalTypeId = parseInt(fieldsContainer.dataset.goalTypeId);
            const valueInput = document.getElementById('staffGoalValueInput');
            const value = parseFloat(valueInput.value);

            if (isNaN(value) || value <= 0) {
                showToast('请输入有效的目标数值', 'error');
                return;
            }

            if (!staffGoals[editingStaffId]) staffGoals[editingStaffId] = {};
            if (!staffGoals[editingStaffId][currentStaffMonth]) staffGoals[editingStaffId][currentStaffMonth] = {};

            if (!staffGoals[editingStaffId][currentStaffMonth][goalTypeId]) {
                staffGoals[editingStaffId][currentStaffMonth][goalTypeId] = { completed: 0 };
            }
            staffGoals[editingStaffId][currentStaffMonth][goalTypeId].goal = value;

            closeStaffGoalModal();
            renderStaffGoalCards();
            showToast('目标保存成功', 'success');
        }

        function openAddStaffGoalTypeModal() {
            document.getElementById('staffGoalTypeNameInput').value = '';
            document.getElementById('staffGoalTypeUnitInput').value = '元';

            const container = document.getElementById('staffGoalValuesContainer');
            let html = '';
            staffList.forEach(s => {
                html += `
                    <div class="modal-field" style="margin-top:12px;display:flex;align-items:center;gap:12px">
                        <label class="modal-label" style="min-width:60px;margin:0">${s.name}</label>
                        <input type="text" class="staff-goal-value-input" data-staff-id="${s.id}" placeholder="请输入目标数值" inputmode="decimal" style="flex:1;padding:8px 10px;border:1px solid var(--neutral-200);border-radius:var(--radius-md);font-size:13px">
                    </div>
                `;
            });
            container.innerHTML = html;

            document.getElementById('addStaffGoalTypeModal').classList.add('show');
        }

        function closeAddStaffGoalTypeModal() {
            document.getElementById('addStaffGoalTypeModal').classList.remove('show');
        }

        function saveStaffGoalType() {
            const name = document.getElementById('staffGoalTypeNameInput').value.trim();
            const unit = document.getElementById('staffGoalTypeUnitInput').value;

            if (!name) {
                showToast('请输入目标名称', 'error');
                return;
            }
            if (staffGoalTypes.some(t => t.name === name)) {
                showToast('目标名称已存在', 'error');
                return;
            }

            const maxId = Math.max(...staffGoalTypes.map(t => t.id), 0);
            const newTypeId = maxId + 1;
            const newType = { id: newTypeId, name, unit };
            staffGoalTypes.push(newType);

            staffList.forEach(s => {
                const input = document.querySelector(`.staff-goal-value-input[data-staff-id="${s.id}"]`);
                if (input) {
                    const value = parseFloat(input.value);
                    if (!isNaN(value) && value > 0) {
                        if (!staffGoals[s.id]) staffGoals[s.id] = {};
                        if (!staffGoals[s.id][currentStaffMonth]) staffGoals[s.id][currentStaffMonth] = {};
                        staffGoals[s.id][currentStaffMonth][newTypeId] = {
                            goal: value,
                            completed: 0
                        };
                    }
                }
            });

            closeAddStaffGoalTypeModal();
            renderStaffGoalCards();
            showToast('目标类型添加成功', 'success');
        }

        function deleteStaffGoalType(goalTypeId) {
            const gt = staffGoalTypes.find(t => t.id === goalTypeId);
            if (!gt) return;
            if (!confirm(`确定要删除目标 "${gt.name}" 吗？`)) return;

            staffGoalTypes = staffGoalTypes.filter(t => t.id !== goalTypeId);
            renderStaffGoalCards();
            showToast('目标类型删除成功', 'success');
        }

        // 渲染目标单元格
        function renderGoalCell(goalData, unit = '元') {
            if (!goalData) {
                return '<div style="color: var(--neutral-400);">未设置</div>';
            }
            
            const rate = Math.round((goalData.completed / goalData.goal) * 100);
            const isAchieved = rate >= 100;
            const displayRate = Math.min(rate, 100);
            const prefix = unit === '元' ? '¥' : '';
            const suffix = unit === '元' ? '' : unit;
            
            return `
                <div class="goal-value">
                    <span class="label">目标:</span>${prefix}${formatNum(goalData.goal)}${suffix}
                </div>
                <div class="goal-value">
                    <span class="label">完成:</span>${prefix}${formatNum(goalData.completed)}${suffix}
                </div>
                <div class="goal-progress-bar">
                    <div class="goal-progress-fill ${isAchieved ? 'achieved' : 'not-achieved'}" style="width: ${displayRate}%"></div>
                </div>
                <div class="goal-rate">
                    进度: ${rate}%
                </div>
            `;
        }

        // 修改TAB切换逻辑
        async function changeGoalType(typeIndex) {
            currentGoalTypeIndex = typeIndex;
            currentGoalTypeId = goalTypes[typeIndex]?.id;
            document.querySelectorAll('.tab-item').forEach((tab, i) => tab.classList.toggle('active', i === typeIndex));
            selectedMonths = [];

            const storeGoalContent = document.getElementById('storeGoalContent');
            const staffGoalContent = document.getElementById('staffGoalContent');

            const currentType = goalTypes[typeIndex];
            if (currentType && currentType.type_name === '员工业绩目标') {
                if (storeGoalContent) storeGoalContent.style.display = 'none';
                if (staffGoalContent) staffGoalContent.style.display = 'block';
                if (!Object.keys(staffGoals).length) {
                    initStaffGoals();
                }
                renderStaffGoals();
            } else {
                if (storeGoalContent) storeGoalContent.style.display = 'grid';
                if (staffGoalContent) staffGoalContent.style.display = 'none';
                await fetchGoals();
            }
        }

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Page initialized');
            try {
                await loadGoalTypes();
                console.log('Goal types loaded');

                // 同步年份显示
                const yearDisplay = document.getElementById('currentYearDisplay');
                if (yearDisplay) yearDisplay.textContent = currentYear;

                // 确保门店目标内容区域显示，员工目标内容区域隐藏
                const storeGoalContent = document.getElementById('storeGoalContent');
                const staffGoalContent = document.getElementById('staffGoalContent');
                if (storeGoalContent) storeGoalContent.style.display = 'grid';
                if (staffGoalContent) staffGoalContent.style.display = 'none';

                console.log('Before fetchGoals, currentGoalTypeId:', currentGoalTypeId);
                if (currentGoalTypeId) {
                    await fetchGoals();
                    console.log('fetchGoals completed, monthlyGoals:', monthlyGoals);
                }

                document.getElementById('prevYearBtn').addEventListener('click', () => changeYear(-1));
                document.getElementById('nextYearBtn').addEventListener('click', () => changeYear(1));

                // 目标类型管理事件 - 注意：addGoalTypeBtn 的事件绑定已经在 renderTabs() 中完成
                document.getElementById('goalTypeModalCloseBtn').addEventListener('click', closeGoalTypeModal);
                document.getElementById('goalTypeModalCancelBtn').addEventListener('click', closeGoalTypeModal);
                document.getElementById('goalTypeModalConfirmBtn').addEventListener('click', saveGoalType);
                document.getElementById('goalTypeNameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveGoalType(); });

                document.getElementById('monthGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.store-month-card');
                if (!card || card.classList.contains('disabled')) return;
                const month = parseInt(card.dataset.month);
                if (e.target.closest('.store-month-select-indicator')) {
                    toggleMonthSelection(month);
                    card.classList.toggle('selected');
                } else {
                    openGoalModal(month);
                }
            });

            document.getElementById('modalCloseBtn').addEventListener('click', closeGoalModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeGoalModal);
            document.getElementById('modalConfirmBtn').addEventListener('click', submitGoal);
            document.getElementById('batchClearBtn').addEventListener('click', batchClearGoals);
            document.getElementById('goalAmountInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitGoal(); });

            // 员工目标编辑弹窗事件
            document.getElementById('staffModalCloseBtn').addEventListener('click', closeStaffGoalModal);
            document.getElementById('staffModalCancelBtn').addEventListener('click', closeStaffGoalModal);
            document.getElementById('staffModalConfirmBtn').addEventListener('click', saveStaffGoals);

            // 新增员工目标类型弹窗事件
            document.getElementById('addStaffGoalBtn').addEventListener('click', openAddStaffGoalTypeModal);
            document.getElementById('addStaffGoalTypeCloseBtn').addEventListener('click', closeAddStaffGoalTypeModal);
            document.getElementById('addStaffGoalTypeCancelBtn').addEventListener('click', closeAddStaffGoalTypeModal);
            document.getElementById('addStaffGoalTypeConfirmBtn').addEventListener('click', saveStaffGoalType);

            // 月份切换事件
            document.getElementById('staffPrevMonthBtn').addEventListener('click', () => changeStaffMonth(-1));
            document.getElementById('staffNextMonthBtn').addEventListener('click', () => changeStaffMonth(1));
            
            console.log('Initialization complete');
        } catch (error) {
            console.error('Error during initialization:', error);
            showToast('初始化失败: ' + error.message, 'error');
        }
    });
    </script>
</body>
</html>
