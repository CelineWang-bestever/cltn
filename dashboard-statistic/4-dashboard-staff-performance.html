<script>
const BASE_TODAY = '2026-06-10';
const PAGE_SIZE = 20;

const TAB_DEFS = [
    { id:'staffCustomer', label:'员工客户统计', desc:'员工维度的客户结构与分层统计' },
    { id:'staffPerformance', label:'员工业绩统计', desc:'员工对门店业绩贡献（现金/消耗拆分）' },
    { id:'staffLabor', label:'员工劳动明细', desc:'员工服务操作明细（含赠送、点客、分摊）' },
    { id:'staffKpi', label:'员工绩效统计', desc:'服务、留客、客存与运营指标' }
];

const STAFF_LIST = [
    { name:'王小美', role:'资深美容师' },
    { name:'李婷婷', role:'美容师' },
    { name:'张丽丽', role:'店长' },
    { name:'林悦', role:'美容师' },
    { name:'苏瑶', role:'美容师' },
    { name:'诗涵', role:'顾问' },
    { name:'可欣', role:'美容师' }
];

function getStaffRole(name) {
    return (STAFF_LIST.find(s => s.name === name) || {}).role || '美容师';
}

function pad2(n){return String(n).padStart(2,'0')}
function formatYMD(date){
    const y = date.getFullYear();
    const m = pad2(date.getMonth() + 1);
    const d = pad2(date.getDate());
    return `${y}-${m}-${d}`;
}
function parseDate(value){
    if (!value) return null;
    const date = new Date(`${value}T00:00:00`);
    return Number.isNaN(date.getTime()) ? null : date;
}
function isInRange(dateStr, startStr, endStr){
    const date = parseDate(dateStr);
    const start = parseDate(startStr);
    const end = parseDate(endStr);
    if (!date || !start || !end) return true;
    return date.getTime() >= start.getTime() && date.getTime() <= end.getTime();
}
function formatMoney(n){
    return `¥${(Number(n) || 0).toLocaleString()}`;
}
function downloadCsv(filename, rows){
    const csv = rows.map(row => row.map(cell => {
        const text = String(cell ?? '');
        const escaped = text.replace(/"/g, '""');
        return /[",\n]/.test(escaped) ? `"${escaped}"` : escaped;
    }).join(',')).join('\n');
    const blob = new Blob([`\ufeff${csv}`], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

function buildMockDateSeries(count, startDate = '2026-01-01'){
    const start = parseDate(startDate) || parseDate(BASE_TODAY) || new Date();
    const list = [];
    for (let i=0;i<count;i+=1){
        const d = new Date(start.getTime());
        d.setDate(d.getDate() + i);
        list.push(formatYMD(d));
    }
    return list;
}

const MOCK_DATES = buildMockDateSeries(60, BASE_TODAY);

function buildStaffCustomerRows(){
    return STAFF_LIST.map((s, idx) => {
        const base = 40 + idx * 7;
        return MOCK_DATES.slice(0, 20).map((date, i) => {
            const delta = (i + 1) * (idx + 1);
            const dealFlow = base + delta;
            const dealTimes = Math.round(dealFlow * 1.2);
            const serviceTimes = Math.round(dealTimes * 1.4);
            const serviceFlow = Math.round(dealFlow * 1.1);
            const newCustomer = Math.max(0, Math.round(dealFlow * 0.18));
            const expCustomer = Math.max(0, Math.round(dealFlow * 0.12));
            const member = Math.max(0, dealFlow - newCustomer - expCustomer);
            const segA = Math.round(dealFlow * 0.10);
            const segB = Math.round(dealFlow * 0.18);
            const segC = Math.round(dealFlow * 0.26);
            const segD = Math.round(dealFlow * 0.28);
            const segE = Math.max(0, dealFlow - segA - segB - segC - segD);
            return {
                date,
                staff:s.name,
                role:s.role,
                dealFlow,
                dealTimes,
                serviceTimes,
                serviceFlow,
                customerNew:newCustomer,
                customerExp:expCustomer,
                customerMember:member,
                segA, segB, segC, segD, segE
            };
        });
    }).flat();
}

function buildStaffPerformanceRows(){
    return STAFF_LIST.map((s, idx) => {
        return MOCK_DATES.slice(0, 20).map((date, i) => {
            const base = 12000 + idx * 2800 + i * 360;
            const cashProduct = Math.round(base * 0.24);
            const cashCare = Math.round(base * 0.18);
            const cashCard = Math.round(base * 0.42);
            const cashCoop = Math.round(base * 0.06);
            const cashTotal = cashProduct + cashCare + cashCard + cashCoop;
            const consumeProduct = Math.round(base * 0.14);
            const consumeCare = Math.round(base * 0.22);
            const consumeTotal = consumeProduct + consumeCare;
            const total = cashTotal + consumeTotal;
            return {
                date,
                staff:s.name,
                role:s.role,
                total,
                cashTotal,
                cashProduct,
                cashCare,
                cashCard,
                cashCoop,
                consumeTotal,
                consumeProduct,
                consumeCare
            };
        });
    }).flat();
}

function buildStaffLaborRows(){
    const serviceItems = [
        { name:'面部清洁护理', gift:false },
        { name:'肩颈疏通护理', gift:false },
        { name:'补水护理', gift:false },
        { name:'水光针护理', gift:false },
        { name:'抖音体验项目', gift:true },
        { name:'赠送面膜', gift:true }
    ];
    const customerNames = ['张小美','陈雅','赵敏','周琳','孙丽','刘婷','吴静','郑雪','何梅','黄蓉'];
    const rows = [];
    for (let i=0;i<65;i+=1){
        const staff = STAFF_LIST[i % STAFF_LIST.length];
        const date = MOCK_DATES[i % MOCK_DATES.length];
        const item = serviceItems[i % serviceItems.length];
        const qty = (i % 3) + 1;
        const cardAmount = item.gift ? 0 : Math.round(80 + (i % 12) * 25);
        const cashIncome = item.gift ? 0 : Math.round(120 + (i % 16) * 35);
        rows.push({
            date,
            staff:staff.name,
            role:staff.role,
            serviceItem:item.name,
            isGift:item.gift,
            qty,
            customer:customerNames[i % customerNames.length],
            cardAmount,
            cashIncome,
            isPointed:(i % 4 === 0) ? '点客' : '非点客',
            splitRate:`${[50,60,70,80,100][i % 5]}%`,
            serviceTime:`${date} ${pad2(9 + (i % 10))}:${pad2((i * 7) % 60)}`,
            orderId:`ORD${date.replace(/-/g,'')}${pad2(i % 99)}`
        });
    }
    return rows;
}

function buildStaffKpiRows(){
    return STAFF_LIST.map((s, idx) => {
        return MOCK_DATES.slice(0, 20).map((date, i) => {
            const base = 30 + idx * 6 + i * 2;
            const serviceCount = base + 12;
            const serviceTimes = Math.round(serviceCount * 1.1);
            const serviceFlow = Math.round(serviceCount * 0.9);
            const keepNew = Math.max(0, Math.round(serviceFlow * 0.08));
            const stockA = Math.round(serviceFlow * 0.10);
            const stockB = Math.round(serviceFlow * 0.18);
            const stockC = Math.round(serviceFlow * 0.24);
            const stockD = Math.round(serviceFlow * 0.26);
            const stockE = Math.max(0, serviceFlow - stockA - stockB - stockC - stockD);
            return {
                date,
                staff:s.name,
                role:s.role,
                serviceCount,
                serviceTimes,
                serviceFlow,
                keepNew,
                stockA, stockB, stockC, stockD, stockE,
                rating:Math.round(6 + ((idx + i) % 5)),
                checkIn:Math.round(10 + ((idx * 2 + i) % 8)),
                note:Math.round(4 + ((idx + i) % 6)),
                exam:Math.round(60 + ((idx * 7 + i * 3) % 41)),
                team:Math.round(4 + ((idx + i) % 5))
            };
        });
    }).flat();
}

const DATASETS = {
    staffCustomer: buildStaffCustomerRows(),
    staffPerformance: buildStaffPerformanceRows(),
    staffLabor: buildStaffLaborRows(),
    staffKpi: buildStaffKpiRows()
};

const state = {
    tabId: 'staffCustomer',
    startDate: BASE_TODAY,
    endDate: BASE_TODAY,
    rangeMode: 'day',
    staffKeyword: '',
    sortByTab: Object.fromEntries(TAB_DEFS.map(t => [t.id, { key:'', dir:'' }])),
    pageByTab: Object.fromEntries(TAB_DEFS.map(t => [t.id, 1]))
};

function toggleSort(key){
    const current = state.sortByTab[state.tabId] || { key:'', dir:'' };
    if (current.key !== key){
        state.sortByTab[state.tabId] = { key, dir:'asc' };
        state.pageByTab[state.tabId] = 1;
        renderAll();
        return;
    }
    if (current.dir === 'asc'){
        state.sortByTab[state.tabId] = { key, dir:'desc' };
        state.pageByTab[state.tabId] = 1;
        renderAll();
        return;
    }
    state.sortByTab[state.tabId] = { key:'', dir:'' };
    state.pageByTab[state.tabId] = 1;
    renderAll();
}

function getSortValue(row, key){
    if (key === 'splitRate') return parseFloat(String(row[key] || '').replace('%','')) || 0;
    if (key === 'serviceTime'){
        const t = Date.parse(String(row[key] || '').replace(' ', 'T'));
        return Number.isNaN(t) ? 0 : t;
    }
    const value = row[key];
    if (value == null) return '';
    return value;
}

function compareSortValues(a, b){
    const aEmpty = a === '' || a == null || (typeof a === 'number' && Number.isNaN(a));
    const bEmpty = b === '' || b == null || (typeof b === 'number' && Number.isNaN(b));
    if (aEmpty && bEmpty) return 0;
    if (aEmpty) return 1;
    if (bEmpty) return -1;
    const aNum = typeof a === 'number';
    const bNum = typeof b === 'number';
    if (aNum && bNum) return a - b;
    if (aNum && !bNum) return -1;
    if (!aNum && bNum) return 1;
    return String(a).localeCompare(String(b), 'zh-Hans-CN', { numeric:true, sensitivity:'base' });
}

function renderTabs(){
    const el = document.getElementById('tabs');
    el.innerHTML = TAB_DEFS.map(t => `<button class="tab ${t.id === state.tabId ? 'active' : ''}" type="button" data-tab="${t.id}">${t.label}</button>`).join('');
}

function setRange(mode){
    state.rangeMode = mode;
    const base = parseDate(BASE_TODAY) || new Date();
    const start = new Date(base.getTime());
    const end = new Date(base.getTime());
    if (mode === 'day'){
        state.startDate = formatYMD(start);
        state.endDate = formatYMD(end);
    } else if (mode === 'month'){
        start.setDate(1);
        end.setMonth(end.getMonth() + 1, 0);
        state.startDate = formatYMD(start);
        state.endDate = formatYMD(end);
    } else {
        start.setMonth(0, 1);
        end.setMonth(11, 31);
        state.startDate = formatYMD(start);
        state.endDate = formatYMD(end);
    }
    state.pageByTab[state.tabId] = 1;
    syncFilters();
    renderAll();
}

function syncFilters(){
    document.getElementById('startDate').value = state.startDate;
    document.getElementById('endDate').value = state.endDate;
    document.getElementById('staffKeyword').value = state.staffKeyword;
    document.querySelectorAll('#quickRange .chip').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.range === state.rangeMode);
    });
}

function getFilteredRows(){
    const rows = DATASETS[state.tabId] || [];
    const keyword = String(state.staffKeyword || '').trim();
    const start = state.startDate;
    const end = state.endDate;
    const filtered = rows.filter(r => {
        const nameMatch = !keyword || String(r.staff || '').includes(keyword);
        const dateMatch = isInRange(r.date, start, end);
        return nameMatch && dateMatch;
    });
    const sortState = state.sortByTab[state.tabId];
    if (!sortState || !sortState.key || !sortState.dir) return filtered;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    const key = sortState.key;
    return filtered.slice().sort((a, b) => {
        const diff = compareSortValues(getSortValue(a, key), getSortValue(b, key));
        return diff * dir;
    });
}

function buildTheadHtml(tabId){
    const colDef = getTabColumns(tabId);
    const rows = colDef.headerRows;
    const sortState = state.sortByTab[tabId] || { key:'', dir:'' };
    let leafIndex = 0;
    const html = rows.map((row, rowIndex) => {
        const tds = row.map(cell => {
            const attrs = [];
            if (cell.rowSpan) attrs.push(`rowspan="${cell.rowSpan}"`);
            if (cell.colSpan) attrs.push(`colspan="${cell.colSpan}"`);
            const bg = rowIndex === 0 && (cell.colSpan || 0) > 1 ? 'style="background:rgba(232,124,154,0.10);color:var(--primary-dark)"' : '';
            const isLeaf = rows.length === 1 ? true : (rowIndex === 1 || cell.rowSpan === 2);
            let sortAttrs = '';
            let sortCls = '';
            if (isLeaf && colDef.sortKeys && colDef.sortKeys[leafIndex]){
                const key = colDef.sortKeys[leafIndex];
                sortAttrs = `data-sort-key="${key}"`;
                sortCls = `sortable${sortState.key === key && sortState.dir ? ` sort-${sortState.dir}` : ''}`;
                leafIndex += 1;
            }
            return `<th class="${sortCls}" ${sortAttrs} ${attrs.join(' ')} ${bg}>${cell.label}</th>`;
        }).join('');
        return `<tr>${tds}</tr>`;
    }).join('');
    return html;
}

function renderTable(){
    const tab = TAB_DEFS.find(t => t.id === state.tabId);
    document.getElementById('tableTitle').textContent = tab ? tab.label : '-';
    document.getElementById('tableMeta').textContent = tab ? tab.desc : '-';

    const rows = getFilteredRows();
    const total = rows.length;
    document.getElementById('tableCount').textContent = `共 ${total.toLocaleString()} 条`;

    const page = state.pageByTab[state.tabId] || 1;
    const pageCount = Math.max(1, Math.ceil(total / PAGE_SIZE));
    const safePage = Math.min(page, pageCount);
    state.pageByTab[state.tabId] = safePage;
    const startIndex = (safePage - 1) * PAGE_SIZE;
    const endIndex = Math.min(total, startIndex + PAGE_SIZE);
    document.getElementById('pagerText').textContent = `显示 ${total ? (startIndex + 1) : 0}-${endIndex} / 共 ${total.toLocaleString()} 条`;

    const colDef = getTabColumns(state.tabId);
    document.getElementById('thead').innerHTML = buildTheadHtml(state.tabId);
    const tbody = document.getElementById('tbody');
    const pageRows = rows.slice(startIndex, endIndex);
    if (!pageRows.length){
        const colspan = colDef.sortKeys ? colDef.sortKeys.length : colDef.headerRows[colDef.headerRows.length - 1].length;
        tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center;color:var(--text-light);padding:18px">暂无数据</td></tr>`;
        return;
    }
    tbody.innerHTML = pageRows.map(r => {
        const cells = colDef.row(r);
        return `<tr>` + cells.map((cell, index) => {
            const cls = colDef.cellClass ? colDef.cellClass(index) : '';
            const isHtml = colDef.htmlCellIndexes && colDef.htmlCellIndexes.has(index);
            return `<td class="${cls}">${isHtml ? cell : String(cell)}</td>`;
        }).join('') + `</tr>`;
    }).join('');
}

function buildPagerButtons(){
    const rows = getFilteredRows();
    const total = rows.length;
    const pageCount = Math.max(1, Math.ceil(total / PAGE_SIZE));
    const current = state.pageByTab[state.tabId] || 1;
    const el = document.getElementById('pagerBtns');
    const maxButtons = 7;

    const buttons = [];
    const prevDisabled = current <= 1;
    const nextDisabled = current >= pageCount;
    buttons.push({ label:'‹', page:current - 1, disabled:prevDisabled });

    let start = Math.max(1, current - Math.floor(maxButtons / 2));
    let end = Math.min(pageCount, start + maxButtons - 1);
    start = Math.max(1, end - maxButtons + 1);
    for (let p = start; p <= end; p += 1) {
        buttons.push({ label:String(p), page:p, active:p === current });
    }
    buttons.push({ label:'›', page:current + 1, disabled:nextDisabled });

    el.innerHTML = buttons.map(btn => {
        const cls = ['page-btn', btn.active ? 'active' : ''].filter(Boolean).join(' ');
        return `<button class="${cls}" type="button" data-page="${btn.page}" ${btn.disabled ? 'disabled' : ''}>${btn.label}</button>`;
    }).join('');
}

function renderAll(){
    renderTabs();
    renderTable();
    buildPagerButtons();
}

function applyFiltersFromInputs(){
    state.startDate = document.getElementById('startDate').value || state.startDate;
    state.endDate = document.getElementById('endDate').value || state.endDate;
    state.staffKeyword = document.getElementById('staffKeyword').value || '';
    state.rangeMode = '';
    state.pageByTab[state.tabId] = 1;
    renderAll();
}

function resetFilters(){
    state.staffKeyword = '';
    setRange('day');
}

function exportCurrentTab(){
    const tab = TAB_DEFS.find(t => t.id === state.tabId);
    const rows = getFilteredRows();
    const colDef = getTabColumns(state.tabId);
    const headerRows = colDef.headerRows;

    const leafHeaders = headerRows.length === 1
        ? headerRows[0].map(c => c.label)
        : headerRows[1].map(c => c.label);

    const prefixHeaders = headerRows.length === 1
        ? []
        : headerRows[0]
            .filter(c => c.rowSpan === 2)
            .map(c => c.label);

    const groupHeaders = headerRows.length === 1
        ? []
        : headerRows[0]
            .filter(c => c.colSpan)
            .flatMap(c => Array.from({ length:c.colSpan }, () => c.label));

    const header = headerRows.length === 1
        ? leafHeaders
        : prefixHeaders.concat(groupHeaders);

    const dataRows = rows.map(r => {
        const cells = colDef.row(r).map(v => String(v ?? '').replace(/<[^>]+>/g, ''));
        return cells;
    });

    const filename = `${tab ? tab.label : 'export'}_${state.startDate}_${state.endDate}.csv`;
    downloadCsv(filename, [header].concat(dataRows));
}

document.getElementById('tabs').addEventListener('click', function(event){
    const btn = event.target.closest('[data-tab]');
    if (!btn) return;
    const nextTabId = btn.dataset.tab;
    if (!nextTabId || nextTabId === state.tabId) return;
    state.tabId = nextTabId;
    syncFilters();
    renderAll();
});
document.getElementById('quickRange').addEventListener('click', function(event){
    const btn = event.target.closest('[data-range]');
    if (!btn) return;
    setRange(btn.dataset.range);
});
document.getElementById('applyBtn').addEventListener('click', applyFiltersFromInputs);
document.getElementById('resetBtn').addEventListener('click', resetFilters);
document.getElementById('exportBtn').addEventListener('click', exportCurrentTab);
document.getElementById('thead').addEventListener('click', function(event){
    const th = event.target.closest('th[data-sort-key]');
    if (!th) return;
    toggleSort(th.dataset.sortKey);
});
document.getElementById('pagerBtns').addEventListener('click', function(event){
    const btn = event.target.closest('[data-page]');
    if (!btn) return;
    const page = Number(btn.dataset.page);
    if (!page || Number.isNaN(page)) return;
    state.pageByTab[state.tabId] = page;
    renderTable();
    buildPagerButtons();
});

function init(){
    const now = new Date('2026-06-10T23:04:00');
    document.getElementById('topTime').textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
    document.getElementById('topDate').textContent = `6月10日 周三`;
    setRange('day');
    syncFilters();
    renderAll();
}
init();
</script>
