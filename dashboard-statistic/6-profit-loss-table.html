<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经营损益报表</title>
    <link rel="stylesheet" href="../chlitina-brand.css">
    <script defer src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#0D9488;--primary-light:#14B8A6;--primary-dark:#0F766E;
            --bg-main:#F0FBFA;--bg-card:#FFFFFF;--bg-hover:#ECFDFD;--border:#CCFBF1;
            --text-primary:#1F2937;--text-secondary:#6B7280;--text-muted:#9CA3AF;
            --success:#10B981;--warning:#F59E0B;--error:#EF4444;--info:#3B82F6;
            --pink:#EC4899;--gold:#F59E0B;--purple:#8B5CF6;--rose:#F43F5E;
        }
        :root{
            --primary:#E87C9A;--primary-light:#F1A3B8;--primary-dark:#B75A70;
            --bg-main:#f7f8fa;--bg-card:#FFFFFF;--bg-hover:#FFF7FA;--border:#E5E7EB;
            --text-primary:#111827;--text-secondary:#374151;--text-muted:#6B7280;
            --success:#E87C9A;--success-light:rgba(232,124,154,.12);
        }
        body{font-family:'Noto Sans SC','Inter',sans-serif;background:var(--bg-main);color:var(--text-primary);height:100vh;overflow:hidden}
        .app{display:flex;height:100vh}

        .sidebar{width:280px;background:linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);display:flex;flex-direction:column;color:white}
        .sidebar-header{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.2)}
        .user-avatar{width:60px;height:60px;border-radius:50%;background:white;margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
        .user-avatar svg{width:32px;height:32px;color:var(--primary)}
        .user-name{font-size:16px;font-weight:600;margin-bottom:4px}
        .user-role{font-size:12px;opacity:.8}
        .shop-badge{display:inline-block;padding:2px 8px;background:rgba(255,255,255,.2);border-radius:12px;font-size:10px;margin-top:6px}
        .sidebar-brand{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 20px}
        .brand-logo{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
        .brand-logo svg{width:36px;height:36px}
        .brand-title{font-size:24px;font-weight:700;letter-spacing:4px;margin-bottom:4px}
        .brand-subtitle{font-size:12px;opacity:.7;letter-spacing:2px}
        .brand-slogan{font-size:11px;opacity:.5;margin-top:16px}

        .main-area{flex:1;display:flex;flex-direction:column;background:var(--bg-main);overflow:visible}
        .page-header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
        .page-title{font-size:20px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:10px}
        .page-title-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg, var(--primary-light), var(--primary));display:flex;align-items:center;justify-content:center;color:white}
        .page-actions{display:flex;gap:12px;align-items:center}
        .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:6px}
        .btn-primary{background:var(--primary);color:white}
        .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
        .btn-secondary{background:var(--bg-main);color:var(--text-secondary);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--bg-hover);color:var(--text-primary)}
        .filter-select{padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;background:var(--bg-card);color:var(--text-secondary);cursor:pointer}

        .content-area{flex:1;overflow:visible;padding:24px 30px}

        .profit-hero{background:linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);border-radius:20px;padding:32px 36px;color:white;margin-bottom:24px;position:relative;overflow:hidden}
        .profit-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08)}
        .profit-hero::after{content:'';position:absolute;bottom:-60px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
        .profit-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;position:relative;z-index:1}
        .profit-hero-label{font-size:14px;opacity:.85;font-weight:500;margin-bottom:8px}
        .profit-hero-value{font-size:42px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:-1px}
        .profit-hero-value.positive{color:#FFE7EF}
        .profit-hero-value.negative{color:#FCA5A5}
        .profit-hero-sub{font-size:12px;opacity:.7;margin-top:4px}
        .profit-hero-right{display:flex;gap:32px}
        .profit-hero-item{text-align:right}
        .profit-hero-item-label{font-size:12px;opacity:.7;margin-bottom:4px}
        .profit-hero-item-value{font-size:22px;font-weight:700;font-family:'Inter',sans-serif}
        .profit-hero-legend{display:flex;gap:20px;font-size:12px;opacity:.75;position:relative;z-index:1}
        .legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px}
        .legend-dot.profit{background:#FFE7EF}
        .legend-dot.expense{background:rgba(255,255,255,.35)}
        .profit-hero-year .legend-dot.profit{background:#FFE7EF}
        .profit-hero-year{background:linear-gradient(135deg, #C86C86 0%, var(--primary) 50%, #F4B2C3 100%)}
        .profit-hero-year::before{background:rgba(255,255,255,.1)}
        .profit-hero-year::after{background:rgba(255,255,255,.06)}
        .profit-hero-value.positive-year{color:#FFE7EF}

        .summary-cards{display:grid;grid-template-columns:repeat(4, 1fr);gap:16px;margin-bottom:24px}
        .summary-card{background:var(--bg-card);border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);transition:all .2s;cursor:pointer}
        .summary-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
        .summary-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .summary-card-label{font-size:13px;color:var(--text-secondary);font-weight:500}
        .summary-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .summary-card-value{font-size:26px;font-weight:700;color:var(--text-primary);font-family:'Inter',sans-serif}
        .summary-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
        .summary-card-change{font-size:12px;display:flex;align-items:center;gap:4px}
        .summary-card-change.up{color:var(--success)}
        .summary-card-change.down{color:var(--error)}
        .summary-card-ratio{font-size:11px;color:var(--text-muted);background:var(--bg-main);padding:2px 8px;border-radius:10px}

        .pnl-section{background:var(--bg-card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:20px;overflow:hidden}
        .pnl-section-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .pnl-section-title{font-size:15px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
        .pnl-section-title-dot{width:8px;height:8px;border-radius:50%}
        .pnl-section-toggle{font-size:12px;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
        .pnl-section-toggle:hover{opacity:.8}
        .pnl-section-toggle svg{width:14px;height:14px;transition:transform .2s}
        .pnl-section-toggle.expanded svg{transform:rotate(180deg)}

        .pnl-row{display:flex;align-items:center;padding:14px 24px;border-bottom:1px solid var(--border);transition:background .15s}
        .pnl-row:last-child{border-bottom:none}
        .pnl-row:hover{background:var(--bg-hover)}
        .pnl-row.level-0{font-weight:600;background:var(--bg-main)}
        .pnl-row.level-1{padding-left:48px}
        .pnl-row.level-2{padding-left:72px;color:var(--text-secondary);font-size:13px;cursor:pointer}
        .pnl-row.level-2:hover{background:var(--bg-hover)}
        .pnl-row.level-2 .pnl-meta{display:flex;gap:16px;margin-left:auto;align-items:center}
        .pnl-row.level-2 .pnl-meta-item{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
        .pnl-row.level-2 .pnl-meta-item svg{width:12px;height:12px}
        .pnl-row.level-3{padding-left:96px;color:var(--text-secondary);font-size:12px;background:rgba(232,124,154,.02)}
        .pnl-row.level-3 .pnl-label{color:var(--text-secondary);font-size:12px}
        .pnl-row.level-3 .pnl-amount{font-size:12px;color:var(--text-primary)}
        .pnl-row.level-3 .pnl-meta{display:flex;gap:12px;margin-left:auto;align-items:center}
        .pnl-row.level-3 .pnl-meta-item{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
        .pnl-row.level-3 .pnl-meta-item svg{width:12px;height:12px}
        .pnl-row.level-3 .customer-name{color:var(--primary);font-weight:500}
        .pnl-row.level-2 .pnl-detail-toggle-small{width:18px;height:18px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-right:4px}
        .pnl-row.level-2 .pnl-detail-toggle-small:hover{background:var(--bg-main)}
        .pnl-row.level-2 .pnl-detail-toggle-small svg{width:12px;height:12px;color:var(--text-muted);transition:transform .2s}
        .pnl-row.level-2 .pnl-detail-toggle-small.expanded svg{transform:rotate(90deg)}
        .pnl-row.total{background:rgba(232,124,154,.04);font-weight:700;border-top:2px solid var(--primary-light)}
        .pnl-row.total .pnl-label{color:var(--primary-dark)}
        .pnl-row.negative .pnl-amount{color:var(--error)}
        .pnl-label{flex:1;font-size:13px;color:var(--text-primary)}
        .pnl-amount{text-align:right;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;min-width:120px;color:var(--text-primary)}
        .pnl-ratio{text-align:right;font-size:12px;color:var(--text-muted);min-width:80px}
        .pnl-detail-toggle{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-right:8px}
        .pnl-detail-toggle:hover{background:var(--bg-main)}
        .pnl-detail-toggle svg{width:14px;height:14px;color:var(--text-muted);transition:transform .2s}
        .pnl-detail-toggle.expanded svg{transform:rotate(90deg)}

        .detail-rows{display:none}
        .detail-rows.show{display:block}

        .ratio-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
        .ratio-tag.healthy{background:var(--success-light);color:var(--success)}
        .ratio-tag.warning{background:rgba(245,158,11,.1);color:var(--warning)}
        .ratio-tag.danger{background:rgba(239,68,68,.1);color:var(--error)}

        .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
        .chart-card{background:var(--bg-card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);overflow:hidden}
        .chart-card-header{padding:18px 24px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
        .chart-card-body{padding:20px 24px}
        .bar-chart{display:flex;flex-direction:column;gap:12px}
        .bar-item{display:flex;align-items:center;gap:12px}
        .bar-label{width:80px;font-size:12px;color:var(--text-secondary);text-align:right;flex-shrink:0}
        .bar-track{flex:1;height:24px;background:var(--bg-main);border-radius:6px;overflow:hidden;position:relative}
        .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;color:white;font-weight:600;min-width:30px;transition:width .6s ease}
        .bar-value{font-size:12px;font-weight:600;color:var(--text-primary);min-width:70px;text-align:right;font-family:'Inter',sans-serif}

        .donut-chart{display:flex;align-items:center;justify-content:center;gap:32px;padding:10px 0}
        .donut-svg{width:160px;height:160px;flex-shrink:0}
        .donut-legend{display:flex;flex-direction:column;gap:10px}
        .donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
        .donut-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
        .donut-legend-value{font-weight:600;color:var(--text-primary);font-family:'Inter',sans-serif;margin-left:auto}

        .trend-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:10px}
        .trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
        .trend-bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;position:relative;z-index:1}
        .trend-bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;position:relative;cursor:pointer}
        .trend-bar:hover{opacity:.85}
        .trend-bar-tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--text-primary);color:white;padding:8px 10px;border-radius:8px;font-size:11px;white-space:normal;margin-bottom:6px;min-width:120px}
        .trend-tooltip-amount{font-weight:700;font-family:'Inter',sans-serif}
        .trend-tooltip-mom{margin-top:2px;opacity:.9}
        .trend-tooltip-mom.up{color:#10B981}
        .trend-tooltip-mom.down{color:var(--error)}
        .trend-bar:hover .trend-bar-tooltip{display:block}
        .trend-bar.is-selected{outline:2px solid rgba(232,124,154,.55);outline-offset:2px}
        .trend-bar.is-negative{background:linear-gradient(180deg, #FECACA, #EF4444) !important}
        .trend-label{font-size:10px;color:var(--text-muted)}

        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
        .modal-overlay.active{display:flex}
        .modal{background:var(--bg-card);border-radius:20px;width:700px;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .3s ease}
        @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        .modal-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .modal-title{font-size:18px;font-weight:700}
        .modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg-main);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .modal-close:hover{background:var(--border)}
        .modal-close svg{width:16px;height:16px;color:var(--text-secondary)}
        .modal-body{padding:0;max-height:calc(85vh - 80px);overflow-y:auto}
        .modal-table{width:100%;border-collapse:collapse;font-size:13px}
        .modal-table thead th{padding:12px 20px;text-align:left;font-weight:600;color:var(--text-secondary);background:var(--bg-main);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
        .modal-table tbody td{padding:12px 20px;border-bottom:1px solid var(--border);color:var(--text-primary)}
        .modal-table tbody tr:hover{background:var(--bg-hover)}
        .modal-table .amount{font-weight:600;font-family:'Inter',sans-serif;color:var(--rose)}
        .modal-table .category-text{color:var(--text-secondary);font-weight:500}
        .modal-table .person-info{display:flex;align-items:center;gap:8px}
        .modal-table .person-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg, var(--primary-light), var(--primary));display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:600}

        @media(max-width:1200px){.summary-cards{grid-template-columns:repeat(2, 1fr)}.chart-row{grid-template-columns:1fr}}
        @media(max-width:768px){.summary-cards{grid-template-columns:1fr}.chart-row{grid-template-columns:1fr}.profit-hero-right{flex-direction:column;gap:16px}}

        .chl-layout{display:flex;flex-direction:column;height:100vh}
        .chl-topbar{height:56px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid #e5e7eb;z-index:10;flex-shrink:0}
        .chl-topbar-left{display:flex;align-items:center;gap:24px}
        .chl-back{display:flex;align-items:center;color:#E87C9A;text-decoration:none}
        .chl-back:hover{opacity:.75}
        .chl-brand{display:flex;align-items:center;font-size:20px;font-weight:800;letter-spacing:1px;color:#111827}
        .chl-brand span{color:#E87C9A}
        .chl-store{display:flex;align-items:center;gap:6px;border:1px solid #e5e7eb;padding:6px 12px;border-radius:9999px;font-size:14px;color:#374151;background:#fff;cursor:pointer}
        .chl-store:hover{background:#f9fafb}
        .chl-topbar-right{display:flex;align-items:center;gap:18px;color:#6b7280}
        .chl-icon-btn{border:none;background:transparent;cursor:pointer;color:#9ca3af;padding:6px;border-radius:10px}
        .chl-icon-btn:hover{color:#E87C9A;background:#f9fafb}
        .chl-meta{font-size:14px;color:#9ca3af}
        .chl-meta-strong{font-size:14px;font-weight:600;color:#6b7280}
        .chl-user{display:flex;align-items:center;gap:10px}
        .chl-user img{width:24px;height:24px;border-radius:9999px;object-fit:cover}
        .chl-user-name{font-size:14px;font-weight:600;color:#374151}
        .chl-user-role{background:#f3f4f6;padding:2px 8px;border-radius:6px;font-size:12px;color:#6b7280}
        .chl-page-scroll{flex:1;min-height:0;overflow:auto}

        .app{height:auto;flex:1;min-height:0}
        .main-area{min-height:0}
        .content-area{min-height:0}
        .content-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px;flex-wrap:wrap}
        @media(max-width:768px){
            html,body{width:100%;max-width:100%;overflow-x:hidden}
            body{height:auto;min-height:100vh;overflow:auto}
            .chl-topbar{display:none !important}
            .chl-layout,.chl-page-scroll,.app,.main-area,.content-area{width:100%;max-width:100%}
            .chl-page-scroll{min-height:100vh;overflow:visible}
            .content-area{padding:16px;}
            .content-head{display:flex;flex-direction:column;align-items:stretch;gap:12px}
            .content-head > *{min-width:0}
            .page-title{font-size:18px}
            .page-title-icon{width:32px;height:32px}
            .page-actions{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;width:100%}
            button[onclick="exportReport()"]{display:none}
            .page-actions > *{min-width:0;width:100%}
            .btn{justify-content:center;height:40px;padding:0 12px}
            .filter-select{height:40px}
            .profit-hero{padding:22px 18px;border-radius:16px;margin-bottom:16px}
            .profit-hero-top{flex-direction:column;gap:18px;align-items:flex-start;margin-bottom:18px}
            .profit-hero-value{font-size:32px}
            .profit-hero-right{width:100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
            .profit-hero-item{text-align:left}
            .profit-hero-item-value{font-size:18px}
            .profit-hero-legend{flex-direction:column;gap:8px}
            .summary-cards{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:16px}
            .summary-card{padding:16px}
            .summary-card-value{font-size:22px}
            .summary-card-footer{flex-direction:column;align-items:flex-start;gap:8px}
            .chart-row{grid-template-columns:1fr;gap:16px}
            .chart-card-header,.chart-card-body{padding-left:16px;padding-right:16px}
            .donut-chart{flex-direction:column;gap:20px}
            .donut-svg{width:136px;height:136px}
            .pnl-section{overflow-x:auto}
            .pnl-section-header{padding:16px}
            .pnl-row{min-width:760px;padding-top:12px;padding-bottom:12px}
            .modal-overlay{padding:12px}
            .modal{width:calc(100vw - 24px);max-width:none;max-height:calc(100vh - 24px);border-radius:18px}
            .modal-header{padding:16px}
            .modal-body{max-height:calc(100vh - 96px)}
            .modal-table{min-width:640px}
        }
        @media(max-width:480px){
            .page-actions{grid-template-columns:1fr}
            .profit-hero-right{grid-template-columns:1fr}
            .summary-cards{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="chl-layout">
        <div class="chl-topbar">
            <div class="chl-topbar-left">
                <a class="chl-back" href="report-entry-pad.html" aria-label="返回">
                    <iconify-icon class="text-2xl" icon="mdi:arrow-left"></iconify-icon>
                </a>
                <div class="chl-brand">
                    <span>CHLITINA</span>&nbsp;克丽缇娜

        function formatCurrency(amount) {
            const abs = Math.abs(amount);
            const text = abs.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            if (amount < 0) return `- ¥ ${text}`;
            return `¥ ${text}`;
        }

        function formatPercent(value) {
            if (!isFinite(value)) return '0.0%';
            return `${value.toFixed(1)}%`;
        }

        function ymToDate(ym) {
            const [y, m] = ym.split('-').map(n => parseInt(n, 10));
            return new Date(y, m - 1, 1);
        }

        function dateToYm(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        }

        function addMonths(ym, delta) {
            const d = ymToDate(ym);
            d.setMonth(d.getMonth() + delta);
            return dateToYm(d);
        }

        function formatMetaDate(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[1]}-${parts[2]}`;
        }

        function groupSum(list, keyFn) {
            const map = new Map();
            list.forEach(item => {
                const k = keyFn(item);
                map.set(k, (map.get(k) || 0) + item.amount);
            });
            return map;
        }

        function renderDonut(monthFilter, filteredExpense, totalExpense) {
            const svg = document.getElementById('expenseDonutSvg');
            const legend = document.getElementById('expenseDonutLegend');
            if (!svg || !legend) return;

            const r = 60;
            const cx = 80;
            const cy = 80;
            const strokeWidth = 24;
            const circumference = 2 * Math.PI * r;

            svg.innerHTML = '';
            legend.innerHTML = '';

            const baseCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            baseCircle.setAttribute('cx', String(cx));
            baseCircle.setAttribute('cy', String(cy));
            baseCircle.setAttribute('r', String(r));
            baseCircle.setAttribute('fill', 'none');
            baseCircle.setAttribute('stroke', '#E5E7EB');
            baseCircle.setAttribute('stroke-width', String(strokeWidth));
            svg.appendChild(baseCircle);

            const titleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            titleText.setAttribute('x', String(cx));
            titleText.setAttribute('y', '76');
            titleText.setAttribute('text-anchor', 'middle');
            titleText.setAttribute('font-size', '16');
            titleText.setAttribute('font-weight', '700');
            titleText.setAttribute('fill', '#1F2937');
            titleText.setAttribute('font-family', 'Inter');
            titleText.textContent = totalExpense > 0 ? formatCurrency(totalExpense).replace('- ', '') : '¥ 0.00';
            svg.appendChild(titleText);

            const subText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            subText.setAttribute('x', String(cx));
            subText.setAttribute('y', '94');
            subText.setAttribute('text-anchor', 'middle');
            subText.setAttribute('font-size', '10');
            subText.setAttribute('fill', '#9CA3AF');
            subText.textContent = '总支出费用';
            svg.appendChild(subText);

            if (totalExpense <= 0) {
                legend.innerHTML = `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:#E5E7EB"></div>暂无数据 <span class="donut-legend-value">0.0%</span></div>`;
                return;
            }

            const sumByCategory = groupSum(filteredExpense, d => d.category);
            const entries = Array.from(sumByCategory.entries())
                .map(([name, amount]) => ({ name, amount }))
                .sort((a, b) => b.amount - a.amount);

            const otherEntries = [];
            const mainEntries = [];
            entries.forEach(e => {
                const pct = (e.amount / totalExpense) * 100;
                if (pct < 1) otherEntries.push(e);
                else mainEntries.push(e);
            });
            if (otherEntries.length) {
                const sum = otherEntries.reduce((s, e) => s + e.amount, 0);
                mainEntries.push({ name: `其他（${otherEntries.length}项）`, amount: sum, isOther: true });
            }

            const colors = ['var(--primary)', '#F59E0B', '#EC4899', '#8B5CF6', '#F43F5E', '#9CA3AF'];
            let offset = 0;
            mainEntries.forEach((e, idx) => {
                const pct = (e.amount / totalExpense) * 100;
                const dash = (circumference * pct) / 100;
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', String(cx));
                circle.setAttribute('cy', String(cy));
                circle.setAttribute('r', String(r));
                circle.setAttribute('fill', 'none');
                circle.setAttribute('stroke', e.isOther ? '#9CA3AF' : colors[idx % colors.length]);
                circle.setAttribute('stroke-width', String(strokeWidth));
                circle.setAttribute('stroke-dasharray', `${dash} ${circumference - dash}`);
                circle.setAttribute('stroke-dashoffset', String(-offset));
                circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
                svg.appendChild(circle);
                offset += dash;

                const legendDotColor = e.isOther ? '#9CA3AF' : colors[idx % colors.length];
                const legendItem = document.createElement('div');
                legendItem.className = 'donut-legend-item';
                legendItem.innerHTML = `<div class="donut-legend-dot" style="background:${legendDotColor}"></div>${e.name} <span class="donut-legend-value">${pct.toFixed(1)}%</span>`;
                legend.appendChild(legendItem);
            });
        }

        function renderTrendChart(monthFilter) {
            const el = document.getElementById('profitTrendChart');
            if (!el) return;
            const months = [];
            for (let i = 5; i >= 0; i--) {
                months.push(addMonths(monthFilter, -i));
            }
            const profits = months.map(ym => {
                const t = monthlyTotals[ym];
                if (!t) return 0;
                return t.consume - t.expense;
            });
            const maxAbs = Math.max(1, ...profits.map(v => Math.abs(v)));

            const computeMoM = (idx) => {
                if (idx === 0) return { text: '—', cls: '' };
                const prev = profits[idx - 1];
                const curr = profits[idx];
                if (prev === 0) {
                    if (curr === 0) return { text: '0.0%', cls: '' };
                    return { text: '新增', cls: curr >= 0 ? 'up' : 'down' };
                }
                const pct = ((curr - prev) / Math.abs(prev)) * 100;
                const text = `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`;
                return { text, cls: pct >= 0 ? 'up' : 'down' };
            };

            el.innerHTML = months.map((ym, idx) => {
                const profit = profits[idx];
                const heightPct = (Math.abs(profit) / maxAbs) * 100;
                const d = ymToDate(ym);
                const label = `${d.getMonth() + 1}月`;
                const tooltip = formatCurrency(profit);
                const mom = computeMoM(idx);
                const isSelected = ym === monthFilter ? ' is-selected' : '';
                const isNegative = profit < 0 ? ' is-negative' : '';
                const bg = profit < 0
                    ? ''
                    : 'background:linear-gradient(180deg, var(--primary-light), var(--primary))';
                return `
                    <div class="trend-col">
                        <div class="trend-bar-wrap">
                            <div class="trend-bar${isSelected}${isNegative}" style="height:${heightPct}%;${bg}">
                                <span class="trend-bar-tooltip"><div class="trend-tooltip-amount">${tooltip}</div><div class="trend-tooltip-mom ${mom.cls}">环比 ${mom.text}</div></span>
                            </div>
                        </div>
                        <span class="trend-label">${label}</span>
                    </div>`;
            }).join('');
        }

        function renderPnLTable(monthFilter, filteredConsume, filteredExpense, totalConsume, totalExpense, profit) {
            const root = document.getElementById('pnlTableRoot');
            if (!root) return;

            const ratio = (value) => totalConsume > 0 ? formatPercent((value / totalConsume) * 100) : '0.0%';
            const amountHtml = (value, color) => `<span class="pnl-amount" style="color:${color}">${formatCurrency(value)}</span>`;

            const consumeCategories = ['护理消耗', '产品消耗'];
            const consumeByCategory = new Map();
            consumeCategories.forEach(c => consumeByCategory.set(c, []));
            const consumeAgg = new Map();
            filteredConsume.forEach(item => {
                const key = `${item.category}||${item.project}`;
                consumeAgg.set(key, (consumeAgg.get(key) || 0) + item.amount);
            });
            consumeAgg.forEach((amount, key) => {
                const [category, project] = key.split('||');
                if (!consumeByCategory.has(category)) consumeByCategory.set(category, []);
                consumeByCategory.get(category).push({ category, project, amount });
            });

            const consumeCategoryTotals = new Map();
            consumeByCategory.forEach((items, cat) => {
                consumeCategoryTotals.set(cat, items.reduce((s, d) => s + d.amount, 0));
            });

            const consumeSectionHtml = `
                <div class="pnl-row level-0">
                    <button class="pnl-detail-toggle expanded" onclick="toggleDetail(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                    <span class="pnl-label">一、消耗业绩（收入）</span>
                    ${amountHtml(totalConsume, 'var(--success)')}
                    <span class="pnl-ratio">${totalConsume > 0 ? '100.0%' : '0.0%'}</span>
                </div>
                <div class="detail-rows show">
                    ${consumeCategories.map(cat => {
                        const list = consumeByCategory.get(cat) || [];
                        const catTotal = consumeCategoryTotals.get(cat) || 0;
                        const sorted = list.slice().sort((a, b) => b.amount - a.amount);
                        const leafRows = sorted.map(d => `
                            <div class="pnl-row level-2${d.amount < 0 ? ' negative' : ''}">
                                <span class="pnl-label">${d.project}</span>
                                <span class="pnl-amount">${formatCurrency(d.amount)}</span>
                                <span class="pnl-ratio">${ratio(d.amount)}</span>
                            </div>
                        `).join('');
                        const empty = `<div class="pnl-row level-2"><span class="pnl-label" style="color:var(--text-muted)">暂无数据</span><span class="pnl-amount">¥ 0.00</span><span class="pnl-ratio">0.0%</span></div>`;
                        return `
                            <div class="pnl-row level-1">
                                <button class="pnl-detail-toggle expanded" onclick="toggleDetail(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                                <span class="pnl-label">${cat}</span>
                                <span class="pnl-amount">${formatCurrency(catTotal)}</span>
                                <span class="pnl-ratio">${ratio(catTotal)}</span>
                            </div>
                            <div class="detail-rows show">
                                ${leafRows || empty}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            const expenseByCategory = new Map();
            filteredExpense.forEach(item => {
                if (!expenseByCategory.has(item.category)) expenseByCategory.set(item.category, []);
                expenseByCategory.get(item.category).push(item);
            });
            const expenseEntries = Array.from(expenseByCategory.entries()).map(([cat, items]) => {
                const total = items.reduce((s, d) => s + d.amount, 0);
                return { cat, total, items };
            }).sort((a, b) => b.total - a.total);

            const expenseSectionHtml = `
                <div class="pnl-row level-0">
                    <button class="pnl-detail-toggle expanded" onclick="toggleDetail(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                    <span class="pnl-label">二、总支出费用</span>
                    <span class="pnl-amount" style="color:var(--rose)">${formatCurrency(-totalExpense)}</span>
                    <span class="pnl-ratio">${ratio(totalExpense)}</span>
                </div>
                <div class="detail-rows show">
                    ${(expenseEntries.length ? expenseEntries : []).map(e => {
                        const leafRows = e.items.slice().sort((a, b) => (a.date || '').localeCompare(b.date || '')).map(d => `
                            <div class="pnl-row level-2">
                                <span class="pnl-label">${d.project}</span>
                                <span class="pnl-amount">${formatCurrency(-d.amount)}</span>
                                <span class="pnl-ratio">${ratio(d.amount)}</span>
                                <div class="pnl-meta">
                                    <span class="pnl-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatMetaDate(d.date)}</span>
                                    <span class="pnl-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${d.person}</span>
                                </div>
                            </div>
                        `).join('');
                        const empty = `<div class="pnl-row level-2"><span class="pnl-label" style="color:var(--text-muted)">暂无数据</span><span class="pnl-amount">- ¥ 0.00</span><span class="pnl-ratio">0.0%</span></div>`;
                        return `
                            <div class="pnl-row level-1">
                                <button class="pnl-detail-toggle expanded" onclick="toggleDetail(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                                <span class="pnl-label">${e.cat}</span>
                                <span class="pnl-amount">${formatCurrency(-e.total)}</span>
                                <span class="pnl-ratio">${ratio(e.total)}</span>
                            </div>
                            <div class="detail-rows show">
                                ${leafRows || empty}
                            </div>
                        `;
                    }).join('') || `<div class="pnl-row level-1"><span class="pnl-label" style="color:var(--text-muted)">暂无数据</span><span class="pnl-amount">- ¥ 0.00</span><span class="pnl-ratio">0.0%</span></div>`}
                </div>
            `;

            const profitRatio = totalConsume > 0 ? formatPercent((profit / totalConsume) * 100) : '0.0%';
            const profitColor = profit >= 0 ? 'var(--primary)' : 'var(--error)';
            const profitSectionHtml = `
                <div class="pnl-row total" style="border-top:2px solid var(--primary)">
                    <span class="pnl-label">利润</span>
                    <span class="pnl-amount" style="color:${profitColor}">${formatCurrency(profit)}</span>
                    <span class="pnl-ratio">${profitRatio}</span>
                </div>
            `;

            root.innerHTML = consumeSectionHtml + expenseSectionHtml + profitSectionHtml;
        }

        function computeMonthTotals(monthFilter, filteredConsume, filteredExpense) {
            const fallback = monthlyTotals[monthFilter] || { consume: 0, expense: 0 };
            const totalConsume = filteredConsume.length ? filteredConsume.reduce((s, d) => s + d.amount, 0) : fallback.consume;
            const totalExpense = filteredExpense.length ? filteredExpense.reduce((s, d) => s + d.amount, 0) : fallback.expense;
            return { totalConsume, totalExpense, profit: totalConsume - totalExpense };
        }

        function computeYtdTotals(monthFilter) {
            const [yearStr, monthStr] = monthFilter.split('-');
            const year = parseInt(yearStr, 10);
            const month = parseInt(monthStr, 10);
            let consume = 0;
            let expense = 0;
            for (let m = 1; m <= month; m++) {
                const ym = `${yearStr}-${String(m).padStart(2, '0')}`;
                const t = monthlyTotals[ym];
                if (!t) continue;
                consume += t.consume;
                expense += t.expense;
            }
            return { consume, expense, profit: consume - expense };
        }

        function updateHeroMonth(totalConsume, totalExpense, profit) {
            const heroValue = document.querySelector('.profit-hero .profit-hero-value');
            const heroItems = document.querySelectorAll('.profit-hero .profit-hero-item-value');
            const heroSub = document.querySelector('.profit-hero .profit-hero-sub');
            const pctProfit = totalConsume > 0 ? (profit / totalConsume) * 100 : 0;
            const pctExpense = totalConsume > 0 ? (totalExpense / totalConsume) * 100 : 0;

            if (heroValue) {
                heroValue.textContent = formatCurrency(profit);
                heroValue.classList.toggle('positive', profit >= 0);
                heroValue.classList.toggle('negative', profit < 0);
            }
            if (heroItems && heroItems.length >= 2) {
                heroItems[0].textContent = formatCurrency(totalConsume);
                heroItems[1].textContent = formatCurrency(totalExpense);
            }
            if (heroSub) heroSub.textContent = `利润占比 ${formatPercent(pctProfit)}`;

            const lp = document.querySelector('.legend-profit-pct');
            const le = document.querySelector('.legend-expense-pct');
            if (lp) lp.textContent = pctProfit.toFixed(1);
            if (le) le.textContent = pctExpense.toFixed(1);
        }

        function updateHeroYear(monthFilter) {
            const totals = computeYtdTotals(monthFilter);
            const totalConsume = totals.consume;
            const totalExpense = totals.expense;
            const profit = totals.profit;
            const pctProfit = totalConsume > 0 ? (profit / totalConsume) * 100 : 0;
            const pctExpense = totalConsume > 0 ? (totalExpense / totalConsume) * 100 : 0;

            const heroValue = document.querySelector('.profit-hero-year .profit-hero-value');
            const heroItems = document.querySelectorAll('.profit-hero-year .profit-hero-item-value');
            const heroSub = document.querySelector('.profit-hero-year .profit-hero-sub');
            if (heroValue) {
                heroValue.textContent = formatCurrency(profit);
                heroValue.classList.toggle('positive-year', profit >= 0);
                heroValue.classList.toggle('negative', profit < 0);
            }
            if (heroItems && heroItems.length >= 2) {
                heroItems[0].textContent = formatCurrency(totalConsume);
                heroItems[1].textContent = formatCurrency(totalExpense);
            }
            if (heroSub) heroSub.textContent = `利润占比 ${formatPercent(pctProfit)}`;
            const lp = document.querySelector('.year-legend-profit-pct');
            const le = document.querySelector('.year-legend-expense-pct');
            if (lp) lp.textContent = pctProfit.toFixed(1);
            if (le) le.textContent = pctExpense.toFixed(1);
        }

        function exportReport() {
            const monthFilter = document.getElementById('monthFilter').value;
            const [yearStr, monthStr] = monthFilter.split('-');
            const year = parseInt(yearStr, 10);
            const month = parseInt(monthStr, 10);

            const filteredConsume = consumeData.filter(item => item.date.startsWith(monthFilter));
            const filteredExpense = expenseData.filter(item => item.date.startsWith(monthFilter));
            const totals = computeMonthTotals(monthFilter, filteredConsume, filteredExpense);

            const profitPercent = totals.totalConsume > 0 ? ((totals.profit / totals.totalConsume) * 100) : 0;

            const escape = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            const consumeAgg = new Map();
            filteredConsume.forEach(d => {
                const key = `${d.category}||${d.project}`;
                consumeAgg.set(key, (consumeAgg.get(key) || 0) + d.amount);
            });
            const consumeAggList = Array.from(consumeAgg.entries()).map(([key, amount]) => {
                const [category, project] = key.split('||');
                return { category, project, amount };
            }).sort((a, b) => b.amount - a.amount);

            const consumeRows = (consumeAggList.length ? consumeAggList : []).map(d => `
                <tr>
                    <td>${escape(d.category)}</td>
                    <td>${escape(d.project)}</td>
                    <td>${escape(formatCurrency(d.amount))}</td>
                </tr>
            `).join('');

            const expenseRows = (filteredExpense.length ? filteredExpense : []).map(d => `
                <tr>
                    <td>${escape(d.category)}</td>
                    <td>${escape(d.project)}</td>
                    <td>${escape(formatCurrency(d.amount))}</td>
                    <td>${escape(d.date)}</td>
                    <td>${escape(d.person)}</td>
                    <td></td>
                </tr>
            `).join('');

            const html = `
                <html>
                <head>
                    <meta charset="utf-8" />
                    <title>损益报表</title>
                </head>
                <body>
                    <h2>损益报表</h2>
                    <div>${year}年${month}月</div>
                    <h3>概要</h3>
                    <table border="1" cellspacing="0" cellpadding="6">
                        <tr><td>总消耗业绩</td><td>${escape(formatCurrency(totals.totalConsume))}</td></tr>
                        <tr><td>总支出费用</td><td>${escape(formatCurrency(totals.totalExpense))}</td></tr>
                        <tr><td>利润</td><td>${escape(formatCurrency(totals.profit))}</td></tr>
                        <tr><td>利润率</td><td>${escape(formatPercent(profitPercent))}</td></tr>
                    </table>

                    <h3>消耗业绩明细</h3>
                    <table border="1" cellspacing="0" cellpadding="6">
                        <tr><th>类别</th><th>商品分类名称</th><th>金额</th></tr>
                        ${consumeRows || '<tr><td colspan="3">暂无数据</td></tr>'}
                    </table>

                    <h3>支出费用明细</h3>
                    <table border="1" cellspacing="0" cellpadding="6">
                        <tr><th>类别</th><th>项目</th><th>金额</th><th>日期</th><th>经办人</th><th>备注</th></tr>
                        ${expenseRows || '<tr><td colspan="6">暂无数据</td></tr>'}
                    </table>
                </body>
                </html>
            `;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `损益报表_${year}年${month}月.xls`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function filterByMonth() {
            const monthFilter = document.getElementById('monthFilter').value;
            const filteredConsume = consumeData.filter(item => item.date.startsWith(monthFilter));
            const filteredExpense = expenseData.filter(item => item.date.startsWith(monthFilter));
            const totals = computeMonthTotals(monthFilter, filteredConsume, filteredExpense);

            updateHeroMonth(totals.totalConsume, totals.totalExpense, totals.profit);
            updateHeroYear(monthFilter);

            renderPnLTable(monthFilter, filteredConsume, filteredExpense, totals.totalConsume, totals.totalExpense, totals.profit);
            renderDonut(monthFilter, filteredExpense, totals.totalExpense);
            renderTrendChart(monthFilter);
        }

        document.getElementById('monthFilter').addEventListener('change', filterByMonth);
        filterByMonth();
    </script>
</body>
</html>
