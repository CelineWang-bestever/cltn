<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业绩汇总表 - 回蓝 · 美业收银系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#0D9488;--primary-light:#14B8A6;--primary-dark:#0F766E;--primary-bg:rgba(13,148,136,0.08);
            --bg:#F0FDFA;--bg-card:#FFFFFF;--bg-hover:#ECFDF5;--bg-dark:#1A2E2B;
            --border:#CCFBF1;--border-light:#D5F5F0;
            --text-primary:#2C2825;--text-secondary:#7A7268;--text-muted:#B0A89E;
            --success:#5BA876;--success-bg:rgba(91,168,118,0.1);
            --warning:#E8A838;--warning-bg:rgba(232,168,56,0.1);
            --error:#D45B5B;--error-bg:rgba(212,91,91,0.1);
            --info:#5B8FD4;--info-bg:rgba(91,143,212,0.1);
            --purple:#8B6DB5;--purple-bg:rgba(139,109,181,0.1);
            --pink:#D4728F;--pink-bg:rgba(212,114,143,0.1);
            --teal:#5BA8A0;--teal-bg:rgba(91,168,160,0.1);
            --gold:#D4A838;--gold-bg:rgba(212,168,56,0.1);
            --shadow-sm:0 1px 3px rgba(44,40,37,0.06);
            --shadow-md:0 4px 12px rgba(44,40,37,0.08);
            --shadow-lg:0 8px 24px rgba(44,40,37,0.12);
            --radius:10px;--radius-lg:14px;--radius-sm:6px;
        }
        body{font-family:'Noto Sans SC','DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.5;overflow:hidden;height:100vh}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        .app{display:flex;flex-direction:column;height:100vh}
        .top-bar{background:var(--bg-dark);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
        .top-bar-left{display:flex;align-items:center;gap:16px}
        .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:1px}
        .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
        .store-info{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.6);padding:6px 12px;background:rgba(255,255,255,0.08);border-radius:6px;cursor:pointer}
        .top-bar-right{display:flex;align-items:center;gap:12px}
        .top-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.08);border:none;border-radius:6px;cursor:pointer;transition:all .2s}
        .top-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
        .top-btn.active{background:var(--primary);color:#fff}
        .user-info{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,0.08);border-radius:6px;cursor:pointer}
        .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
        .user-name{font-size:13px}
        .main-area{display:flex;flex:1;overflow:hidden}
        .left-nav{width:220px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
        .nav-group{padding:12px 0}
        .nav-group-title{padding:6px 20px;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:1px;text-transform:uppercase}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
        .nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
        .nav-item.active{background:var(--primary-bg);color:var(--primary);border-left-color:var(--primary);font-weight:600}
        .nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
        .nav-item.active svg{opacity:1}
        .content-area{flex:1;overflow-y:auto;padding:24px 28px}
        .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .page-title{font-size:22px;font-weight:700;color:var(--text-primary)}
        .page-title-sub{font-size:13px;color:var(--text-muted);margin-top:2px}

        .filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .filter-left{display:flex;align-items:center;gap:12px}
        .table-tabs{display:flex;gap:0;background:var(--bg);border-radius:20px;padding:3px}
        .table-tab{padding:6px 16px;font-size:12px;color:var(--text-secondary);background:transparent;border:none;border-radius:16px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:500}
        .table-tab:hover{color:var(--text-primary)}
        .table-tab.active{background:var(--primary);color:#fff}

        .date-nav{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px}
        .date-nav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:6px;cursor:pointer;color:var(--text-secondary);font-size:14px;transition:all .15s}
        .date-nav-btn:hover{background:var(--primary-bg);color:var(--primary)}
        .date-nav-label{font-size:13px;font-weight:600;color:var(--text-primary);min-width:120px;text-align:center;padding:0 8px;font-family:'DM Sans','Noto Sans SC',sans-serif}

        .custom-range{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px}
        .custom-range input[type="date"]{border:1px solid var(--border-light);background:var(--bg);font-size:12px;color:var(--text-secondary);font-family:inherit;cursor:pointer;outline:none;padding:4px 8px;border-radius:6px}
        .custom-range input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.7}
        .custom-range input[type="date"]::-webkit-calendar-picker-indicator:hover{opacity:1}
        .custom-range .sep{color:var(--text-muted);font-size:12px}
        .custom-range .confirm-btn{padding:5px 14px;font-size:12px;color:#fff;background:var(--primary);border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
        .custom-range .confirm-btn:hover{background:var(--primary-dark)}

        .filter-right{display:flex;align-items:center;gap:10px}
        .export-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;color:var(--primary);background:var(--primary-bg);border:1px solid rgba(13,148,136,0.2);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
        .export-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

        .table-section{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
        .table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light)}
        .table-title{font-size:15px;font-weight:600;color:var(--text-primary)}
        .table-wrapper{overflow-x:auto;padding:0 0 8px 0}
        .data-table{width:100%;min-width:1200px;border-collapse:separate;border-spacing:0;font-size:13px}
        .data-table thead th{text-align:center;padding:10px 10px;background:#F8FAFB;color:var(--text-secondary);font-weight:600;font-size:11px;border-bottom:1px solid var(--border-light);white-space:nowrap;letter-spacing:.3px;vertical-align:middle}
        .data-table thead tr:first-child th{border-bottom:1px solid rgba(0,0,0,.06)}
        .data-table thead tr:last-child th{font-size:11px;padding:8px 8px}
        .data-table thead th.col-date{background:#F8FAFB;color:var(--text-primary);border-right:2px solid var(--border-light)}
        .data-table thead th.group-cash{background:#0D9488;color:#fff;font-weight:700;font-size:12px}
        .data-table thead th.group-consume{background:#5BA876;color:#fff;font-weight:700;font-size:12px}
        .data-table thead th.group-flow{background:#5B8FD4;color:#fff;font-weight:700;font-size:12px}
        .data-table thead th.group-member{background:#8B6DB5;color:#fff;font-weight:700;font-size:12px}
        .data-table thead th.col-normal{background:#F8FAFB;color:var(--text-secondary);border-left:2px solid var(--border-light)}
        .data-table thead th.sub-total{background:rgba(0,0,0,.03);color:var(--text-primary);font-weight:700;border-right:3px solid var(--border-light)}
        .data-table thead th.sub-cash{background:rgba(13,148,136,.07);color:#0B7B70;font-weight:600}
        .data-table thead th.sub-consume{background:rgba(91,168,118,.07);color:#2D6B3F;font-weight:600}
        .data-table thead th.sub-flow{background:rgba(91,143,212,.07);color:#2D5B8F;font-weight:600}
        .data-table thead th.sub-member{background:rgba(139,109,181,.07);color:#5B3D8B;font-weight:600}
        .data-table td{padding:10px 10px;border-bottom:1px solid var(--border-light);color:var(--text-primary);white-space:nowrap;font-family:'DM Sans',sans-serif;font-size:13px}
        .data-table tbody tr:last-child td{border-bottom:none}
        .data-table tbody tr:hover td{background:var(--bg-hover)}
        .data-table .num{text-align:right;font-weight:600}
        .data-table .total-row{background:#F8FAFB}
        .data-table .total-row td{font-weight:700;color:var(--text-primary);border-top:2px solid var(--border-light)}
        .data-table .section-row{background:#F8FAFB}
        .data-table .section-row td{font-weight:700;color:var(--text-primary);font-size:12px;padding:8px 12px;border-bottom:1px solid var(--border-light)}
        .data-table .highlight{color:var(--primary);font-weight:700}
        .data-table .subtle{color:var(--text-muted)}
        .data-table .target-row{background:rgba(13,148,136,0.06)}
        .data-table .target-row td{color:var(--primary-dark);font-weight:700;font-size:13px;padding:12px 10px}
        .data-table .target-row:first-of-type td{border-bottom:1px solid rgba(13,148,136,0.15);border-top:2px solid var(--primary)}
        .data-table .target-label{background:var(--primary);color:#fff;padding:5px 14px;border-radius:16px;font-size:11px;font-weight:700;margin-right:8px;display:inline-block;min-width:48px;text-align:center;letter-spacing:.5px;box-shadow:0 2px 4px rgba(13,148,136,0.3)}
        .data-table .target-label.green{background:var(--success)}
        .data-table .target-row.consume-bg{background:rgba(91,168,118,0.06)}
        .data-table .rate-up{color:var(--success);font-weight:700}
        .data-table .rate-down{color:var(--error);font-weight:700}
        .data-table .rate-warn{color:var(--warning);font-weight:700}

        .progress-row{background:rgba(13,148,136,0.03)}
        .progress-row td{padding:10px 12px!important;border-bottom:1px solid rgba(13,148,136,0.1)}
        .progress-container{display:flex;flex-direction:column;gap:10px;align-items:stretch}
        .progress-block{flex:1;min-width:0}
        .progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
        .progress-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
        .progress-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
        .progress-title .dot.cash{background:var(--primary)}
        .progress-title .dot.consume{background:var(--success)}
        .progress-title .dot.over{background:var(--gold)}
        .progress-gap{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
        .progress-gap.lack{background:rgba(232,168,56,0.12);color:var(--warning)}
        .progress-gap.done{background:rgba(91,168,118,0.12);color:var(--success)}
        .progress-bar-wrap{height:14px;background:var(--bg);border-radius:7px;overflow:hidden;position:relative}
        .progress-bar-fill{height:100%;border-radius:7px;transition:width .6s ease;position:relative;min-width:2px}
        .progress-bar-fill.cash-bar{background:linear-gradient(90deg,var(--primary),var(--primary-light))}
        .progress-bar-fill.cash-bar.over{background:linear-gradient(90deg,var(--gold),#E8C040)}
        .progress-bar-fill.consume-bar{background:linear-gradient(90deg,var(--success),#7BC890)}
        .progress-bar-fill.consume-bar.over{background:linear-gradient(90deg,var(--gold),#E8C040)}
        .progress-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
        .progress-current{font-size:11px;color:var(--text-secondary);font-family:'DM Sans',sans-serif}
        .progress-current b{color:var(--text-primary);font-weight:700}
        .progress-rate{font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif}
        .progress-rate.over{color:var(--gold)}

        @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .animate-in{animation:fadeInUp .4s ease forwards}
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="logo">
                    <div class="logo-icon">回</div>
                    <span>回蓝</span>
                </div>
                <div class="store-info">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span>慧来客月光码头店</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="top-btn active">日趋势</button>
                <button class="top-btn">月趋势</button>
                <div class="user-info">
                    <div class="user-avatar">管</div>
                    <span class="user-name">管理员</span>
                </div>
            </div>
        </div>
        <div class="main-area">
            <div class="left-nav">
                <div class="nav-group">
                    <div class="nav-group-title">数据概览</div>
                    <div class="nav-item" onclick="window.location.href='performance-overview.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        业绩汇总
                    </div>
                    <div class="nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                        业绩汇总表
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        顾客消费分析
                    </div>
                    <div class="nav-item" onclick="window.location.href='staff-performance.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        员工业绩
                    </div>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">经营管理</div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        项目销耗存表
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        销售消耗汇总表
                    </div>
                </div>
            </div>
            <div class="content-area">
                <div class="page-header">
                    <div>
                        <div class="page-title">业绩汇总表</div>
                        <div class="page-title-sub">门店业绩数据明细报表</div>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="filter-left">
                        <div class="table-tabs" id="viewTabs">
                            <button class="table-tab active" data-view="monthly">月</button>
                            <button class="table-tab" data-view="yearly">年</button>
                            <button class="table-tab" data-view="custom">自定义</button>
                        </div>
                        <div class="date-nav" id="dateNav">
                            <button class="date-nav-btn" id="navPrev">◀</button>
                            <span class="date-nav-label" id="navLabel">2026年5月</span>
                            <button class="date-nav-btn" id="navNext">▶</button>
                        </div>
                        <div class="custom-range" id="customRange" style="display:none">
                            <input type="date" id="customStart" value="2026-04-15">
                            <span class="sep">至</span>
                            <input type="date" id="customEnd" value="2026-05-15">

                        <button class="export-btn">

                            导出报表
                        </button>
                    </div>
                </div>

                <div class="table-section animate-in">
                    <div class="table-header">
                        <div class="table-title">业绩汇总表</div>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table" id="reportTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
        const COLS = 14;

        let currentView = 'monthly';
        let currentDate = new Date(2026, 4, 26);

        function formatNum(n) {
            return n.toLocaleString('zh-CN');
        }

        function updateNavLabel() {
            const label = document.getElementById('navLabel');
            if (currentView === 'monthly') {
                label.textContent = currentDate.getFullYear() + '年' + (currentDate.getMonth()+1) + '月';
            } else if (currentView === 'yearly') {
                label.textContent = currentDate.getFullYear() + '年';
            }
        }

        function navPrev() {
            if (currentView === 'monthly') {
                currentDate.setMonth(currentDate.getMonth() - 1);
            } else if (currentView === 'yearly') {
                currentDate.setFullYear(currentDate.getFullYear() - 1);
            }
            updateNavLabel();
            renderTable();
        }

        function navNext() {
            if (currentView === 'monthly') {
                currentDate.setMonth(currentDate.getMonth() + 1);
            } else if (currentView === 'yearly') {
                currentDate.setFullYear(currentDate.getFullYear() + 1);
            }
            updateNavLabel();
            renderTable();
        }

        function switchView(view) {
            currentView = view;
            const dateNav = document.getElementById('dateNav');
            const customRange = document.getElementById('customRange');

            document.querySelectorAll('.table-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.table-tab[data-view="'+view+'"]').classList.add('active');

            if (view === 'custom') {
                dateNav.style.display = 'none';
                customRange.style.display = 'flex';
            } else {
                dateNav.style.display = 'flex';
                customRange.style.display = 'none';
                updateNavLabel();
            }
            renderTable();
        }

        function buildDayRow(dateStr, cash, prodCash, careCash, cardCash, consume, courseCons, prodCons, zeroCare, nonZeroCare, prodFlow, totalFlow, trialMem, dealMem) {
            return '<tr><td>' + dateStr + '</td>' +
                '<td class="num highlight">¥' + formatNum(cash) + '</td>' +
                '<td class="num">¥' + formatNum(prodCash) + '</td>' +
                '<td class="num">¥' + formatNum(careCash) + '</td>' +
                '<td class="num">¥' + formatNum(cardCash) + '</td>' +
                '<td class="num highlight">¥' + formatNum(consume) + '</td>' +
                '<td class="num">¥' + formatNum(courseCons) + '</td>' +
                '<td class="num">¥' + formatNum(prodCons) + '</td>' +
                '<td class="num">' + zeroCare + '</td>' +
                '<td class="num">' + nonZeroCare + '</td>' +
                '<td class="num">' + prodFlow + '</td>' +
                '<td class="num">' + totalFlow + '</td>' +
                '<td class="num">' + trialMem + '</td>' +
                '<td class="num">' + dealMem + '</td></tr>';
        }

        function buildTotalRow(label, cash, prodCash, careCash, cardCash, consume, courseCons, prodCons, zeroCare, nonZeroCare, prodFlow, totalFlow, trialMem, dealMem) {
            return '<tr class="total-row"><td>' + label + '</td>' +
                '<td class="num">¥' + formatNum(cash) + '</td>' +
                '<td class="num">¥' + formatNum(prodCash) + '</td>' +
                '<td class="num">¥' + formatNum(careCash) + '</td>' +
                '<td class="num">¥' + formatNum(cardCash) + '</td>' +

        function getWeeksForMonth(year, month) {
            const daysInMonth = new Date(year, month, 0).getDate();
            const weeks = [];
            let weekStart = 1;
            let weekNum = 1;
            while (weekStart <= daysInMonth) {
                const remainingDays = daysInMonth - weekStart + 1;
                const weekLength = Math.min(7, remainingDays);
                const weekEnd = weekStart + weekLength - 1;
                weeks.push({ num: weekNum, start: weekStart, end: weekEnd });
                weekStart = weekEnd + 1;
                weekNum++;
            }
            return weeks;
        }

                        mConsume+=r.x; mCourse+=r.lc; mProd+=r.prc;
                        mZl+=r.zl; mNzl+=r.nzl; mPf+=r.pf; mTf+=r.tf; mTy+=r.ty; mDm+=r.dm;
                    } else {
                        const dateStr = String(mr.month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                        const fakeC = 1500 + Math.floor(Math.random()*1500);
                        const fakePC = Math.floor(fakeC*0.35);
                        const fakeCC = Math.floor(fakeC*0.35);
                        const fakeKC = fakeC - fakePC - fakeCC;
                        const fakeX = fakeC + 800 + Math.floor(Math.random()*1000);
                        const fakeLC = Math.floor(fakeX*0.6);
                        const fakePRC = fakeX - fakeLC;
                        const fakeZl = 1 + Math.floor(Math.random()*2);
                        const fakeNzl = 2 + Math.floor(Math.random()*4);
                        const fakePf = Math.floor(Math.random()*2);
                        const fakeTf = fakeZl + fakeNzl + fakePf;
                        const fakeTy = Math.floor(Math.random()*2);
                        const fakeDm = Math.floor(Math.random()*2);
                        html += buildDayRow(dateStr, fakeC, fakePC, fakeCC, fakeKC, fakeX, fakeLC, fakePRC, fakeZl, fakeNzl, fakePf, fakeTf, fakeTy, fakeDm);
                        mCash+=fakeC; mProdCash+=fakePC; mCareCash+=fakeCC; mCardCash+=fakeKC;
                        mConsume+=fakeX; mCourse+=fakeLC; mProd+=fakePRC;
                        mZl+=fakeZl; mNzl+=fakeNzl; mPf+=fakePf; mTf+=fakeTf; mTy+=fakeTy; mDm+=fakeDm;
                    }
                }
                html += buildTotalRow(mr.year + '年' + mr.month + '月小计', mCash, mProdCash, mCareCash, mCardCash, mConsume, mCourse, mProd, mZl, mNzl, mPf, mTf, mTy, mDm);
                totalCash+=mCash; totalProdCash+=mProdCash; totalCareCash+=mCareCash; totalCardCash+=mCardCash;
                totalConsume+=mConsume; totalCourse+=mCourse; totalProd+=mProd;
                totalZl+=mZl; totalNzl+=mNzl; totalPf+=mPf; totalTf+=mTf; totalTy+=mTy; totalDm+=mDm;
            });

            html += buildTotalRow('区间累计', totalCash, totalProdCash, totalCareCash, totalCardCash, totalConsume, totalCourse, totalProd, totalZl, totalNzl, totalPf, totalTf, totalTy, totalDm);
            html += '</tbody>';
            return THEAD + html;
        }

        function renderTable() {
            const table = document.getElementById('reportTable');
            if (currentView === 'monthly') {
                table.innerHTML = renderMonthlyTable(currentDate.getFullYear(), currentDate.getMonth()+1);
            } else if (currentView === 'yearly') {
                table.innerHTML = renderYearlyTable(currentDate.getFullYear());
            } else if (currentView === 'custom') {
                const startVal = document.getElementById('customStart').value;
                const endVal = document.getElementById('customEnd').value;
                table.innerHTML = renderCustomTable(startVal, endVal);
            }
        }

        document.querySelectorAll('.table-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchView(this.dataset.view);
            });
        });

        document.getElementById('navPrev').addEventListener('click', navPrev);
        document.getElementById('navNext').addEventListener('click', navNext);

        document.getElementById('customConfirm').addEventListener('click', function() {
            renderTable();
        });

        document.addEventListener('DOMContentLoaded', function() {
            switchView('monthly');
        });
    </script>
</body>
</html>
