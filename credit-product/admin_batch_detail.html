    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#409EFF',
                        secondary: '#6B7280'
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '2px',
                        DEFAULT: '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                        '2xl': '20px',
                        '3xl': '24px',

    <link rel="stylesheet" href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css">
    <style>
        body {
            min-height: 1024px;
            background-color: #f8fafc;
        }

        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .table-header {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .table-row:nth-child(even) {
            background-color: #f8fafc;
        }

        .table-row:nth-child(odd) {
            background-color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        .form-input:focus {
            outline: none;
            border-color: #409EFF;
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);

        .btn-cancel {
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background-color: white;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background-color: #f8fafc;
        }

        .btn-save {
            padding: 8px 16px;
            border: 1px solid #409EFF;
            border-radius: 4px;
            background-color: #409EFF;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover {
            background-color: #66b1ff;
        }

        .btn-delete {
            padding: 4px 8px;
            border: 1px solid #ef4444;
            border-radius: 4px;
            background-color: white;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background-color: #fef2f2;
        }

        .tab-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-item.active {
            border-bottom-color: #409EFF;
            color: #409EFF;
            font-weight: 600;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #409EFF;
            background-color: #f0f9ff;
        }
    </style>
</head>

                <div class="mb-1 px-4 py-2 rounded-md hover:bg-gray-700 cursor-pointer flex items-center" onclick="window.location.href='admin_storelist_v1.html'">

                <div class="mb-1 px-4 py-2 rounded-md hover:bg-gray-700 cursor-pointer flex items-center" onclick="window.location.href='admin_orderlist.html'">

    <!-- 主内容区 -->
    <div class="flex-1 p-6">
        <!-- 面包屑导航 -->
        <nav class="flex items-center mb-6">
            <span class="text-gray-500">首页</span>
            <i class="fas fa-chevron-right mx-2 text-gray-400 text-sm"></i>
            <span class="text-gray-500">寄售铺货</span>
            <i class="fas fa-chevron-right mx-2 text-gray-400 text-sm"></i>
            <span class="text-gray-500">报名管理</span>
            <i class="fas fa-chevron-right mx-2 text-gray-400 text-sm"></i>
            <span class="text-gray-800 font-medium">报名批次详情</span>
        </nav>
        <!-- 主要内容卡片 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <!-- 标题区域 -->
            <div class="p-6 border-b border-gray-200 bg-gray-50">
                <h1 class="text-xl font-semibold text-gray-800">报名批次详情</h1>
            </div>
            <!-- 表单区域 -->
            <div class="p-6">
                <!-- 基本信息 -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">基本信息</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="form-group">
                            <label class="form-label">批次名称 <span class="text-red-500">*</span></label>
                            <input type="text" class="form-input" id="batchName" placeholder="请输入批次名称" maxlength="50">
                        </div>
                        <div class="form-group">
                            <label class="form-label">合同生效时间 <span class="text-red-500">*</span></label>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="date" class="form-input" id="contractStartDate" placeholder="开始日期">
                                <input type="date" class="form-input" id="contractEndDate" placeholder="结束日期">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 允许参加范围 -->
                <div class="mb-8">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">允许参加范围 <span class="text-red-500">*</span></h2>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="allStores" name="scopeType" value="all" checked onchange="toggleScopeOptions()">
                            <label for="allStores">全部门店</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="byBranch" name="scopeType" value="branch" onchange="toggleScopeOptions()">
                            <label for="byBranch">按分公司</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="partialStores" name="scopeType" value="partial" onchange="toggleScopeOptions()">
                            <label for="partialStores">选择门店</label>
                        </div>
                    </div>
                    
                    <!-- 按分公司选项 -->
                    <div id="branchOptions" class="mt-4 p-4 border border-gray-200 rounded-md" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">选择分公司</label>
                            <select class="form-input" id="branchSelect">
                                <option value="">请选择分公司</option>
                                <option value="BR001">BR001 - 上海分公司</option>
                                <option value="BR002">BR002 - 北京分公司</option>
                                <option value="BR003">BR003 - 广州分公司</option>
                                <option value="BR004">BR004 - 深圳分公司</option>
                                <option value="BR005">BR005 - 杭州分公司</option>
                            </select>
                            <button class="btn-save mt-2" onclick="addBranch()">添加分公司</button>
                        </div>
                        <div class="mt-4">
                            <div class="text-gray-600 mb-2">已选分公司 <span id="selectedBranchCount">0</span> 家</div>
                            <div class="border border-gray-200 rounded-md overflow-hidden">
                                <table class="w-full">
                                    <thead class="table-header">
                                        <tr>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">分公司编码</th>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">分公司名称</th>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="selectedBranchTable">
                                        <!-- 动态生成 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 选择门店选项 -->
                    <div id="partialStoreOptions" class="mt-4 p-4 border border-gray-200 rounded-md" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">选择门店</label>
                            <select class="form-input" id="storeSelect">
                                <option value="">请选择门店</option>
                                <option value="STORE001">STORE001 - 克丽缇娜上海旗舰店</option>
                                <option value="STORE002">STORE002 - 克丽缇娜北京朝阳店</option>
                                <option value="STORE003">STORE003 - 克丽缇娜广州天河店</option>
                                <option value="STORE004">STORE004 - 克丽缇娜深圳南山店</option>
                                <option value="STORE005">STORE005 - 克丽缇娜杭州西湖店</option>
                            </select>
                            <button class="btn-save mt-2" onclick="addStore()">添加门店</button>
                        </div>
                        <div class="mt-4">
                            <div class="text-gray-600 mb-2">已选门店 <span id="selectedStoreCount">0</span> 家</div>
                            <div class="border border-gray-200 rounded-md overflow-hidden">
                                <table class="w-full">
                                    <thead class="table-header">
                                        <tr>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">门店编码</th>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">门店名称</th>
                                            <th class="py-2 px-4 text-left text-gray-600 font-medium">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="selectedStoreTable">
                                        <!-- 动态生成 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="form-label">导入门店</label>
                            <div class="upload-area" onclick="document.getElementById('storeFileUpload').click()">
                                <i class="fas fa-cloud-upload-alt text-gray-400 text-3xl mb-2"></i>
                                <p class="text-gray-600 mb-2">点击或拖拽文件到此处上传</p>
                                <p class="text-gray-400 text-sm">支持 Excel 文件格式 (.xlsx, .xls)</p>
                                <input type="file" class="hidden" id="storeFileUpload" accept=".xlsx,.xls">
                            </div>
                            <div class="mt-2">
                                <span class="text-gray-600" id="storeFileName">未选择文件</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 底部按钮 -->
                <div class="flex justify-end gap-4 pt-4 border-t border-gray-200">
                    <button class="btn-cancel" onclick="goBack()">取消</button>
                    <button class="btn-save" onclick="saveBatchDetail()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换范围选项显示
        function toggleScopeOptions() {
            const scopeType = document.querySelector('input[name="scopeType"]:checked').value;
            
            // 隐藏所有选项
            document.getElementById('branchOptions').style.display = 'none';
            document.getElementById('partialStoreOptions').style.display = 'none';
            
            // 显示选中的选项
            if (scopeType === 'branch') {
                document.getElementById('branchOptions').style.display = 'block';
            } else if (scopeType === 'partial') {
                document.getElementById('partialStoreOptions').style.display = 'block';
            }
        }
        
        // 已选分公司数组
        let selectedBranches = [];
        
        // 添加分公司
        function addBranch() {
            const select = document.getElementById('branchSelect');
            const value = select.value;
            const text = select.options[select.selectedIndex].text;
            
            if (!value) {
                alert('请选择分公司');
                return;
            }
            
            // 检查是否已添加
            if (selectedBranches.some(branch => branch.value === value)) {
                alert('该分公司已添加');
                return;
            }
            
            // 添加到数组
            selectedBranches.push({ value, text });
            
            // 更新表格
            updateSelectedBranches();
            
            // 重置选择
            select.value = '';
        }
        
        // 更新已选分公司列表
        function updateSelectedBranches() {
            const table = document.getElementById('selectedBranchTable');
            const countElement = document.getElementById('selectedBranchCount');
            
            // 更新计数
            countElement.textContent = selectedBranches.length;
            
            // 清空表格
            table.innerHTML = '';
            
            // 填充表格
            selectedBranches.forEach(branch => {
                const [code, name] = branch.text.split(' - ');
                const row = document.createElement('tr');
                row.className = 'table-row';
                row.innerHTML = `
                    <td class="py-2 px-4 text-gray-800">${code}</td>
                    <td class="py-2 px-4 text-gray-600">${name}</td>
                    <td class="py-2 px-4">
                        <button class="btn-delete" onclick="removeBranch('${branch.value}')">删除</button>
                    </td>
                `;
                table.appendChild(row);
            });
        }
        
        // 移除分公司
        function removeBranch(value) {
            selectedBranches = selectedBranches.filter(branch => branch.value !== value);
            updateSelectedBranches();
        }
        
        // 已选门店数组
        let selectedStores = [];
        
        // 添加门店
        function addStore() {
            const select = document.getElementById('storeSelect');
            const value = select.value;
            const text = select.options[select.selectedIndex].text;
            
            if (!value) {
                alert('请选择门店');
                return;
            }
            
            // 检查是否已添加
            if (selectedStores.some(store => store.value === value)) {
                alert('该门店已添加');
                return;
            }
            
            // 添加到数组
            selectedStores.push({ value, text });
            
            // 更新表格
            updateSelectedStores();
            
            // 重置选择
            select.value = '';
        }
        
        // 更新已选门店列表
        function updateSelectedStores() {
            const table = document.getElementById('selectedStoreTable');
            const countElement = document.getElementById('selectedStoreCount');
            
            // 更新计数
            countElement.textContent = selectedStores.length;
            
            // 清空表格
            table.innerHTML = '';
            
            // 填充表格
            selectedStores.forEach(store => {
                const [code, name] = store.text.split(' - ');
                const row = document.createElement('tr');
                row.className = 'table-row';
                row.innerHTML = `
                    <td class="py-2 px-4 text-gray-800">${code}</td>
                    <td class="py-2 px-4 text-gray-600">${name}</td>
                    <td class="py-2 px-4">
                        <button class="btn-delete" onclick="removeStore('${store.value}')">删除</button>
                    </td>
                `;
                table.appendChild(row);
            });
        }
        
        // 移除门店
        function removeStore(value) {
            selectedStores = selectedStores.filter(store => store.value !== value);
            updateSelectedStores();
        }
        
        // 处理文件上传
        document.getElementById('storeFileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('storeFileName').textContent = file.name;
            } else {
                document.getElementById('storeFileName').textContent = '未选择文件';
            }
        });
        
        // 保存批次详情
        function saveBatchDetail() {
            const batchName = document.getElementById('batchName').value;
            const contractStartDate = document.getElementById('contractStartDate').value;
            const contractEndDate = document.getElementById('contractEndDate').value;
            const scopeType = document.querySelector('input[name="scopeType"]:checked').value;
            
            // 验证必填项
            if (!batchName) {
                alert('请输入批次名称');
                return;
            }
            
            if (!contractStartDate || !contractEndDate) {
                alert('请选择合同生效时间');
                return;
            }
            
            if (new Date(contractEndDate) < new Date(contractStartDate)) {
                alert('合同结束日期不能早于开始日期');
                return;
            }
            
            // 验证范围选择
            if (scopeType === 'branch') {
                if (selectedBranches.length === 0) {
                    alert('请选择至少一个分公司');
                    return;
                }
            } else if (scopeType === 'partial') {
                const fileInput = document.getElementById('storeFileUpload');
                if (selectedStores.length === 0 && !fileInput.files.length) {
                    alert('请选择门店或导入门店文件');
                    return;
                }
            }
            
            // 模拟保存操作
            alert('保存成功！');
            goBack();
        }
        
        // 返回上一页
        function goBack() {
            window.location.href = 'admin_batch_management.html';
        }
        
        // 初始化页面
        function initPage() {
            // 获取URL参数
            const params = new URLSearchParams(window.location.search);
            const batchId = params.get('batchId');
            
            // 如果是编辑或查看模式，加载数据
            if (batchId) {
                // 模拟加载数据
                // 实际项目中，这里应该通过API获取数据
                document.getElementById('batchName').value = `批次 ${batchId}`;
                document.getElementById('contractStartDate').value = '2026-03-01';
                document.getElementById('contractEndDate').value = '2026-05-31';
            }
        }
        
        // 页面加载完成后初始化
        window.onload = initPage;
    </script>
</body>
