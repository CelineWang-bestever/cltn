<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日经营数据上传</title>
    <style>
        :root {
            --primary: #E8A0B4;
            --primary-dark: #D4879B;
            --primary-light: #F5D5DE;
            --primary-bg: #FFF5F7;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --bg-page: #FAFAFA;
            --border-color: #EEEEEE;
            --success: #52C41A;
            --error: #FF4D4F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: PingFang SC, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面容器 */
        .page-container {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 资料类型标签选择器 */
        .type-selector {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #FFFFFF;
            padding: 12px 10px;
        }

        .type-selector-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        .type-custom-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .type-custom-input-wrap {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        .type-custom-input {
            width: 100%;
            height: 38px;
            padding: 0 34px 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            outline: none;
            font-size: 14px;
            background: #FFFFFF;
            color: var(--text-primary);
        }

        .type-custom-input:focus {
            border-color: var(--primary);
        }

        .type-custom-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 999px;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .type-custom-input-wrap.has-value .type-custom-clear {
            display: flex;
        }

        .type-custom-add {
            height: 38px;
            padding: 0 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        .type-custom-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .type-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: visible;
            white-space: normal;
            padding-bottom: 0;
        }

        .type-options::-webkit-scrollbar {
            display: none;
        }

        .type-option {
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            max-width: 100%;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
            text-align: center;
            line-height: 1.2;
        }

        .type-option:hover {
            border-color: var(--primary);
        }

        .type-option.selected {
            color: #FFFFFF;
            background: var(--primary);
            border-color: var(--primary);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px 10px;
        }

        /* 按钮区域 */
        .action-buttons {
            display: flex;
            flex-direction: row;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            min-height: 56px;
            padding: 16px 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .action-btn.primary {
            background: var(--primary);
            color: #FFFFFF;
        }

        .action-btn.primary:active {
            background: var(--primary-dark);
            transform: scale(0.98);
        }

        .action-btn.secondary {
            background: var(--bg-page);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .action-btn.secondary:active {
            background: var(--border-color);
            transform: scale(0.98);
        }

        /* 已上传文件列表 */
        .uploaded-section {
            margin-top: 12px;
            padding-top: 24px;
        }

        .uploaded-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .uploaded-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .uploaded-count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .uploaded-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .uploaded-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .uploaded-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: var(--bg-page);
        }

        .uploaded-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .uploaded-item .delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .uploaded-item:active .delete-btn { opacity: 1; }

        .uploaded-item .delete-btn:hover {
            background: rgba(0, 0, 0, 0.65);
        }

        .uploaded-item .delete-btn svg {
            width: 14px;
            height: 14px;
            fill: #FFFFFF;
        }

        .uploaded-item .status {
            position: absolute;
            bottom: 4px;
            left: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            color: #FFFFFF;
        }

        .uploaded-item .status.success {
            background: var(--success);
        }

        .uploaded-item .status.error {
            background: var(--error);
        }

        .uploaded-item .status.uploading {
            background: var(--primary);
        }

        .uploaded-name-wrap {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .uploaded-name-input {
            width: 100%;
            height: 34px;
            padding: 0 30px 0 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            outline: none;
            background: #FFFFFF;
            font-size: 12px;
            color: var(--text-primary);
        }

        .uploaded-name-input:focus {
            border-color: var(--primary);
        }

        .uploaded-name-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 999px;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .uploaded-name-wrap.has-value .uploaded-name-clear {
            display: flex;
        }

        /* 日期选择区域 */
        .date-section {
            background: #FFFFFF;
            border-radius: 12px;
        }

        .date-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .date-label .required {
            color: var(--error);
            margin-left: 4px;
        }

        .date-label .hint {
            font-size: 12px;
            font-weight: normal;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .date-input-wrap {
            position: relative;
        }

        .date-input {
            width: 100%;
            height: 48px;
            padding: 0 48px 0 16px;
            font-size: 16px;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            background: #FFFFFF;
            cursor: pointer;
        }

        .date-input:focus {
            border-color: var(--primary);
        }

        .date-input.error {
            border-color: var(--error);
        }

        .date-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .date-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
        }

        /* 日期选择器弹窗 */
        .date-picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .date-picker-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .date-picker-content {
            width: 100%;
            max-width: 430px;
            background: #FFFFFF;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .date-picker-modal.show .date-picker-content {
            transform: translateY(0);
        }

        .date-picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .date-picker-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-picker-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .date-picker-close svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .date-picker-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .date-picker-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .date-picker-day.weekday {
            font-size: 12px;
            color: var(--text-muted);
            cursor: default;
        }

        .date-picker-day.today {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }

        .date-picker-day.selected {
            background: var(--primary);
            color: #FFFFFF;
        }

        .date-picker-day.disabled {
            color: #E0E0E0;
            cursor: not-allowed;
        }

        .date-picker-day:hover:not(.disabled):not(.weekday) {
            background: var(--primary-bg);
        }

        .date-picker-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .date-picker-nav button {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .date-picker-nav button svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .date-picker-month {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-picker-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .date-picker-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .date-picker-btn.secondary {
            background: var(--bg-page);
            color: var(--text-secondary);
        }

        .date-picker-btn.primary {
            background: var(--primary);
            color: #FFFFFF;
        }

        .date-picker-btn:active {
            transform: scale(0.98);
        }

        /* 备注区域 */
        .remark-section {
            margin-top: 20px;
        }

        .remark-input {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .remark-input:focus {
            border-color: var(--primary);
        }

        /* 底部按钮 */
        .bottom-bar {
            padding: 16px 20px;
            background: #FFFFFF;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .bottom-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bottom-buttons .action-buttons {
            gap: 12px;
        }

        .bottom-buttons .action-btn {
            min-height: 52px;
            padding: 14px 20px;
            font-size: 15px;
            gap: 10px;
        }

        .bottom-buttons .action-btn svg {
            width: 22px;
            height: 22px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: #FFFFFF;
            transition: all 0.2s;
        }

        .submit-btn:disabled {
            background: #E8E8E8;
            color: #999999;
            cursor: not-allowed;
        }

        .submit-btn:not(:disabled):active {
            background: var(--primary-dark);
            transform: scale(0.98);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 24px;
            background: rgba(0, 0, 0, 0.75);
            color: #FFFFFF;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* 隐藏的文件选择器 */
        #cameraInput,
        #galleryInput {
            display: none;
        }

        /* 空状态 */
        .empty-uploaded {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 响应式适配 */
        @media screen and (max-width: 360px) {
            .action-btn {
                min-height: 52px;
                padding: 14px 20px;
                font-size: 15px;
            }

            .action-btn svg {
                width: 22px;
                height: 22px;
            }

            .uploaded-grid {
                gap: 8px;
            }

            .type-option {
                padding: 7px 12px;
                font-size: 13px;
            }

            .type-custom-input {
                height: 36px;
                font-size: 13px;
            }

            .type-custom-add {
                height: 36px;
                font-size: 13px;
            }

            .uploaded-name-input {
                height: 32px;
                font-size: 12px;
            }
        }

        @media screen and (min-width: 400px) {
            .action-buttons {
                gap: 20px;
            }

            .action-btn {
                min-height: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                    </svg>
                </button>
                <h1 class="header-title">上传资料</h1>
            </div>
        </header>

        <!-- 资料类型选择器 -->
        <div class="type-selector">
            <div class="type-selector-label">资料类型</div>
            <div class="type-custom-row">
                <div class="type-custom-input-wrap" id="customTypeInputWrap">
                    <input class="type-custom-input" id="customTypeInput" type="text" inputmode="text" maxlength="20" placeholder="添加自定义标签（选填）">
                    <button class="type-custom-clear" id="customTypeClear" type="button" aria-label="清空">×</button>
                </div>
                <button class="type-custom-add" id="customTypeAddBtn" type="button" disabled>添加</button>
            </div>
            <div class="type-options" id="typeOptions"></div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 已上传文件列表 -->
            <div class="uploaded-section" id="uploadedSection" style="display: none;">
                <div class="uploaded-header">
                    <span class="uploaded-title">已上传</span>
                    <span class="uploaded-count" id="uploadedCount">0/10</span>
                </div>
                <div class="uploaded-grid" id="uploadedGrid"></div>
            </div>


        </main>

        <!-- 底部按钮 -->
        <footer class="bottom-bar">
            <div class="bottom-buttons">
                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="triggerCamera()">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                        拍照上传
                    </button>
                    <button class="action-btn primary" onclick="triggerGallery()">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 2v3h-2.5V6h-1v3H15V6h-1v3H12.5V6h-1v3H10V6H8zm0 12H4v-1h16v1zm0-3H4v-1h16v1zm0-3H4V9h16v1zm0-3H4V6h16v1z" />
                        </svg>
                        相册选择
                    </button>
                </div>
                <button class="submit-btn" id="submitBtn" disabled onclick="submitUpload()">确认上传</button>
            </div>
        </footer>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 日期选择器弹窗 -->
    <div class="date-picker-modal" id="datePickerModal" onclick="closeDatePicker()">
        <div class="date-picker-content" onclick="event.stopPropagation()">
            <div class="date-picker-header">
                <span class="date-picker-title">选择经营数据日期</span>
                <button class="date-picker-close" onclick="closeDatePicker()">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>
            <div class="date-picker-nav">
                <button onclick="changeMonth(-1)">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
                <span class="date-picker-month" id="datePickerMonth"></span>
                <button onclick="changeMonth(1)">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                    </svg>
                </button>
            </div>
            <div class="date-picker-calendar" id="datePickerCalendar"></div>
            <div class="date-picker-actions">
                <button class="date-picker-btn secondary" onclick="closeDatePicker()">取消</button>
                <button class="date-picker-btn primary" onclick="confirmDate()">确认</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件选择器 -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple>
    <input type="file" id="galleryInput" accept="image/jpeg,image/png,image/jpg" multiple>

    <script>
        // 已上传文件列表
        let uploadedFiles = [];
        const maxFiles = 10;
        const imageExtensions = ['jpg', 'jpeg', 'png'];

        // 当前选中的资料类型
        let selectedRecordType = 'daily';
        let selectedRecordTypeLabel = '每日经营';
        const CUSTOM_TYPES_STORAGE_KEY = 'daily_upload_custom_types_v2';
        const recordTypeMap = {
            'daily': '每日经营',
            'customer': '客户资料',
            'appointment': '预约表',
            'kpi': '员工月度KPI',
            'income': '收入及消费分析',
            'product': '品项经营分析',
            'financial': '财务支出',
            'other': '其他'
        };

        const systemTypes = Object.keys(recordTypeMap).map(k => ({ key: k, label: recordTypeMap[k] }));
        let customTypes = [];

        // 选择资料类型
        function selectRecordType(el) {
            document.querySelectorAll('#typeOptions .type-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedRecordType = el.dataset.type;
            selectedRecordTypeLabel = el.getAttribute('data-label') || el.textContent.trim() || (recordTypeMap[selectedRecordType] || '');
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeHtmlAttr(str) {
            return escapeHtml(str).replace(/\n/g, ' ');
        }

        function sanitizeCustomTypeLabel(v) {
            let s = String(v || '');
            s = s.replace(/[\u0000-\u001f]/g, '');
            s = s.replace(/[\\\/:*?"<>|]/g, '');
            s = s.replace(/\s+/g, ' ').trim();
            if (s.length > 20) s = s.slice(0, 20);
            return s;
        }

        function normalizeTypeKeyForCompare(v) {
            return String(v || '').trim().toLowerCase();
        }

        function loadCustomTypes() {
            try {
                const raw = localStorage.getItem(CUSTOM_TYPES_STORAGE_KEY) || '[]';
                const arr = JSON.parse(raw);
                if (!Array.isArray(arr)) return [];
                return arr.map(x => sanitizeCustomTypeLabel(x)).filter(Boolean);
            } catch {
                return [];
            }
        }

        function saveCustomTypes() {
            localStorage.setItem(CUSTOM_TYPES_STORAGE_KEY, JSON.stringify(customTypes.slice()));
        }

        function renderTypeOptions() {
            const wrap = document.getElementById('typeOptions');
            if (!wrap) return;

            const currentKey = String(selectedRecordType || 'daily');
            const pieces = [];

            systemTypes.forEach(t => {
                const selected = currentKey === t.key ? 'selected' : '';
                pieces.push(`<div class="type-option ${selected}" data-type="${escapeHtmlAttr(t.key)}" data-label="${escapeHtmlAttr(t.label)}" onclick="selectRecordType(this)">${escapeHtml(t.label)}</div>`);
            });

            customTypes.forEach(label => {
                const typeKey = `custom:${label}`;
                const selected = currentKey === typeKey ? 'selected' : '';
                pieces.push(`<div class="type-option ${selected}" data-type="${escapeHtmlAttr(typeKey)}" data-label="${escapeHtmlAttr(label)}" onclick="selectRecordType(this)">${escapeHtml(label)}</div>`);
            });

            wrap.innerHTML = pieces.join('');

            const match = Array.from(wrap.querySelectorAll('.type-option')).find(x => String(x.getAttribute('data-type') || '') === currentKey) || null;
            if (match) {
                selectedRecordTypeLabel = match.getAttribute('data-label') || match.textContent.trim() || selectedRecordTypeLabel;
            } else {
                const fallback = wrap.querySelector('.type-option[data-type="daily"]');
                if (fallback) {
                    fallback.classList.add('selected');
                    selectedRecordType = 'daily';
                    selectedRecordTypeLabel = fallback.getAttribute('data-label') || fallback.textContent.trim() || '每日经营';
                }
            }
        }

        // 返回
        function goBack() {
            if (uploadedFiles.length > 0) {
                if (confirm('您有未上传的文件，确定要离开吗？')) {
                    window.history.back();
                }
            } else {
                window.history.back();
            }
        }

        // 触发拍照
        function triggerCamera() {
            document.getElementById('cameraInput').click();
        }

        // 触发相册选择
        function triggerGallery() {
            document.getElementById('galleryInput').click();
        }

        // 处理拍照选择
        document.getElementById('cameraInput').addEventListener('change', handleFiles);

        // 处理相册选择
        document.getElementById('galleryInput').addEventListener('change', handleFiles);

        // 处理选择的文件
        function handleFiles(e) {
            const files = e.target.files;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];

                if (uploadedFiles.length >= maxFiles) {
                    showToast(`最多上传${maxFiles}个文件`);
                    break;
                }

                const extension = file.name.split('.').pop().toLowerCase();
                if (!imageExtensions.includes(extension)) {
                    showToast(`${file.name} 格式不支持`);
                    continue;
                }

                const isDuplicate = uploadedFiles.some(f => f.name === file.name && f.size === file.size);
                if (isDuplicate) {
                    continue;
                }

                uploadedFiles.push({
                    id: Date.now() + i,
                    name: file.name,
                    customName: '',
                    file: file,
                    thumb: URL.createObjectURL(file),
                    status: 'success',
                    size: file.size
                });
            }

            renderUploadedList();
            updateSubmitBtn();

            // 清空input以便重复选择同一文件
            e.target.value = '';
        }

        // 渲染已上传列表
        function renderUploadedList() {
            const section = document.getElementById('uploadedSection');
            const grid = document.getElementById('uploadedGrid');
            const count = document.getElementById('uploadedCount');

            if (uploadedFiles.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            count.textContent = `${uploadedFiles.length}/${maxFiles}`;

            grid.innerHTML = uploadedFiles.map(item => {
                const safeName = escapeHtml(String(item.name || ''));
                const val = String(item.customName || '');
                const has = !!val.trim();
                return `
                    <div class="uploaded-card">
                        <div class="uploaded-item">
                            <img src="${item.thumb}" alt="${safeName}">
                            <span class="status ${item.status}">${getStatusText(item.status)}</span>
                            <div class="delete-btn" onclick="deleteFile(${item.id})">
                                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                            </div>
                        </div>
                        <div class="uploaded-name-wrap ${has ? 'has-value' : ''}">
                            <input class="uploaded-name-input" data-id="${item.id}" type="text" inputmode="text" maxlength="50" placeholder="图片命名（选填）" value="${escapeHtmlAttr(val)}">
                            <button class="uploaded-name-clear" type="button" data-action="clear-name" data-id="${item.id}" aria-label="清空">×</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 获取状态文本
        function getStatusText(status) {
            return { success: '已上传', error: '失败', uploading: '上传中' }[status] || status;
        }

        // 删除文件
        function deleteFile(id) {
            event.stopPropagation();
            uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            renderUploadedList();
            updateSubmitBtn();
        }

        function sanitizeCustomName(v) {
            let s = String(v || '');
            s = s.replace(/[\u0000-\u001f]/g, '');
            s = s.replace(/[\\\/:*?"<>|]/g, '');
            if (s.length > 50) s = s.slice(0, 50);
            return s;
        }

        document.getElementById('uploadedGrid')?.addEventListener('input', function (e) {
            const el = e.target;
            if (!(el instanceof HTMLInputElement)) return;
            if (!el.classList.contains('uploaded-name-input')) return;
            const id = parseInt(String(el.getAttribute('data-id') || '0'), 10);
            if (!id) return;
            const sanitized = sanitizeCustomName(el.value);
            if (sanitized !== el.value) el.value = sanitized;
            const item = uploadedFiles.find(x => x.id === id);
            if (item) item.customName = sanitized;
            const wrap = el.closest('.uploaded-name-wrap');
            if (wrap) wrap.classList.toggle('has-value', !!sanitized.trim());
        });

        document.getElementById('uploadedGrid')?.addEventListener('click', function (e) {
            const btn = e.target.closest('[data-action="clear-name"]');
            if (!(btn instanceof Element)) return;
            const id = parseInt(String(btn.getAttribute('data-id') || '0'), 10);
            if (!id) return;
            const item = uploadedFiles.find(x => x.id === id);
            if (item) item.customName = '';
            const wrap = btn.closest('.uploaded-name-wrap');
            const input = wrap?.querySelector('.uploaded-name-input');
            if (input instanceof HTMLInputElement) input.value = '';
            if (wrap) wrap.classList.remove('has-value');
        });

        // 更新提交按钮状态
        function updateSubmitBtn() {
            const btn = document.getElementById('submitBtn');
            const hasFiles = uploadedFiles.length > 0;
            btn.disabled = !hasFiles;
        }

        // 提交上传
        function submitUpload() {
            // 验证文件
            if (uploadedFiles.length === 0) {
                showToast('请先选择文件');
                return;
            }

            const uploadPayload = uploadedFiles.map(item => {
                const custom = String(item.customName || '').trim();
                const uploadName = custom ? custom : String(item.name || '');
                return {
                    id: item.id,
                    recordType: selectedRecordType,
                    recordTypeLabel: selectedRecordTypeLabel || (recordTypeMap[selectedRecordType] || ''),
                    originalName: String(item.name || ''),
                    uploadName
                };
            });

            // 模拟API调用
            showToast('正在上传...');

            setTimeout(() => {
                showToast('上传成功');
                uploadedFiles = [];
                renderUploadedList();
                updateSubmitBtn();
            }, 1500);
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function () {
            customTypes = loadCustomTypes();
            const input = document.getElementById('customTypeInput');
            const addBtn = document.getElementById('customTypeAddBtn');
            const wrap = document.getElementById('customTypeInputWrap');
            const clearBtn = document.getElementById('customTypeClear');

            function syncCustomTypeInputUi() {
                const v = sanitizeCustomTypeLabel(input?.value || '');
                const has = !!v;
                if (wrap) wrap.classList.toggle('has-value', has);
                if (addBtn) addBtn.disabled = !has;
            }

            function tryAddCustomType() {
                if (!input) return;
                const raw = sanitizeCustomTypeLabel(input.value);
                if (!raw) return;

                const normalized = normalizeTypeKeyForCompare(raw);
                const systemDup = systemTypes.some(t => normalizeTypeKeyForCompare(t.label) === normalized);
                const customDup = customTypes.some(t => normalizeTypeKeyForCompare(t) === normalized);
                if (systemDup || customDup) {
                    showToast('标签已存在');
                    return;
                }

                customTypes.push(raw);
                saveCustomTypes();
                input.value = '';
                syncCustomTypeInputUi();

                selectedRecordType = `custom:${raw}`;
                selectedRecordTypeLabel = raw;
                renderTypeOptions();
            }

            input?.addEventListener('input', function () {
                const sanitized = sanitizeCustomTypeLabel(this.value);
                if (sanitized !== this.value) this.value = sanitized;
                syncCustomTypeInputUi();
            });
            input?.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter') return;
                e.preventDefault();
                tryAddCustomType();
            });
            addBtn?.addEventListener('click', tryAddCustomType);
            clearBtn?.addEventListener('click', function () {
                if (!input) return;
                input.value = '';
                syncCustomTypeInputUi();
                input.focus();
            });

            syncCustomTypeInputUi();
            renderTypeOptions();
        });
    </script>
</body>

</html>
