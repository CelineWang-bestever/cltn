<!-- addProductModalOverlay -- 独立组件模板 -->
<div class="add-service-modal-overlay" id="addProductModalOverlay">
        <div class="add-service-modal">
            <div class="add-service-modal-header">
                <span class="add-service-modal-title">添加产品</span>
                <div class="add-service-modal-close" id="addProductModalClose">×</div>
            </div>
            <div class="add-service-modal-body">
                <!-- 搜索区域 -->
                <div class="add-service-search-section">
                    <div class="add-service-search-left">
                        <div class="add-service-search-box">
                            <input type="text" class="add-service-search-input" id="addProductSearchInput"
                                placeholder="搜索商品名称">
                        </div>
                        <div class="add-service-recent-search">
                            <div class="add-service-recent-title">最近搜索</div>
                            <div class="add-service-recent-list" id="addProductRecentList"></div>
                        </div>
                    </div>
                </div>

                <!-- 已选商品区域 -->
                <div class="add-service-selected-section">
                    <div class="add-service-selected-header">
                        <span class="add-service-selected-title">已选商品</span>
                        <div class="add-service-selected-actions">
                            <button class="add-service-btn clear" id="addProductClearBtn">清空</button>
                            <button class="add-service-btn confirm" id="addProductConfirmBtn">确定</button>
                        </div>
                    </div>
                    <div class="add-service-selected-list" id="addProductSelectedList">
                        <div class="add-service-empty-hint">点击商品名称添加商品</div>
                    </div>
                </div>

                <!-- 待选商品区域 - 左右布局 -->
                <div class="add-product-table-section">
                    <div class="add-product-left-nav">
                        <div class="add-product-category-nav">
                            <div class="add-product-category-item active" data-category="all">全部</div>
                            <div class="add-product-category-item" data-category="skincare">护肤品</div>
                            <div class="add-product-category-item" data-category="makeup">彩妆</div>
                            <div class="add-product-category-item" data-category="tools">工具</div>
                            <div class="add-product-category-item" data-category="套装">套装</div>
                        </div>
                    </div>
                    <div class="add-product-right-table">
                        <div class="add-product-table-wrapper">
                            <table class="add-product-table">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-sort="name">
                                            <span>商品名称</span>
                                            <i class="sort-icon"></i>
                                        </th>
                                        <th class="sortable" data-sort="spec">
                                            <span>商品规格</span>
                                            <i class="sort-icon"></i>
                                        </th>
                                        <th class="sortable" data-sort="stock">
                                            <span>库存</span>
                                            <i class="sort-icon"></i>
                                        </th>
                                        <th class="sortable" data-sort="price">
                                            <span>价格</span>
                                            <i class="sort-icon"></i>
                                        </th>
                                        <th>单位</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="addProductTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
