<!-- numKeypadOverlay -- 独立组件模板 -->
<div class="numkeypad-overlay" id="numKeypadOverlay">
        <div class="numkeypad-panel" id="numKeypadPanel">
            <div class="numkeypad-header">
                <div class="numkeypad-toprow">
                    <div class="numkeypad-title" id="numKeypadTitle">设置数值</div>
                    <button type="button" class="numkeypad-close-btn" id="numKeypadTopClose" aria-label="关闭">×</button>
                </div>
                <div class="numkeypad-display empty" id="numKeypadDisplay">0</div>
            </div>
            <div class="keypad-section">
                <div class="keypad-grid" id="numKeypadGrid">
                    <div class="key-item key-number" data-key="1">1</div>
                    <div class="key-item key-number" data-key="2">2</div>
                    <div class="key-item key-number" data-key="3">3</div>
                    <div class="key-item key-action" data-key="backspace">←</div>

                    <div class="key-item key-number" data-key="4">4</div>
                    <div class="key-item key-number" data-key="5">5</div>
                    <div class="key-item key-number" data-key="6">6</div>
                    <div class="key-item key-action" data-key="close">×</div>

                    <div class="key-item key-number" data-key="7">7</div>
                    <div class="key-item key-number" data-key="8">8</div>
                    <div class="key-item key-number" data-key="9">9</div>
                    <div class="key-item key-action" data-key="confirm">✓</div>

                    <div class="key-item key-number" data-key="0">0</div>
                    <div class="key-item key-number" data-key=".">.</div>
                </div>
            </div>
        </div>
    </div>
