<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店目标管理</title>
    <style>
        :root {
            --primary: #E87C9A;
            --primary-dark: #D66B85;
            --primary-50: #FFF1F5;
            --primary-100: #FFE4EC;
            --primary-200: #FFC7D9;
            --primary-300: #FFA0BE;
            --primary-400: #F1A3B8;
            --primary-500: #E87C9A;
            --primary-600: #D66B85;
            --primary-700: #B75A70;
            
            --neutral-50: #F9FAFB;
            --neutral-100: #F3F4F6;
            --neutral-200: #E5E7EB;
            --neutral-300: #D1D5DB;
            --neutral-400: #9CA3AF;
            --neutral-500: #6B7280;
            --neutral-600: #4B5563;
            --neutral-700: #374151;
            --neutral-800: #1F2937;
            --neutral-900: #111827;
            
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: var(--primary-50);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --transition-fast: all 0.15s ease;
            --transition-normal: all 0.25s ease;
            --transition-slow: all 0.35s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--neutral-800);
            min-height: 100vh;
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--neutral-200);
            padding: 16px 24px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-900);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 2px;
        }

        .page-main {
            flex: 1;
            padding: 24px;
            max-width: 100%;
            margin: 0 auto;
            width: 100%;
        }

        .header-tabs {
            display: flex;
            gap: 8px;
            padding: 0px 0px 8px 0px;
            border-bottom: 1px solid var(--neutral-200);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tab-item {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
            background: transparent;
            border: 1px solid transparent;
            color: var(--neutral-500);
        }

        .tab-item:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .tab-item.active {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-600) 100%);
            color: white;
            border-color: var(--primary-500);
        }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
        }

        .year-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--neutral-600);
        }

        .year-btn:hover:not(:disabled) {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-600);
        }

        .year-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .year-display {
            font-size: 18px;
            font-weight: 600;
            color: var(--neutral-800);
            min-width: 80px;
            text-align: center;
        }

        .main-content {
            display: grid;
            width: 100%;
        }

        /* ============ 门店目标TAB页独立布局样式 ============ */
        .store-goal-layout {
            display: grid;
            grid-template-columns: minmax(280px, 340px) 1fr;
            gap: 24px;
            width: 100%;
        }

        .store-goal-sidebar {
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .store-overview-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .store-overview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .store-circle-progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .store-circle-progress-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 16px;
        }

        .store-circle-progress-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-200) 0deg,
                var(--primary-200) 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .store-circle-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-500) 0deg,
                var(--primary-600) var(--progress-deg, 280deg),
                transparent var(--progress-deg, 280deg),
                transparent 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
            transition: transform 0.3s ease;
        }

        .store-circle-progress-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .store-circle-percentage {
            font-size: 28px;
            font-weight: 700;
            color: var(--neutral-800);
            display: block;
        }

        .store-circle-label {
            font-size: 12px;
            color: var(--neutral-500);
            margin-top: 4px;
        }

        .store-overview-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .store-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .store-stat-label {
            font-size: 14px;
            color: var(--neutral-500);
        }

        .store-stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-stat-value.highlight {
            color: var(--primary-600);
        }

        .store-goal-main {
            min-width: 0;
        }

        .store-month-grid-container {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            height: fit-content;
        }

        .store-month-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .store-month-grid-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-batch-actions {
            display: flex;
            gap: 12px;
        }

        .store-btn-batch {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            color: var(--neutral-600);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .store-btn-batch:hover:not(:disabled) {
            background: var(--danger-50);
            border-color: var(--danger-300);
            color: var(--danger-600);
        }

        .store-btn-batch:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .store-month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .store-month-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-fast);
            position: relative;
            border: 2px solid transparent;
        }

        .store-month-card:hover {
            background: var(--primary-50);
            transform: translateY(-2px);
        }

        .store-month-card.selected {
            border-color: var(--primary-400);
            background: var(--primary-50);
        }

        .store-month-card.unset {
            opacity: 0.6;
        }

        .store-month-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .store-month-select-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border: 2px solid var(--neutral-300);
            border-radius: 50%;
            transition: var(--transition-fast);
        }

        .store-month-card.selected .store-month-select-indicator {
            background: var(--primary-500);
            border-color: var(--primary-500);
        }

        .store-month-card.selected .store-month-select-indicator::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .store-month-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 12px;
        }

        .store-month-info {
            text-align: left;
        }

        .store-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .store-info-label {
            color: var(--neutral-500);
        }

        .store-info-value {
            font-weight: 600;
            color: var(--neutral-800);
        }

        .store-info-value.goal {
            color: var(--neutral-600);
        }

        .store-info-value.completed {
            color: var(--primary-600);
        }

        .store-month-progress-bar {
            height: 6px;
            background: var(--neutral-200);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .store-month-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ============ 门店目标TAB页响应式样式 ============ */
        @media (max-width: 1024px) {
            .store-goal-layout {
                grid-template-columns: 1fr;
            }

            .store-goal-sidebar {
                position: static;
            }

            .store-overview-card {
                position: static;
            }

            .store-month-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .store-goal-layout {
                gap: 16px;
            }

            .store-overview-card {
                padding: 20px;
            }

            .store-circle-progress-wrapper {
                width: 120px;
                height: 120px;
            }

            .store-circle-percentage {
                font-size: 24px;
            }

            .store-month-grid-container {
                padding: 20px;
            }

            .store-month-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .store-month-card {
                padding: 14px;
            }

            .store-month-grid-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .store-overview-card {
                padding: 16px;
            }

            .store-circle-progress-wrapper {
                width: 100px;
                height: 100px;
            }

            .store-circle-percentage {
                font-size: 20px;
            }

            .store-month-grid-container {
                padding: 16px;
            }

            .store-month-grid {
                grid-template-columns: 1fr;
            }

            .store-stat-item {
                padding: 10px;
            }
        }

        /* ============ 原有样式（保留供员工业绩目标使用） ============ */
        .year-overview-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 110px;
        }

        .overview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .circle-progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .circle-progress-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 16px;
        }

        .circle-progress-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary-200) 0deg,
                var(--primary-200) 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }

        .circle-progress-fill {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary) 0deg,
                var(--primary-600) var(--progress-deg, 180deg),
                transparent var(--progress-deg, 180deg),
                transparent 360deg
            );
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
            position: absolute;
            top: 0;
            left: 0;
            transition: var(--transition-slow);
        }

        .circle-progress-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .circle-percentage {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-600);
        }

        .circle-label {
            font-size: 12px;
            color: var(--neutral-500);
            margin-top: 4px;
        }

        .overview-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .stat-label {
            font-size: 14px;
            color: var(--neutral-500);
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .stat-value.highlight {
            color: var(--primary-600);
        }

        .month-grid-container {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .month-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .month-grid-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .batch-actions {
            display: flex;
            gap: 8px;
        }

        .btn-batch {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid var(--neutral-200);
            background: var(--bg-primary);
            color: var(--neutral-600);
        }

        .btn-batch:hover:not(:disabled) {
            background: var(--primary-50);
            border-color: var(--primary-300);
            color: var(--primary-600);
        }

        .btn-batch:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .month-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition-normal);
            border: 2px solid transparent;
            position: relative;
        }

        .month-card:hover {
            background: var(--primary-50);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .month-card.selected {
            border-color: var(--primary);
            background: var(--primary-50);
        }

        .month-card.unset {
            opacity: 0.6;
        }

        .month-card.unset:hover {
            opacity: 0.8;
        }

        .month-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .month-select-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            border: 2px solid var(--neutral-300);
            border-radius: 50%;
            transition: var(--transition-fast);
        }

        .month-card.selected .month-select-indicator {
            background: var(--primary);
            border-color: var(--primary);
        }

        .month-select-indicator::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition-fast);
        }

        .month-card.selected .month-select-indicator::after {
            opacity: 1;
        }

        .month-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 8px;
        }

        .month-card.unset .month-name {
            color: var(--neutral-400);
        }

        .month-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .info-label {
            color: var(--neutral-500);
        }

        .info-value {
            font-weight: 600;
            color: var(--neutral-700);
        }

        .info-value.goal {
            color: var(--primary-600);
        }

        .info-value.completed {
            color: var(--neutral-600);
        }

        .month-progress-bar {
            height: 4px;
            background: var(--neutral-200);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .month-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 2px;
            transition: var(--transition-slow);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-normal);
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: var(--transition-normal);
        }

        .modal-overlay.show .modal-container {
            transform: scale(1);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-600) 100%);
            padding: 20px 24px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition-fast);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: 8px;
        }

        .modal-value {
            display: block;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-600);
        }

        .modal-input-wrap {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-200);
            transition: var(--transition-fast);
            overflow: hidden;
        }

        .modal-input-wrap:focus-within {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px var(--primary-50);
        }

        .modal-input-prefix {
            padding: 0 12px;
            color: var(--neutral-500);
            font-size: 16px;
            font-weight: 600;
        }

        .modal-input {
            flex: 1;
            padding: 14px 12px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
            outline: none;
        }

        .modal-input::placeholder {
            color: var(--neutral-400);
        }

        .modal-tip {
            font-size: 12px;
            color: var(--neutral-500);
            margin-top: 8px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--neutral-100);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        const API_BASE = 'http://124.222.211.194:5001/api';

        const CURRENT_YEAR = new Date().getFullYear();
        const MIN_YEAR = CURRENT_YEAR - 5;
        const MAX_YEAR = CURRENT_YEAR;

        let goalTypes = [];
        let currentGoalTypeId = null;
        let currentGoalTypeIndex = 0;
        let currentYear = CURRENT_YEAR;
        let selectedMonths = [];
        let editingMonth = null;
        let monthlyGoals = {};
        let isLoading = false;

        // ============ API 请求封装（含异常处理） ============
        async function apiRequest(url, options = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            try {
                const res = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeout);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.code !== 0) throw new Error(data.message || '服务器错误');
                return data.data;
            } catch (err) {
                clearTimeout(timeout);
                if (err.name === 'AbortError') throw new Error('请求超时，请检查网络连接');
                if (err.message === 'Failed to fetch') throw new Error('网络连接失败，请检查服务器状态');
                throw err;
            }
        }

        // ============ 数据加载 ============
        async function loadGoalTypes() {
            try {
                setLoading(true);
                goalTypes = await apiRequest(`${API_BASE}/goal-types`);
                setLoading(false);
                if (goalTypes.length > 0) {
                    currentGoalTypeId = goalTypes[0].id;
                    currentGoalTypeIndex = 0;
                    renderTabs();
                }
            } catch (err) {
                setLoading(false);
                showToast('加载目标类型失败: ' + err.message, 'error');
            }
        }

        async function fetchGoals() {
            if (!currentGoalTypeId) return;
            try {
                setLoading(true);
                monthlyGoals = await apiRequest(
                    `${API_BASE}/goals?type_id=${currentGoalTypeId}&year=${currentYear}`
                );
                setLoading(false);
                renderMonthGrid();
                updateYearOverview();
            } catch (err) {
                setLoading(false);
                showToast('加载目标数据失败: ' + err.message, 'error');
                monthlyGoals = {};
                renderMonthGrid();
                updateYearOverview();
            }
        }

        // ============ 渲染函数 ============
        function renderTabs() {
            const container = document.getElementById('goalTypeTabs');
            container.innerHTML = goalTypes.map((t, i) => 
                `<button class="tab-item${i === 0 ? ' active' : ''}" data-goal-type="${t.id}" data-type-index="${i}">${t.type_name}</button>`
            ).join('');
            container.querySelectorAll('.tab-item').forEach(tab => {
                tab.addEventListener('click', () => changeGoalType(parseInt(tab.dataset.typeIndex)));
            });
        }

        function renderMonthGrid() {
            const grid = document.getElementById('monthGrid');
            if (!grid) return;
            if (isLoading) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--neutral-400)">加载中...</div>';
                return;
            }

            let html = '';
            const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            const currentType = goalTypes[currentGoalTypeIndex] || {};
            const unit = currentType.unit === '人' ? '' : '¥';
            
            months.forEach((monthName, index) => {
                const month = index + 1;
                const goalData = monthlyGoals[month];
                const isSelected = selectedMonths.includes(month);
                const isUnset = !goalData;
                
                let cardContent = '';
                if (goalData) {
                    const rate = Math.min(goalData.completionRate || 0, 100);
                    cardContent = `
                        <div class="store-month-info">
                            <div class="store-info-row"><span class="store-info-label">目标</span><span class="store-info-value goal">${unit}${formatNum(goalData.goal)}</span></div>
                            <div class="store-info-row"><span class="store-info-label">完成</span><span class="store-info-value completed">${unit}${formatNum(goalData.completed)}</span></div>
                            <div class="store-month-progress-bar"><div class="store-month-progress-fill" style="width:${rate}%"></div></div>
                            <div class="store-info-row" style="margin-top:4px"><span class="store-info-label">进度</span><span class="store-info-value">${goalData.completionRate}%</span></div>
                        </div>`;
                } else {
                    cardContent = '<div class="store-month-info"><div style="text-align:center;padding:16px 0;color:var(--neutral-400);font-size:13px">未设置目标</div></div>';
                }
                html += `<div class="store-month-card ${isSelected?'selected':''} ${isUnset?'unset':''}" data-month="${month}"><div class="store-month-select-indicator"></div><div class="store-month-name">${monthName}</div>${cardContent}</div>`;
            });
            grid.innerHTML = html;
            updateBatchButton();
        }

        function updateYearOverview() {
            let totalGoal = 0, totalCompleted = 0;
            Object.values(monthlyGoals).forEach(d => { totalGoal += d.goal; totalCompleted += d.completed; });
            const completionRate = totalGoal > 0 ? Math.round((totalCompleted / totalGoal) * 100) : 0;
            const safeRate = Math.min(completionRate, 100);
            const progressDeg = (safeRate / 100) * 360;
            const el = document.getElementById('yearCompletionRate');
            if (el) {
                el.textContent = `${completionRate}%`;
                if (completionRate > 100) el.style.color = '#10B981';
                else el.style.color = '';
            }
            const fill = document.getElementById('yearProgressFill');
            if (fill) fill.style.setProperty('--progress-deg', `${progressDeg}deg`);
            const stats = document.querySelectorAll('.store-overview-stats .store-stat-value');
            if (stats[0]) stats[0].textContent = `¥${formatNum(totalGoal)}`;
            if (stats[1]) stats[1].textContent = `¥${formatNum(totalCompleted)}`;
        }

        function setLoading(state) {
            isLoading = state;
        }

        // ============ 格式化 ============
        function formatNum(value) {
            if (typeof value !== 'number' || isNaN(value)) return '0.00';
            return value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ============ 操作函数 ============
        function updateBatchButton() {
            const btn = document.getElementById('batchClearBtn');
            if (!btn) return;
            btn.textContent = `清空选中的目标 (${selectedMonths.length})`;
            btn.disabled = selectedMonths.length === 0;
        }

        function toggleMonthSelection(month) {
            const idx = selectedMonths.indexOf(month);
            if (idx > -1) selectedMonths.splice(idx, 1);
            else selectedMonths.push(month);
            updateBatchButton();
        }

        function openGoalModal(month) {
            editingMonth = month;
            const goalData = monthlyGoals[month];
            document.getElementById('modalTitle').textContent = '设置目标';
            document.getElementById('modalTargetInfo').textContent = `${currentYear}年${month}月`;
            document.getElementById('goalAmountInput').value = goalData ? goalData.goal : '';
            document.getElementById('goalAmountInput').focus();
            document.getElementById('goalModal').classList.add('show');
        }

        function closeGoalModal() {
            document.getElementById('goalModal').classList.remove('show');
            editingMonth = null;
            document.getElementById('goalAmountInput').value = '';
        }

        async function submitGoal() {
            if (editingMonth === null) return;
            const input = document.getElementById('goalAmountInput');
            const value = parseFloat(input.value);
            if (isNaN(value) || value <= 0) {
                showToast('请输入有效的目标金额', 'error');
                return;
            }
            try {
                await apiRequest(`${API_BASE}/goals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type_id: currentGoalTypeId,
                        year: currentYear,
                        month: editingMonth,
                        goal: Math.round(value * 100) / 100
                    })
                });
                closeGoalModal();
                await fetchGoals();
                showToast('目标设置成功', 'success');
            } catch (err) {
                showToast('保存失败: ' + err.message, 'error');
            }
        }

        async function batchClearGoals() {
            if (selectedMonths.length === 0) return;
            try {
                await apiRequest(`${API_BASE}/goals`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type_id: currentGoalTypeId,
                        year: currentYear,
                        months: [...selectedMonths]
                    })
                });
                const count = selectedMonths.length;
                selectedMonths = [];
                await fetchGoals();
                showToast(`已清空 ${count} 个月份的目标`, 'success');
            } catch (err) {
                showToast('清空失败: ' + err.message, 'error');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            toast.innerHTML = `<div class="toast-icon"></div><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => container.removeChild(toast), 300); }, 3000);
        }

        async function changeYear(delta) {
            currentYear += delta;
            document.getElementById('currentYearDisplay').textContent = currentYear;
            selectedMonths = [];
            await fetchGoals();
        }

        // ============ 员工业绩目标功能 ============
        // 模拟员工数据
        const staffList = [
            { id: 1, name: '张三' },
            { id: 2, name: '李四' },
            { id: 3, name: '王五' },
            { id: 4, name: '赵六' },
            { id: 5, name: '钱七' },
            { id: 6, name: '孙八' },
            { id: 7, name: '周九' },
            { id: 8, name: '吴十' },
            { id: 9, name: '郑十一' },
            { id: 10, name: '王十二' }
        ];

        // 模拟员工目标数据
        let staffGoals = {};

        // 初始化员工目标数据
        function initStaffGoals() {
            staffGoals = {};
            staffList.forEach(staff => {
                staffGoals[staff.id] = {};
                for (let month = 1; month <= 12; month++) {
                    const basePerformance = 10000 + Math.floor(Math.random() * 10000);
                    const baseCardConsume = 5000 + Math.floor(Math.random() * 5000);
                    const baseCustomer = 15 + Math.floor(Math.random() * 15);
                    const baseVisits = 80 + Math.floor(Math.random() * 40);
                    
                    const completionRate = 60 + Math.floor(Math.random() * 60);
                    
                    staffGoals[staff.id][month] = {
                        performance: {
                            goal: basePerformance,
                            completed: Math.round(basePerformance * completionRate / 100)
                        },
                        cardConsume: {
                            goal: baseCardConsume,
                            completed: Math.round(baseCardConsume * (70 + Math.floor(Math.random() * 50)) / 100)
                        },
                        customer: {
                            goal: baseCustomer,
                            completed: Math.round(baseCustomer * (65 + Math.floor(Math.random() * 55)) / 100)
                        },
                        visits: {
                            goal: baseVisits,
                            completed: Math.round(baseVisits * (75 + Math.floor(Math.random() * 45)) / 100)
                        }
                    };
                }
            });
        }

        let currentStaffMonth = new Date().getMonth() + 1;
        let currentStaffView = 'month'; // 'month' 或 'year'
        let lastStaffMonth = currentStaffMonth;
        let editingStaffId = null;

        // 获取某员工全年汇总数据
        function getYearAggregatedGoal(staffId, field) {
            let goal = 0;
            let completed = 0;
            for (let month = 1; month <= 12; month++) {
                const monthData = staffGoals[staffId]?.[month]?.[field];
                if (monthData) {
                    goal += monthData.goal || 0;
                    completed += monthData.completed || 0;
                }
            }
            return goal > 0 ? { goal, completed } : null;
        }

        // 渲染员工业绩目标页面
        function renderStaffGoals() {
            const staffGoalContent = document.getElementById('staffGoalContent');
            if (!staffGoalContent) return;

            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

            let html = `
                <div class="staff-goal-container">
                    <div class="staff-goal-header">
                        <div class="staff-goal-title">${currentYear}年${currentStaffView === 'year' ? '全年' : months[currentStaffMonth - 1]} 员工业绩目标</div>
                    </div>
                    <div class="month-selector-wrapper">
                        <div class="month-selector">
                            ${months.map((monthName, index) => `
                                <button class="month-btn ${currentStaffView === 'month' && index + 1 === currentStaffMonth ? 'active' : ''}" data-month="${index + 1}">${monthName}</button>
                            `).join('')}
                            <button class="month-btn ${currentStaffView === 'year' ? 'active' : ''}" data-view="year">全年</button>
                        </div>
                    </div>
                    <div class="summary-bar">
                        ${renderSummaryItem('业绩达标率', calculateSummaryRate('performance'))}
                        ${renderSummaryItem('卡耗达标率', calculateSummaryRate('cardConsume'))}
                        ${renderSummaryItem('拓客达标率', calculateSummaryRate('customer'))}
                        ${renderSummaryItem('客次达标率', calculateSummaryRate('visits'))}
                    </div>
                    <div class="staff-goal-table-wrapper">
                        <table class="staff-goal-table">
                            <thead>
                                <tr>
                                    <th>员工姓名</th>
                                    <th>业绩目标</th>
                                    <th>卡耗目标</th>
                                    <th>拓客目标</th>
                                    <th>客次目标</th>
                                    ${currentStaffView !== 'year' ? '<th>操作</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
            `;

            staffList.forEach(staff => {
                let goalData;
                if (currentStaffView === 'year') {
                    goalData = {
                        performance: getYearAggregatedGoal(staff.id, 'performance'),
                        cardConsume: getYearAggregatedGoal(staff.id, 'cardConsume'),
                        customer: getYearAggregatedGoal(staff.id, 'customer'),
                        visits: getYearAggregatedGoal(staff.id, 'visits')
                    };
                } else {
                    goalData = staffGoals[staff.id]?.[currentStaffMonth];
                }
                
                html += `
                    <tr data-staff-id="${staff.id}">
                        <td><span class="staff-name">${staff.name}</span></td>
                        <td class="goal-cell">${renderGoalCell(goalData?.performance)}</td>
                        <td class="goal-cell">${renderGoalCell(goalData?.cardConsume)}</td>
                        <td class="goal-cell">${renderGoalCell(goalData?.customer, '人')}</td>
                        <td class="goal-cell">${renderGoalCell(goalData?.visits, '次')}</td>
                        ${currentStaffView !== 'year' ? `
                        <td>
                            <button class="edit-btn" onclick="openStaffGoalModal(${staff.id}, ${currentStaffMonth})">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                </svg>
                                编辑目标
                            </button>
                        </td>
                        ` : ''}
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            staffGoalContent.innerHTML = html;

            // 添加月份切换事件
            document.querySelectorAll('.month-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.view === 'year') {
                        currentStaffView = 'year';
                    } else {
                        currentStaffView = 'month';
                        currentStaffMonth = parseInt(btn.dataset.month);
                    }
                    renderStaffGoals();
                });
            });
        }

        // 渲染目标单元格
        function renderGoalCell(goalData, unit = '元') {
            if (!goalData) {
                return '<div style="color: var(--neutral-400);">未设置</div>';
            }
            
            const rate = Math.round((goalData.completed / goalData.goal) * 100);
            const isAchieved = rate >= 100;
            const displayRate = Math.min(rate, 100);
            
            return `
                <div class="goal-value">
                    <span class="label">目标:</span>${unit === '元' ? '¥' : ''}${formatNum(goalData.goal)}
                </div>
                <div class="goal-value">
                    <span class="label">完成:</span>${unit === '元' ? '¥' : ''}${formatNum(goalData.completed)}
                </div>
                <div class="goal-progress-bar">
                    <div class="goal-progress-fill ${isAchieved ? 'achieved' : 'not-achieved'}" style="width: ${displayRate}%"></div>
                </div>
                <div class="goal-rate">
                    进度: ${rate}%
                </div>
            `;
        }

        // 计算汇总达标率
        function calculateSummaryRate(goalType) {
            let totalAchieved = 0;
            let totalCount = 0;

            staffList.forEach(staff => {
                let goalData;
                if (currentStaffView === 'year') {
                    goalData = getYearAggregatedGoal(staff.id, goalType);
                } else {
                    goalData = staffGoals[staff.id]?.[currentStaffMonth]?.[goalType];
                }
                
                if (goalData) {
                    const rate = (goalData.completed / goalData.goal) * 100;
                    if (rate >= 100) totalAchieved++;
                    totalCount++;
                }
            });

            return totalCount > 0 ? Math.round((totalAchieved / totalCount) * 100) : 0;
        }

        // 渲染汇总项
        function renderSummaryItem(label, rate) {
            const isAchieved = rate >= 100;
            return `
                <div class="summary-item">
                    <span class="summary-label">${label}</span>
                    <span class="summary-value ${isAchieved ? 'achieved' : 'not-achieved'}">${rate}%</span>
                </div>
            `;
        }

        // 打开员工目标编辑弹窗
        function openStaffGoalModal(staffId, month) {
            editingStaffId = staffId;
            const staff = staffList.find(s => s.id === staffId);
            const monthGoals = staffGoals[staffId]?.[month];

            document.getElementById('staffModalStaffName').textContent = staff?.name || '未知员工';
            document.getElementById('staffModalMonthInfo').textContent = `${currentYear}年${month}月`;

            document.getElementById('staffGoalPerformance').value = monthGoals?.performance?.goal || '';
            document.getElementById('staffGoalCardConsume').value = monthGoals?.cardConsume?.goal || '';
            document.getElementById('staffGoalCustomer').value = monthGoals?.customer?.goal || '';
            document.getElementById('staffGoalVisits').value = monthGoals?.visits?.goal || '';

            document.getElementById('staffGoalModal').classList.add('show');
        }

        // 关闭员工目标编辑弹窗
        function closeStaffGoalModal() {
            document.getElementById('staffGoalModal').classList.remove('show');
            editingStaffId = null;
        }

        // 保存员工目标
        function saveStaffGoals() {
            if (editingStaffId === null) return;

            const performance = parseFloat(document.getElementById('staffGoalPerformance').value);
            const cardConsume = parseFloat(document.getElementById('staffGoalCardConsume').value);
            const customer = parseInt(document.getElementById('staffGoalCustomer').value);
            const visits = parseInt(document.getElementById('staffGoalVisits').value);

            if (isNaN(performance) || performance <= 0) {
                showToast('请输入有效的业绩目标', 'error');
                return;
            }
            if (isNaN(cardConsume) || cardConsume <= 0) {
                showToast('请输入有效的卡耗目标', 'error');
                return;
            }
            if (isNaN(customer) || customer <= 0) {
                showToast('请输入有效的拓客目标', 'error');
                return;
            }
            if (isNaN(visits) || visits <= 0) {
                showToast('请输入有效的客次目标', 'error');
                return;
            }

            if (!staffGoals[editingStaffId]) {
                staffGoals[editingStaffId] = {};
            }
            if (!staffGoals[editingStaffId][currentStaffMonth]) {
                staffGoals[editingStaffId][currentStaffMonth] = {
                    performance: { completed: 0 },
                    cardConsume: { completed: 0 },
                    customer: { completed: 0 },
                    visits: { completed: 0 }
                };
            }

            staffGoals[editingStaffId][currentStaffMonth].performance.goal = performance;
            staffGoals[editingStaffId][currentStaffMonth].cardConsume.goal = cardConsume;
            staffGoals[editingStaffId][currentStaffMonth].customer.goal = customer;
            staffGoals[editingStaffId][currentStaffMonth].visits.goal = visits;

            closeStaffGoalModal();
            renderStaffGoals();
            showToast('目标保存成功', 'success');
        }

        // 修改TAB切换逻辑
        async function changeGoalType(typeIndex) {
            currentGoalTypeIndex = typeIndex;
            currentGoalTypeId = goalTypes[typeIndex]?.id;
            document.querySelectorAll('.tab-item').forEach((tab, i) => tab.classList.toggle('active', i === typeIndex));
            selectedMonths = [];

            const storeGoalContent = document.getElementById('storeGoalContent');
            const staffGoalContent = document.getElementById('staffGoalContent');

            // 判断是否是员工业绩目标TAB
            const currentType = goalTypes[typeIndex];
            if (currentType && currentType.type_name === '员工业绩目标') {
                // 显示员工业绩目标页面
                if (storeGoalContent) storeGoalContent.style.display = 'none';
                if (staffGoalContent) staffGoalContent.style.display = 'grid';
                if (!Object.keys(staffGoals).length) {
                    initStaffGoals();
                }
                renderStaffGoals();
            } else {
                // 显示原有页面
                if (storeGoalContent) storeGoalContent.style.display = 'grid';
                if (staffGoalContent) staffGoalContent.style.display = 'none';
                await fetchGoals();
            }
        }

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', async () => {
            await loadGoalTypes();

            // 同步年份显示
            document.getElementById('currentYearDisplay').textContent = currentYear;

            // 确保门店目标内容区域显示，员工目标内容区域隐藏
            const storeGoalContent = document.getElementById('storeGoalContent');
            const staffGoalContent = document.getElementById('staffGoalContent');
            if (storeGoalContent) storeGoalContent.style.display = 'grid';
            if (staffGoalContent) staffGoalContent.style.display = 'none';

            if (currentGoalTypeId) await fetchGoals();

            document.getElementById('prevYearBtn').addEventListener('click', () => changeYear(-1));
            document.getElementById('nextYearBtn').addEventListener('click', () => changeYear(1));

            document.getElementById('monthGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.store-month-card');
                if (!card || card.classList.contains('disabled')) return;
                const month = parseInt(card.dataset.month);
                if (e.target.closest('.store-month-select-indicator')) {
                    toggleMonthSelection(month);
                    card.classList.toggle('selected');
                } else {
                    openGoalModal(month);
                }
            });

            document.getElementById('modalCloseBtn').addEventListener('click', closeGoalModal);
            document.getElementById('modalCancelBtn').addEventListener('click', closeGoalModal);
            document.getElementById('modalConfirmBtn').addEventListener('click', submitGoal);
            document.getElementById('batchClearBtn').addEventListener('click', batchClearGoals);
            document.getElementById('goalAmountInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitGoal(); });

            // 员工目标编辑弹窗事件
            document.getElementById('staffModalCloseBtn').addEventListener('click', closeStaffGoalModal);
            document.getElementById('staffModalCancelBtn').addEventListener('click', closeStaffGoalModal);
            document.getElementById('staffModalConfirmBtn').addEventListener('click', saveStaffGoals);
        });
    </script>
</body>
</html>
