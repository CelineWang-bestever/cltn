<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客户详情 - 其他</title>
    <style>
        :root {
            --primary: #E8A0B4;
            --primary-dark: #D4879B;
            --primary-light: #F5D5DE;
            --primary-bg: #FFF5F7;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --bg-page: #FAFAFA;
            --border-color: #EEEEEE;
            --success: #52C41A;
            --warning: #FAAD14;
            --error: #FF4D4F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: PingFang SC, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 430px;
            min-height: 100vh;
            margin: 0 auto;
            background: #FFFFFF;
        }

        /* 头部导航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 客户信息卡片 */
        .customer-card {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 8px solid var(--bg-page);
        }

        .customer-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .customer-info {
            flex: 1;
        }

        .customer-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .customer-phone {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .customer-tags {
            display: flex;
            gap: 8px;
        }

        .customer-tag {
            padding: 2px 8px;
            background: var(--primary-bg);
            color: var(--primary-dark);
            font-size: 11px;
            border-radius: 4px;
        }

        /* Tab导航 */
        .tab-nav {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            background: #FFFFFF;
        }

        .tab-item {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            position: relative;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--primary-dark);
            font-weight: 600;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Tab内容区 */
        .tab-content {
            padding: 16px;
            min-height: calc(100vh - 250px);
        }

        /* 操作按钮区 */
        .action-bar {
            padding: 16px;
            border-bottom: 8px solid var(--bg-page);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: #FFFFFF;
        }

        /* 资料列表 */
        .record-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-item {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .record-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-images {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .record-images::-webkit-scrollbar {
            display: none;
        }

        .record-image-item {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-page);
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            touch-action: manipulation;
        }

        .record-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .record-image-item.pdf {
            background: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .record-image-item.pdf svg {
            width: 32px;
            height: 32px;
            fill: var(--primary);
        }

        .record-image-item .image-count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.6);
            color: #FFFFFF;
            font-size: 10px;
            border-radius: 4px;
        }

        .record-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 0;
        }

        .record-info-left {
            flex: 1;
            min-width: 0;
        }

        .record-filename {
            display: none;
        }

        .record-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .record-uploader {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .record-type {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            font-size: 11px;
            color: var(--primary);
            background: var(--primary-bg);
            border-radius: 4px;
            margin-bottom: 4px;
        }

        /* 资料类型选择 */
        .type-selector {
            margin-bottom: 12px;
        }

        .type-selector-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .type-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .type-option {
            padding: 8px 14px;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option:hover {
            border-color: var(--primary);
        }

        .type-option.selected {
            color: var(--primary);
            background: var(--primary-bg);
            border-color: var(--primary);
        }

        /* 统一操作图标按钮 - 编辑/删除 */
        .action-btn.edit-btn,
        .action-btn.delete-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            position: relative;
        }

        .action-btn.edit-btn svg,
        .action-btn.delete-btn svg {
            width: 24px;
            height: 24px;
            transition: all 0.2s;
        }

        .action-btn.edit-btn {
            background: var(--primary-bg);
        }

        .action-btn.edit-btn svg {
            fill: var(--primary);
        }

        .action-btn.edit-btn:hover {
            background: var(--primary);
        }

        .action-btn.edit-btn:hover svg {
            fill: #FFFFFF;
        }

        .action-btn.edit-btn:active {
            transform: scale(0.95);
        }

        .action-btn.delete-btn {
            background: #FFF1F0;
        }

        .action-btn.delete-btn svg {
            fill: var(--error);
        }

        .action-btn.delete-btn:hover {
            background: var(--error);
        }

        .action-btn.delete-btn:hover svg {
            fill: #FFFFFF;
        }

        .action-btn.delete-btn:active {
            transform: scale(0.95);
        }

        /* 旧按钮样式保留兼容 */
        .delete-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            height: 32px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--error);
            background: #FFFFFF;
            color: var(--error);
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .delete-btn:hover {
            background: #FFF1F0;
        }

        .delete-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--error);
        }

        .delete-btn.disabled {
            border-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .delete-btn.disabled svg {
            fill: var(--text-muted);
        }

        .delete-btn.disabled:hover {
            background: #FFFFFF;
        }

        /* 编辑按钮 */
        .edit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            height: 32px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--primary);
            background: #FFFFFF;
            color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
            margin-right: 8px;
        }

        .edit-btn:hover {
            background: var(--primary-bg);
        }

        .edit-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--primary);
        }

        /* 修改历史 */
        .history-section {
            display: none;
        }

        .history-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
        }

        .history-toggle svg {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
            transition: transform 0.2s;
        }

        .history-toggle.expanded svg {
            transform: rotate(180deg);
        }

        .history-list {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .history-list.show {
            display: flex;
        }

        .history-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 10px;
            background: var(--bg-page);
            border-radius: 6px;
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-operator {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .history-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .history-content {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .history-change {
            display: inline-flex;
            padding: 2px 6px;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 11px;
            border-radius: 4px;
            margin-right: 4px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 0;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #FFFFFF;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .page-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #FFFFFF;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 8px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            fill: var(--border-color);
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 预览弹窗 */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        .preview-modal.show {
            display: flex;
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
        }

        .preview-title {
            font-size: 14px;
            color: #FFFFFF;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preview-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
        }

        .preview-close svg {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .preview-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        .preview-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .preview-nav-btn {
            position: absolute;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .preview-nav-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .preview-nav-btn svg {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .preview-nav-left {
            left: 16px;
        }

        .preview-nav-right {
            right: 16px;
        }

        .preview-indicators {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
        }

        .preview-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .preview-indicator.active {
            width: 20px;
            border-radius: 4px;
            background: #FFFFFF;
        }

        /* 上传弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 100%;
            max-width: 430px;
            max-height: 85vh;
            background: #FFFFFF;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
        }

        .modal-body {
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            flex: 1;
            height: 44px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #FFFFFF;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-page);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 客户信息（弹窗内） */
        .customer-info-modal {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--primary-bg);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .customer-avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .customer-info-text {
            flex: 1;
        }

        .customer-name-sm {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .customer-phone-sm {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 上传区域 */
        .upload-area {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .upload-btn-item {
            flex: 1;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--bg-page);
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn-item:hover {
            border-color: var(--primary);
            background: var(--primary-bg);
        }

        .upload-btn-item svg {
            width: 28px;
            height: 28px;
            fill: var(--text-muted);
        }

        .upload-btn-item span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 已上传列表 */
        .uploaded-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .uploaded-item {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            background: var(--bg-page);
        }

        .uploaded-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .uploaded-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .uploaded-item .remove-btn svg {
            width: 12px;
            height: 12px;
            fill: #FFFFFF;
        }

        /* 备注 */
        .remark-input {
            width: 100%;
            height: 80px;
            padding: 12px;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-page);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
        }

        .remark-input::placeholder {
            color: var(--text-muted);
        }

        .remark-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 24px;
            background: rgba(0, 0, 0, 0.75);
            color: #FFFFFF;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .confirm-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .confirm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        .confirm-content {
            position: relative;
            width: 80%;
            max-width: 340px;
            background: #FFFFFF;
            border-radius: 16px;
            padding: 32px 24px 24px;
            text-align: center;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .confirm-modal.show .confirm-content {
            transform: scale(1);
            opacity: 1;
        }

        .confirm-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: var(--primary-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--error);
        }

        .confirm-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .confirm-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .confirm-actions {
            display: flex;
            gap: 12px;
        }

        .confirm-actions .btn {
            flex: 1;
            height: 44px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-actions .btn-secondary {
            background: #FFFFFF;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .confirm-actions .btn-secondary:hover {
            background: var(--bg-page);
        }

        .confirm-actions .btn-danger {
            background: var(--error);
            color: #FFFFFF;
        }

        .confirm-actions .btn-danger:hover {
            background: #E64545;
        }
    </style>
</head>

    <!-- 预览弹窗 -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-header">
            <span class="preview-title" id="previewTitle">文件预览</span>
            <button class="preview-close" onclick="closePreview()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />

    <!-- 上传弹窗 -->

                <!-- 客户信息 -->
                <div class="customer-info-modal">
                    <div class="customer-avatar-sm">李</div>

                <!-- 资料类型选择 -->

                        <svg viewBox="0 0 24 24">
                            <path d="M12 12m-3.2 0a3.2 3.2 0 1 0 6.4 0a3.2 3.2 0 1 0-6.4 0" />
                            <path
                                d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" />

    <!-- Toast提示 -->

                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />

            <h3 class="confirm-title">确认删除</h3>
            <p class="confirm-message" id="confirmMessage">确定要删除这条记录吗？</p>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="confirmCancelBtn" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" id="confirmOkBtn" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const currentUser = '张美容师';

        const mockRecords = [
            {
                id: 1,
                type: 'care',
                typeName: '护理记录',
                filename: '护理前后对比',
                time: '2026-05-15 14:30',

                ],
                history: [
                    { operator: '张美容师', time: '2026-05-15 14:30', action: '创建记录', changes: '上传3张图片' },
                    { operator: '张美容师', time: '2026-05-16 09:15', action: '修改备注', changes: '备注: "客户皮肤状态明显改善"' }
                ]
            },
            {
                id: 2,
                type: 'skin',
                typeName: '皮肤检测',
                filename: '皮肤检测报告.jpg',
                time: '2026-05-14 10:20',
                uploader: '李美容师',
                remark: '',
                images: ['https://picsum.photos/200/200?random=4'],
                history: []
            },
            {
                id: 3,
                type: 'customer',
                typeName: '客户资料',
                filename: '客户资料合集',
                time: '2026-05-12 16:45',
                uploader: '张美容师',
                remark: '包含多张面部细节图',
                images: [
                    'https://picsum.photos/200/200?random=5',
                    'https://picsum.photos/200/200?random=6'
                ],
                history: [
                    { operator: '张美容师', time: '2026-05-12 16:45', action: '创建记录', changes: '上传2张图片' }
                ]
            },
            {
                id: 4,
                type: 'other',
                typeName: '其他',
                filename: 'IMG_20240510_003.jpg',
                time: '2026-05-10 09:15',
                uploader: '王美容师',
                remark: '',
                images: ['https://picsum.photos/200/200?random=7'],
                history: []
            },
            {
                id: 5,
                type: 'care',
                typeName: '护理记录',
                filename: '面部护理记录',
                time: '2026-05-08 11:00',
                uploader: '张美容师',
                remark: '护理产品使用记录',
                images: [
                    'https://picsum.photos/200/200?random=8',
                    'https://picsum.photos/200/200?random=9',
                    'https://picsum.photos/200/200?random=10',
                    'https://picsum.photos/200/200?random=11'
                ],
                history: [
                    { operator: '张美容师', time: '2026-05-08 11:00', action: '创建记录', changes: '上传4张图片' }
                ]
            },
            {
                id: 6,
                type: 'consume',
                typeName: '消费记录',
                filename: 'IMG_20240505_004.jpg',
                time: '2026-05-05 15:30',
                uploader: '李美容师',
                remark: '',
                images: ['https://picsum.photos/200/200?random=12'],
                history: []
            },
        ];

        let currentPage = 1;
        const pageSize = 10;
        let uploadedFiles = [];
        let selectedType = 'customer';

        function selectType(el) {
            document.querySelectorAll('#typeOptions .type-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedType = el.dataset.type;
        }

        let editSelectedType = 'customer';

        function selectEditType(el) {
            document.querySelectorAll('#editTypeOptions .type-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            editSelectedType = el.dataset.type;
        }

        function getTypeName(type) {
            const typeMap = {
                'customer': '客户资料',
                'care': '护理记录',
                'skin': '皮肤检测',
                'consume': '消费记录',
                'visit': '回访记录',
                'other': '其他'
            };
            return typeMap[type] || '其他';
        }

        // 返回
        function goBack() {
            window.history.back();
        }

        // 切换Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');

            if (tab !== 'other') {
                showToast('切换到' + tab + ' Tab');
            }
        }

        // 渲染记录列表
        function renderRecords() {
            const totalPages = Math.ceil(mockRecords.length / pageSize) || 1;
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = mockRecords.slice(start, end);

            const listEl = document.getElementById('recordList');
            const emptyEl = document.getElementById('emptyState');

            if (pageData.length === 0) {
                listEl.style.display = 'none';
                emptyEl.style.display = 'flex';
                return;
            }

            listEl.style.display = 'flex';
            emptyEl.style.display = 'none';

            listEl.innerHTML = pageData.map(record => {
                const images = record.images || [];
                const displayImages = images.slice(0, 9);
                const remainingCount = images.length - displayImages.length;
                const canDelete = record.uploader === currentUser;

                return `
                    <div class="record-item" data-id="${record.id}">
                        <div class="record-header">
                            <div class="record-images">
                                ${displayImages.map((img, idx) => `
                                    <div class="record-image-item" onclick="previewImage(${record.id}, ${idx})">
                                        <img src="${img}" alt="${record.filename}">
                                        ${idx === displayImages.length - 1 && remainingCount > 0 ? `<span class="image-count">+${remainingCount}</span>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                            <div class="record-info">
                                <div class="record-info-left">
                                    ${record.typeName ? `<div class="record-type">${record.typeName}</div>` : ''}
                                    <div class="record-meta">${record.time}</div>
                                    <div class="record-uploader">上传人: ${record.uploader}</div>
                                </div>
                                ${canDelete ? `
                                    <button class="action-btn edit-btn" onclick="openEditModal(${record.id})" title="编辑">
                                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                    </button>
                                    <button class="action-btn edit-btn" onclick="handleDelete(${record.id}, '${record.uploader}')" title="删除">
                                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            renderPagination(totalPages);
        }

        // 渲染分页
        function renderPagination(totalPages) {
            const paginationEl = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="page-info">...</span>`;
                }
            }

            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>▶</button>`;
            html += `<span class="page-info">第 ${currentPage}/${totalPages} 页</span>`;

            paginationEl.innerHTML = html;
        }

        // 翻页
        function goToPage(page) {
            const totalPages = Math.ceil(mockRecords.length / pageSize) || 1;
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderRecords();
            }
        }

        // 当前预览图片索引
        let currentPreviewIndex = 0;
        let currentPreviewRecordId = null;

        let pendingDeleteId = null;

        function showConfirmModal(id, message) {
            pendingDeleteId = id;
            document.getElementById('confirmMessage').textContent = message || '确定要删除这条记录吗？';
            document.getElementById('confirmModal').classList.add('show');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingDeleteId = null;
        }

        function confirmDelete() {
            if (pendingDeleteId !== null) {
                const id = pendingDeleteId;
                closeConfirmModal();
                handleDeleteConfirmed(id);
            }
        }

        function handleDeleteConfirmed(id) {
            const index = mockRecords.findIndex(r => r.id === id);
            if (index > -1) {
                mockRecords.splice(index, 1);
                renderRecords();
                showToast('删除成功');
            }
        }

        // 预览单张图片
        function previewImage(recordId, imageIndex) {
            const record = mockRecords.find(r => r.id === recordId);
            if (record && record.images && record.images.length > 0) {
                currentPreviewRecordId = recordId;
                currentPreviewIndex = imageIndex;
                showPreview(record, imageIndex);
            }
        }

        // 显示预览弹窗
        function showPreview(record, index) {
            const images = record.images || [];
            document.getElementById('previewTitle').textContent = `${record.filename} (${index + 1}/${images.length})`;
            document.getElementById('previewImage').src = images[index] || '';
            renderPreviewIndicators(images.length, index);
            document.getElementById('previewModal').classList.add('show');
        }

        // 渲染预览指示器
        function renderPreviewIndicators(total, current) {
            const indicatorsEl = document.getElementById('previewIndicators');
            if (total <= 1) {
                indicatorsEl.innerHTML = '';
                return;
            }
            indicatorsEl.innerHTML = Array.from({ length: total }, (_, i) =>
                `<span class="preview-indicator ${i === current ? 'active' : ''}"></span>`
            ).join('');
        }

        // 上一张图片
        function prevImage() {
            const record = mockRecords.find(r => r.id === currentPreviewRecordId);
            if (record && record.images && record.images.length > 1) {
                currentPreviewIndex = currentPreviewIndex === 0 ? record.images.length - 1 : currentPreviewIndex - 1;
                showPreview(record, currentPreviewIndex);
            }
        }

        // 下一张图片
        function nextImage() {
            const record = mockRecords.find(r => r.id === currentPreviewRecordId);
            if (record && record.images && record.images.length > 1) {
                currentPreviewIndex = currentPreviewIndex === record.images.length - 1 ? 0 : currentPreviewIndex + 1;
                showPreview(record, currentPreviewIndex);
            }
        }

        // 关闭预览
        function closePreview() {
            document.getElementById('previewModal').classList.remove('show');
        }

        // 处理删除操作
        function handleDelete(id, uploader) {
            if (uploader !== currentUser) {
                showToast('您只能删除自己上传的记录');
                return;
            }

            showConfirmModal(id, '确定要删除这条记录吗？');
        }

        // 打开上传弹窗
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('show');
            uploadedFiles = [];
            renderUploadedList();
            updateUploadBtn();
        }

        // 关闭上传弹窗
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('show');
            selectedType = 'customer';
            document.querySelectorAll('#typeOptions .type-option').forEach(opt => opt.classList.remove('selected'));
            const firstType = document.querySelector('#typeOptions .type-option');
            if (firstType) firstType.classList.add('selected');
        }

        // 拍照上传（模拟）
        function takePhoto() {
            if (uploadedFiles.length >= 10) {
                showToast('最多上传10个文件');
                return;
            }
            const newFile = {
                id: Date.now(),
                thumb: `https://picsum.photos/200/200?random=${Date.now()}`,
                isImage: true
            };
            uploadedFiles.push(newFile);
            renderUploadedList();
            updateUploadBtn();
        }

        // 从相册选择（模拟）
        function selectFromAlbum() {
            if (uploadedFiles.length >= 10) {
                showToast('最多上传10个文件');
                return;
            }
            const newFile = {
                id: Date.now(),
                thumb: `https://picsum.photos/200/200?random=${Date.now()}`,
                isImage: true
            };
            uploadedFiles.push(newFile);
            renderUploadedList();
            updateUploadBtn();
        }

        // 渲染已上传列表
        function renderUploadedList() {
            const listEl = document.getElementById('uploadedList');

            if (uploadedFiles.length === 0) {
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = uploadedFiles.map(file => `
                <div class="uploaded-item" data-id="${file.id}">
                    <img src="${file.thumb}" alt="预览">
                    <div class="remove-btn" onclick="removeUploadedFile(${file.id})">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </div>
                </div>
            `).join('');
        }

        // 删除已上传文件
        function removeUploadedFile(id) {
            uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            renderUploadedList();
            updateUploadBtn();
        }

        // 更新上传按钮状态
        function updateUploadBtn() {
            const btn = document.getElementById('confirmUploadBtn');
            btn.disabled = uploadedFiles.length === 0;
        }

        // 确认上传
        function confirmUpload() {
            if (uploadedFiles.length === 0) {
                showToast('请先选择文件');
                return;
            }

            showToast('上传成功');
            closeUploadModal();

            uploadedFiles.forEach((file, index) => {
                setTimeout(() => {
                    const newRecord = {
                        id: Date.now() + index,
                        type: selectedType,
                        typeName: getTypeName(selectedType),
                        filename: `IMG_${Date.now()}.jpg`,
                        thumb: file.thumb,
                        time: '刚刚',
                        uploader: currentUser,
                        remark: document.getElementById('remarkInput').value || '',
                        images: [file.thumb],
                        history: [
                            { operator: currentUser, time: '刚刚', action: '创建记录', changes: `上传1张图片，类型: ${getTypeName(selectedType)}` }
                        ]
                    };
                    mockRecords.unshift(newRecord);
                    renderRecords();
                }, index * 100);
            });

            selectedType = 'customer';
            document.querySelectorAll('#typeOptions .type-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelector('#typeOptions .type-option').classList.add('selected');
        }

        let currentEditId = null;
        let editFiles = [];
        let editHistoryExpanded = false;

        function openEditModal(id) {
            const record = mockRecords.find(r => r.id === id);
            if (!record) return;

            currentEditId = id;
            editFiles = record.images.map((img, idx) => ({
                id: idx,
                thumb: img,
                isImage: true
            }));
            editHistoryExpanded = false;
            editSelectedType = record.type || 'customer';

            document.querySelectorAll('#editTypeOptions .type-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.type === editSelectedType);
            });
            document.getElementById('editRemarkInput').value = record.remark || '';
            renderEditUploadedList();

            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditId = null;
            editFiles = [];
        }

        function renderEditUploadedList() {
            const listEl = document.getElementById('editUploadedList');

            if (editFiles.length === 0) {
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = editFiles.map(file => `
                <div class="uploaded-item" data-id="${file.id}">
                    <img src="${file.thumb}" alt="预览">
                    <div class="remove-btn" onclick="removeEditFile(${file.id})">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </div>
                </div>
            `).join('');
        }

        function removeEditFile(id) {
            editFiles = editFiles.filter(f => f.id !== id);
            renderEditUploadedList();
        }

        function editTakePhoto() {
            if (editFiles.length >= 10) {
                showToast('最多上传10个文件');
                return;
            }
            const newFile = {
                id: Date.now(),
                thumb: `https://picsum.photos/200/200?random=${Date.now()}`,
                isImage: true
            };
            editFiles.push(newFile);
            renderEditUploadedList();
        }

        function editSelectFromAlbum() {
            if (editFiles.length >= 10) {
                showToast('最多上传10个文件');
                return;
            }
            const newFile = {
                id: Date.now(),
                thumb: `https://picsum.photos/200/200?random=${Date.now()}`,
                isImage: true
            };
            editFiles.push(newFile);
            renderEditUploadedList();
        }

        function confirmEdit() {
            if (currentEditId === null) return;

            if (confirm('确定要保存修改吗？')) {
                const record = mockRecords.find(r => r.id === currentEditId);
                if (!record) return;

                const oldImageCount = record.images.length;
                const oldType = record.type || 'customer';
                const newRemark = document.getElementById('editRemarkInput').value;

                record.images = editFiles.map(f => f.thumb);
                record.remark = newRemark;
                record.type = editSelectedType;
                record.typeName = getTypeName(editSelectedType);
                record.time = new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');

                const changes = [];
                if (oldImageCount !== editFiles.length) {
                    changes.push(`图片: ${oldImageCount}张 → ${editFiles.length}张`);
                }
                if (oldType !== editSelectedType) {
                    changes.push(`类型: ${getTypeName(oldType)} → ${getTypeName(editSelectedType)}`);
                }
                if (record.remark !== newRemark) {
                    changes.push(`备注: "${record.remark}" → "${newRemark}"`);
                }

                if (changes.length > 0) {
                    record.history = record.history || [];
                    record.history.unshift({
                        operator: currentUser,
                        time: record.time,
                        action: '修改记录',
                        changes: changes.join(', ')
                    });
                }

                closeEditModal();
                renderRecords();
                showToast('修改成功');
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 初始化
        renderRecords();
    </script>
</body>

</html>
