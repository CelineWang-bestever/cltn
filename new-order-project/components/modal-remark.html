<!-- remarkModalOverlay -- 独立组件模板 -->
<div class="remark-modal-overlay" id="remarkModalOverlay">
        <div class="remark-modal">
            <div class="remark-modal-header">
                <span class="remark-modal-title">备注</span>
                <div class="remark-modal-close" id="remarkModalClose">×</div>
            </div>
            <div class="remark-modal-body">
                <textarea class="remark-modal-textarea" id="remarkModalTextarea" placeholder="请输入备注信息..."></textarea>
            </div>
            <div class="remark-modal-footer">
                <button class="remark-modal-btn cancel" id="remarkModalCancel">取消</button>
                <button class="remark-modal-btn confirm" id="remarkModalConfirm">确定</button>
            </div>
        </div>
    </div>
