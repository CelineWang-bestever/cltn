<!-- confirmModalOverlay -- 独立组件模板 -->
<div class="confirm-modal-overlay" id="confirmModalOverlay">
        <div class="confirm-modal">
            <div class="confirm-modal-content">
                <div class="confirm-modal-icon">!</div>
                <div class="confirm-modal-title">确认散客开单</div>
                <div class="confirm-modal-desc">散客开单将移除当前已选会员，移除后需要重新选择会员。</div>
            </div>
            <div class="confirm-modal-footer">
                <button class="btn-modal secondary" id="confirmCancel">取消</button>
                <button class="btn-modal primary" id="confirmOk">确定</button>
            </div>
        </div>
    </div>
