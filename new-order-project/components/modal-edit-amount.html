<!-- upgradeEditAmountModalOverlay -- 独立组件模板 -->
<div class="upgrade-newcard-modal-overlay" id="upgradeEditAmountModalOverlay">
        <div class="upgrade-newcard-modal upgrade-edit-amount-modal">
            <div class="upgrade-newcard-modal-header">
                <span class="upgrade-newcard-modal-title">修改卡金</span>
                <div class="upgrade-newcard-modal-close" id="upgradeEditAmountModalClose">×</div>
            </div>
            <div class="upgrade-newcard-modal-body">
                <div class="upgrade-edit-amount-form">
                    <div class="course-card-field">
                        <label>售卡金额</label>
                        <div class="course-card-price-group">
                            <span class="course-card-price-symbol">¥</span>
                            <input type="text" class="course-card-price-input" id="upgradeEditSalePriceInput" placeholder="0.00" data-numkeypad-title="售卡金额">
                        </div>
                    </div>
                    <div class="course-card-field">
                        <label>充值金额</label>
                        <div class="course-card-price-group">
                            <span class="course-card-price-symbol">¥</span>
                            <input type="text" class="course-card-price-input" id="upgradeEditRechargeAmountInput" placeholder="0.00" data-numkeypad-title="充值金额">
                        </div>
                    </div>
                    <div class="course-card-field">
                        <label>赠送金额</label>
                        <div class="course-card-price-group">
                            <span class="course-card-price-symbol">¥</span>
                            <input type="text" class="course-card-price-input" id="upgradeEditGiftAmountInput" placeholder="0.00" data-numkeypad-title="赠送金额">
                        </div>
                    </div>
                </div>
            </div>
            <div class="upgrade-newcard-modal-footer">
                <button type="button" class="upgrade-newcard-btn cancel" id="upgradeEditAmountCancel">取消</button>
                <button type="button" class="upgrade-newcard-btn confirm" id="upgradeEditAmountConfirm">确认</button>
            </div>
        </div>
    </div>
