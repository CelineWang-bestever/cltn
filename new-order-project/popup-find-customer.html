<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择会员</title>
    <style>
        :root {
            --primary-50: #FFF1F5;
            --primary-100: #FFE4EC;
            --primary-200: #FFC7D9;
            --primary-300: #FFA0BE;
            --primary-400: #F1A3B8;
            --primary-500: #E87C9A;
            --primary-600: #D66B85;
            --success-500: #10B981;
            --warning-500: #F59E0B;
            --error-500: #EF4444;
            --neutral-50: #F8FAFC;
            --neutral-100: #F1F5F9;
            --neutral-200: #E2E8F0;
            --neutral-300: #CBD5E1;
            --neutral-400: #94A3B8;
            --neutral-500: #64748B;
            --neutral-600: #475569;
            --neutral-700: #334155;
            --neutral-800: #1E293B;
            --neutral-900: #0F172A;
            --bg-primary: #FFFFFF;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
        }

        .member-modal {
            width: 480px;
            max-width: 90vw;
            max-height: 80vh;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .member-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--neutral-100);
            flex-shrink: 0;
        }

        .member-modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .member-modal-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--neutral-400);
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .member-modal-close:hover {
            background: var(--neutral-100);
            color: var(--neutral-600);
        }

        .member-modal-search {
            padding: 16px 20px;
            border-bottom: 1px solid var(--neutral-100);
            flex-shrink: 0;
        }

        .member-modal-search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--neutral-700);
            outline: none;
            transition: all 0.2s ease;
        }

        .member-modal-search-input:focus {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px rgba(241, 163, 184, 0.15);
        }

        .member-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--neutral-50);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .member-item:hover {
            background: var(--primary-50);
            border-color: var(--primary-200);
        }

        .member-item.selected {
            background: var(--primary-50);
            border-color: var(--primary-400);
        }

        .member-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-600) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .member-avatar svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .member-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .member-tag {
            padding: 2px 6px;
            background: var(--primary-100);
            color: var(--primary-600);
            font-size: 10px;
            font-weight: 500;
            border-radius: 4px;
        }

        .member-phone {
            font-size: 12px;
            color: var(--neutral-500);
        }

        .member-balance {
            text-align: right;
            flex-shrink: 0;
        }

        .member-balance-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-500);
        }

        .member-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--neutral-100);
            flex-shrink: 0;
        }

        .btn-modal {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-modal.secondary {
            background: var(--bg-primary);
            border: 1px solid var(--neutral-200);
            color: var(--neutral-600);
        }

        .btn-modal.secondary:hover {
            border-color: var(--neutral-400);
            color: var(--neutral-800);
        }

        .btn-modal.primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-modal.primary:hover {
            background: var(--primary-600);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--neutral-400);
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: var(--neutral-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .empty-state-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--neutral-300);
        }

        .empty-state-text {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="member-modal" id="memberModal">
        <div class="member-modal-header">
            <span class="member-modal-title">选择会员</span>
            <div class="member-modal-close" id="modalClose">×</div>
        </div>
        <div class="member-modal-search">
            <input type="text" class="member-modal-search-input" id="searchInput" placeholder="请输入会员姓名/手机号搜索">
        </div>
        <div class="member-modal-body">
            <div class="member-list" id="memberList">
                <div class="member-item" data-id="1">
                    <div class="member-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="member-info">
                        <div class="member-name-row">
                            <span class="member-name">小张</span>
                            <span class="member-tag">新客</span>
                        </div>
                        <div class="member-phone">135****8889</div>
                    </div>
                    <div class="member-balance">
                        <div class="member-balance-value">¥1200.00</div>
                    </div>
                </div>
                <div class="member-item" data-id="2">
                    <div class="member-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="member-info">
                        <div class="member-name-row">
                            <span class="member-name">李女士</span>
                            <span class="member-tag">会员</span>
                        </div>
                        <div class="member-phone">138****6666</div>
                    </div>
                    <div class="member-balance">
                        <div class="member-balance-value">¥3500.00</div>
                    </div>
                </div>
                <div class="member-item" data-id="3">
                    <div class="member-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="member-info">
                        <div class="member-name-row">
                            <span class="member-name">王小姐</span>
                            <span class="member-tag">VIP</span>
                        </div>
                        <div class="member-phone">139****9999</div>
                    </div>
                    <div class="member-balance">
                        <div class="member-balance-value">¥8800.00</div>
                    </div>
                </div>
                <div class="member-item" data-id="4">
                    <div class="member-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="member-info">
                        <div class="member-name-row">
                            <span class="member-name">陈女士</span>
                            <span class="member-tag">会员</span>
                        </div>
                        <div class="member-phone">136****5555</div>
                    </div>
                    <div class="member-balance">
                        <div class="member-balance-value">¥2000.00</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="member-modal-footer">
            <button class="btn-modal secondary" id="btnCancel">取消</button>
            <button class="btn-modal primary" id="btnConfirm">确认</button>
        </div>
    </div>

    <script>
        const modalClose = document.getElementById('modalClose');
        const searchInput = document.getElementById('searchInput');
        const memberList = document.getElementById('memberList');
        const btnCancel = document.getElementById('btnCancel');
        const btnConfirm = document.getElementById('btnConfirm');
        
        let selectedMemberId = null;

        memberList.addEventListener('click', (e) => {
            const memberItem = e.target.closest('.member-item');
            if (memberItem) {
                document.querySelectorAll('.member-item').forEach(item => {
                    item.classList.remove('selected');
                });
                memberItem.classList.add('selected');
                selectedMemberId = memberItem.dataset.id;
            }
        });

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const memberItems = document.querySelectorAll('.member-item');
            memberItems.forEach(item => {
                const name = item.querySelector('.member-name').textContent.toLowerCase();
                const phone = item.querySelector('.member-phone').textContent.toLowerCase();
                if (name.includes(keyword) || phone.includes(keyword)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        function closeModal() {
            window.parent.postMessage({ type: 'closeMemberModal' }, '*');
        }

        function confirmSelection() {
            if (selectedMemberId) {
                const selectedItem = document.querySelector('.member-item.selected');
                const memberData = {
                    id: selectedMemberId,
                    name: selectedItem.querySelector('.member-name').textContent,
                    tag: selectedItem.querySelector('.member-tag').textContent,
                    phone: selectedItem.querySelector('.member-phone').textContent,
                    balance: selectedItem.querySelector('.member-balance-value').textContent
                };
                window.parent.postMessage({ type: 'selectMember', data: memberData }, '*');
            }
            closeModal();
        }

        modalClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);
        btnConfirm.addEventListener('click', confirmSelection);

        window.addEventListener('message', (e) => {
            if (e.data.type === 'refreshMembers') {
                searchInput.value = '';
                document.querySelectorAll('.member-item').forEach(item => {
                    item.style.display = 'flex';
                    item.classList.remove('selected');
                });
                selectedMemberId = null;
            }
        });
    </script>
</body>
</html>
