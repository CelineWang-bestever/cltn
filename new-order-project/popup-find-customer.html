<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查找会员</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #FFFFFF;
        }

        .find-customer-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* 顶部导航栏 */
        .header {
            background: #E87C9A;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-size: 26px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .header-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: 2px;
        }

        .header-new-btn {
            padding: 8px 18px;
            background: #FFFFFF;
            color: #E87C9A;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .header-new-btn:hover {
            opacity: 0.85;
        }

        /* 搜索区域 */
        .search-section {
            padding: 32px 24px 24px;
            flex-shrink: 0;
        }

        .search-hint {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #DDDDDD;
            border-radius: 8px;
            overflow: hidden;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 16px;
            font-size: 16px;
            color: #333333;
            background: transparent;
        }

        .search-input::placeholder {
            color: #CCCCCC;
        }

        .search-btn {
            padding: 14px 28px;
            background: #E87C9A;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #D66B85;
        }

        /* 数字键盘区域 */
        .keypad-section {
            flex: 1;
            padding: 36px 48px 24px;
            display: flex;
            justify-content: center;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 86px);
            gap: 18px 24px;
        }

        .key-item {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .key-number {
            background: #F5F5F5;
            color: #333333;
            border: none;
        }

        .key-number:hover {
            background: #EBEBEB;
        }

        .key-number:active {
            background: #E0E0E0;
        }

        /* 功能键样式 */
        .key-action {
            background: #333333;
            color: #FFFFFF;
            font-size: 26px;
        }

        .key-action:hover {
            background: #444444;
        }

        .key-action:active {
            background: #555555;
        }
    </style>
</head>
<body>
    <div class="find-customer-container">
        <!-- 顶部栏 -->
        <div class="header">
            <div class="header-close" id="btnClose">×</div>
            <span class="header-title">查找会员</span>
            <button class="header-new-btn" id="btnNewMember">新建会员</button>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-hint">您想要查找哪位会员？</div>
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="姓名/手机号" readonly>
                </div>
                <button class="search-btn" id="btnSearch">查询</button>
            </div>
        </div>

        <!-- 数字键盘 -->
        <div class="keypad-section">
            <div class="keypad-grid" id="keypadGrid">
                <div class="key-item key-number" data-key="1">1</div>
                <div class="key-item key-number" data-key="2">2</div>
                <div class="key-item key-number" data-key="3">3</div>
                <div class="key-item key-action" data-key="backspace">←</div>

                <div class="key-item key-number" data-key="4">4</div>
                <div class="key-item key-number" data-key="5">5</div>
                <div class="key-item key-number" data-key="6">6</div>
                <div class="key-item key-action" data-key="close">×</div>

                <div class="key-item key-number" data-key="7">7</div>
                <div class="key-item key-number" data-key="8">8</div>
                <div class="key-item key-number" data-key="9">9</div>
                <div class="key-item key-action" data-key="confirm">✓</div>

                <div class="key-item key-number" data-key="0">0</div>
                <div class="key-item key-number" data-key=".">.</div>
            </div>
        </div>
    </div>

    <script>
        var searchInput = document.getElementById('searchInput');
        var keypadGrid = document.getElementById('keypadGrid');
        var btnClose = document.getElementById('btnClose');
        var btnSearch = document.getElementById('btnSearch');
        var btnNewMember = document.getElementById('btnNewMember');

        // 键盘点击
        keypadGrid.addEventListener('click', function(e) {
            var keyItem = e.target.closest('.key-item');
            if (!keyItem) return;

            var key = keyItem.dataset.key;

            switch(key) {
                case 'backspace':
                    searchInput.value = searchInput.value.slice(0, -1);
                    break;
                case 'close':
                    closeModal();
                    break;
                case 'confirm':
                    doSearch();
                    break;
                default:
                    searchInput.value += key;
            }
        });

        // 查询按钮
        btnSearch.addEventListener('click', doSearch);

        // 新建会员
        btnNewMember.addEventListener('click', function() {
            window.parent.postMessage({ type: 'newMember' }, '*');
        });

        // 关闭
        btnClose.addEventListener('click', closeModal);

        function closeModal() {
            window.parent.postMessage({ type: 'closeFindCustomer' }, '*');
        }

        function doSearch() {
            var keyword = searchInput.value.trim();
            if (!keyword) return;
            window.parent.postMessage({
                type: 'searchCustomer',
                keyword: keyword
            }, '*');
        }

        // 监听来自父窗口的消息
        window.addEventListener('message', function(e) {
            if (e.data.type === 'clearSearch') {
                searchInput.value = '';
            } else if (e.data.type === 'setSearchValue') {
                searchInput.value = e.data.value || '';
            }
        });
    </script>
</body>
</html>
